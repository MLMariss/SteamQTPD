<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QHPP — Steam value hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0e1320; --panel:#192133; --panel-2:#212c42; --line:#2c3858;
    --text:#f1f4fb; --title:#ffffff; --muted:#b9c4dd; --muted-2:#94a0c0;
    --gold:#ffc24d; --gold-deep:#b98a28; --gold-soft:#3a2f17; --blue:#6f9bff; --coral:#ff7d7d;
    --teal:#5dd6a8; --green:#54c98a; --red:#ff7d7d;
    --sans:"IBM Plex Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1400px 560px at 82% -12%, #1a2236 0%, #0e1320 60%), var(--bg);
    color:var(--text); font-family:var(--sans); font-size:14px;
    -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  a{color:var(--blue); text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{width:100%; max-width:2400px; margin:0 auto; padding:0 clamp(8px,1.4vw,30px)}
  .wrap.body{padding-bottom:70px}

  /* ---- header (scrolls away; table header takes over as sticky, see thead below) ---- */
  .topbar{position:relative; z-index:40; padding-top:10px; background:var(--bg)}
  .barwrap{background:linear-gradient(180deg,#1a2336,#161e2f); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .bar-main{display:flex; align-items:center; gap:16px; padding:12px 16px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:13px; flex:none}
  .logo{font-weight:700; font-size:28px; letter-spacing:-.04em; line-height:1;
        background:linear-gradient(180deg,#fff,#d6deef); -webkit-background-clip:text; background-clip:text; color:transparent}
  .logo b{color:var(--gold); -webkit-text-fill-color:var(--gold)}
  .tagline{font-family:var(--mono); font-size:13px; color:var(--muted); letter-spacing:.02em}
  .search{flex:1 1 240px; min-width:180px; position:relative}
  .search input{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text);
        font-family:var(--sans); font-size:14px; padding:10px 12px 10px 36px; border-radius:9px; outline:none}
  .search input::placeholder{color:var(--muted-2)}
  .search input:focus-visible{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33}
  .search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted-2)}
  .meta{font-family:var(--mono); font-size:13px; color:var(--muted); text-align:right; line-height:1.55; flex:none}
  .meta .n{color:var(--text)}
  .preview-badge{display:inline-block; margin-left:8px; padding:2px 8px; border:1px solid var(--gold-deep);
        color:var(--gold); border-radius:999px; font-size:12px; letter-spacing:.05em; text-transform:uppercase}

  .bar-filters{padding:14px 16px; border-top:1px solid var(--line)}
  .topbar.compact .bar-filters{display:none}             /* instant, no animation */
  .topbar.compact .tagline{display:none}
  .topbar.compact .logo{font-size:23px}

  .collapse-handle{display:block; width:100%; border:0; border-top:1px solid var(--line); background:var(--panel);
        color:var(--muted); font-family:var(--mono); font-size:13px; letter-spacing:.04em; padding:8px; cursor:pointer}
  .collapse-handle:hover{background:var(--panel-2); color:var(--text)}

  .ctl-row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:12px}
  .ctl-row:last-child{margin-bottom:0}
  .field{display:flex; flex-direction:column; gap:6px}
  .field > label{font-family:var(--mono); font-size:12px; color:var(--muted-2); letter-spacing:.05em; text-transform:uppercase}

  .seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:9px; overflow:hidden}
  .seg button{appearance:none; background:transparent; border:0; color:var(--muted); font-family:var(--mono);
        font-size:13px; padding:9px 12px; cursor:pointer; letter-spacing:.01em; white-space:nowrap}
  .seg button[aria-pressed="true"]{background:var(--panel-2); color:var(--text)}
  .seg.metric button[aria-pressed="true"]{background:var(--gold-soft); color:var(--gold)}
  .seg button:focus-visible{outline:2px solid var(--blue); outline-offset:-2px}

  /* per-page size selector in the top bar */
  .pagesize{display:inline-flex; align-items:center; gap:7px; flex:none}
  .pagesize-lbl{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
  .pagesize button{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:12px; padding:5px 9px; cursor:pointer; border-radius:7px}
  .pagesize button:hover{color:var(--text)}
  .pagesize button.on{background:var(--gold-soft); color:var(--gold); border-color:var(--gold-soft)}
  .pagesize button:focus-visible{outline:2px solid var(--blue); outline-offset:-2px}
  /* infinite-scroll sentinel / "loading more" row */
  .loadmore{text-align:center; padding:18px; font-family:var(--mono); font-size:12px; color:var(--muted)}

  .toggle{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:13px; padding:9px 14px; border-radius:9px; cursor:pointer; letter-spacing:.01em}
  .toggle[aria-pressed="true"]{border-color:var(--coral); color:var(--coral)}
  .toggle.wish[aria-pressed="true"]{border-color:var(--gold); color:var(--gold)}
  .toggle:focus-visible{outline:2px solid var(--blue); outline-offset:2px}
  .linkbtn{background:none; border:0; color:var(--muted-2); font-family:var(--mono); font-size:12px;
        cursor:pointer; text-decoration:underline; padding:6px 2px; white-space:nowrap}
  .linkbtn:hover{color:var(--text)}

  /* themed number steppers */
  .numinput{display:inline-flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line);
        border-radius:9px; padding:0 8px 0 11px; font-family:var(--mono); font-size:13px; color:var(--muted-2)}
  .numinput input{width:54px; background:transparent; border:0; color:var(--text); font-family:var(--mono);
        font-size:14px; padding:9px 0; outline:none; text-align:right;
        -webkit-appearance:none; -moz-appearance:textfield; appearance:textfield}
  .numinput input::-webkit-outer-spin-button,.numinput input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .numinput:focus-within{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33}
  .steppers{display:flex; flex-direction:column; gap:2px}
  .steppers button{width:22px; height:17px; line-height:1; border:1px solid var(--line); background:var(--panel-2);
        color:var(--muted); border-radius:4px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; padding:0}
  .steppers button:hover{color:var(--gold); border-color:var(--gold-deep)}
  .pricesep{color:var(--muted-2); padding:0 2px}

  /* wishlist (inline) */
  .wishrow{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  .wishlabel{font-family:var(--mono); font-size:12px; color:var(--muted-2); letter-spacing:.05em; text-transform:uppercase}
  .wishbox{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:0 0 0 12px}
  .wishbox input{width:280px; background:transparent; border:0; color:var(--text); font-family:var(--mono); font-size:13px; padding:9px 0; outline:none}
  .wishbox input::placeholder{color:var(--muted-2)}
  .wishbox button{background:var(--panel-2); border:0; border-left:1px solid var(--line); color:var(--text);
        font-family:var(--mono); font-size:13px; padding:9px 14px; cursor:pointer; border-radius:0 8px 8px 0}
  .wishbox button:hover{background:#283656}
  .wishbox:focus-within{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33}
  .wishclear{background:var(--panel); border:1px solid var(--line); color:var(--muted); border-radius:9px;
        font-family:var(--mono); font-size:13px; padding:9px 12px; cursor:pointer}
  .wishclear:hover{border-color:var(--coral); color:var(--coral)}

  /* toasts (transient wishlist messages) */
  .toast-host{position:fixed; right:18px; bottom:18px; z-index:200; display:flex; flex-direction:column; gap:8px; max-width:380px}
  .toast{background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:11px 14px;
        font-family:var(--mono); font-size:13px; color:var(--text); box-shadow:0 10px 30px #000a; animation:toastin .18s ease}
  .toast.err{border-color:var(--coral)} .toast.ok{border-color:var(--teal)} .toast a{color:var(--blue)} .toast b{color:var(--gold)}
  @keyframes toastin{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}

  /* qhpp dual range */
  .rangefield{min-width:300px; flex:1 1 320px; max-width:520px}
  .rangewrap{position:relative; height:30px; margin-top:2px}
  .rangetrack{position:absolute; top:13px; left:2px; right:2px; height:5px; background:#2c3858; border-radius:99px}
  .rangefill{position:absolute; top:0; height:100%; background:linear-gradient(90deg,var(--gold-deep),var(--gold)); border-radius:99px}
  .rangewrap input[type=range]{position:absolute; left:0; top:0; width:100%; height:30px; margin:0; background:none;
        pointer-events:none; -webkit-appearance:none; appearance:none}
  .rangewrap input[type=range]:focus{outline:none}
  .rangewrap input[type=range]::-webkit-slider-thumb{pointer-events:all; -webkit-appearance:none; appearance:none;
        height:18px; width:18px; border-radius:50%; background:var(--gold); cursor:pointer; border:2px solid #0e1320; box-shadow:0 1px 3px #0008}
  .rangewrap input[type=range]::-moz-range-thumb{pointer-events:all; height:16px; width:16px; border-radius:50%;
        background:var(--gold); cursor:pointer; border:2px solid #0e1320}
  .rangevals{font-family:var(--mono); font-size:13px; color:var(--muted); margin-top:3px}
  .rangevals b{color:var(--gold); font-weight:600}

  /* grouped tag rail (no search; hover tooltip carries the hint) */
  .tagrail-wrap{cursor:default}
  .taggroup{display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; margin-bottom:8px}
  .grouplabel{font-family:var(--mono); font-size:12px; color:var(--gold); letter-spacing:.05em; text-transform:uppercase;
        flex:none; width:120px; text-align:right; opacity:.85}
  .grouptags{display:flex; gap:7px; flex-wrap:wrap; flex:1}
  .chip{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:13px; padding:5px 11px; border-radius:999px; cursor:pointer; white-space:nowrap}
  .chip:hover{border-color:var(--muted-2); color:var(--text)}
  .chip.dim{opacity:.4}
  .chip.inc{background:#1c3528; border-color:var(--green); color:#9cf0c2; opacity:1}
  .chip.exc{background:#3a2026; border-color:var(--red); color:#ffb4b4; text-decoration:line-through; opacity:1}
  .chip .mk{margin-right:5px; font-weight:600}
  .chip .ct{opacity:.6; margin-left:5px; display:inline-block; text-align:left; box-sizing:content-box}
  /* T7: per-group overflow tier — hidden until the group's "+ more" is toggled */
  .taggroup .chip.tag-extra{display:none}
  .taggroup.expanded .chip.tag-extra{display:inline-flex}
  .tagmore{appearance:none; background:transparent; border:1px dashed var(--muted-2); color:var(--muted-2);
        border-radius:99px; padding:3px 10px; font-family:var(--mono); font-size:12px; cursor:pointer; white-space:nowrap}
  .tagmore:hover{border-color:var(--gold); color:var(--gold)}
  .taggroup.expanded .tagmore{border-style:solid}
  /* Visible key for the tag click-cycle (the rail's behavior was previously only in a hover
     title). Reuses the real .chip.inc/.chip.exc styles so the swatches can never drift from
     the actual require/exclude colors; pointer-events off so the demo chips aren't clickable. */
  .taglegend{flex-basis:100%; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
        font-family:var(--mono); font-size:12px; color:var(--muted-2); margin-bottom:2px}
  .taglegend .chip{cursor:default; pointer-events:none; font-size:12px; padding:3px 9px}
  .taglegend .tl-arrow{opacity:.5}

  /* ---- table ---- */
  /* NOTE: no overflow:hidden here — it would clip the sticky <thead> to the card and stop
     it pinning to the viewport. Rounded corners still render via border-radius + border. */
  .tablecard{background:linear-gradient(180deg,#1a2336,#151d2d); border:1px solid var(--line); border-radius:14px; margin-top:12px}
  /* Fluid table (auto layout). Columns size between a per-column min (small-laptop floor,
     keeps every cell legible) and a per-column max (breathing ceiling). The slack concentrates
     on Game and Tags (the content-heavy columns); the slim numeric/sort columns stay narrow.
     Horizontal overflow stays on the PAGE, not this container: putting overflow-x:auto here
     would trap the sticky <thead> in a scroll box (browsers promote a lone overflow-x:auto to
     overflow:auto on both axes). Below the table's min-width the page scrolls sideways — rare
     now, and the sub-1290px card layout covers the small screens. min-width is the exact sum of
     the per-column minimums (1266px) so the declared floor matches what the columns truly need —
     each floor is measured against its widest real content (e.g. HLTB "1281 1464 1670", Reviews
     "ALL 85% 1.5M") so nothing clips. The ceiling is governed by .wrap (max-width:2400px), which
     lets the table fill ultrawide screens edge to edge; on wide monitors the slack goes to Tags
     then Game (their fr weights), keeping the numeric columns pinned. */
  /* ── Table sizing: CSS Grid with minmax() per column ──────────────────────────────────
     `<col>` min/max-width is ignored by browsers (col only honors width/border/bg/visibility),
     so real per-column min/max comes from Grid. The grid is applied at the ROW level (each
     <tr> is a grid), NOT the table level — this is what keeps the sticky <thead> working: the
     thead stays a normal sticky block while each row lays its cells out on the shared track
     template. `--grid-cols` is defined once and used by both header and body rows so columns
     line up. Slim numeric/sort columns get tight minmax(); Game and Tags take fr slack so they
     absorb width on big screens while the rest stay near their floor. The ceiling comes from
     .wrap (max-width:2400px), so the table breathes on ultrawide without a redundant table cap.
     The card layout takes over at <=1290px — just below the table's real floor — so the table
     view is used as far down as it stays legible and there is no overflow gap between the two. */
  :root{
    --grid-cols:
      minmax(268px, 2.2fr)   /* Game     — floor = thumb + 2-line title; strong growth */
      minmax(100px, 128px)   /* Reviews  — floor fits "ALL 85% 1.5M" */
      minmax(66px,  104px)   /* Weighted */
      minmax(48px,  76px)    /* Trend    */
      minmax(68px,  92px)    /* Price    — floor fits "$19.99" */
      minmax(54px,  78px)    /* Discount */
      minmax(80px,  108px)   /* Sale ends*/
      minmax(96px,  124px)   /* Released — floor fits "15.2 yrs old" */
      minmax(130px, 3fr)     /* Tags     — MOST growth (soaks up the slack, fewest wrap rows) */
      minmax(92px,  120px)   /* Playtime — floor fits "avg 1472 h" */
      minmax(132px, 244px)   /* HLTB     — floor fits "1281 1464 1670" */
      minmax(132px, 184px);  /* QHPP     — floor fits wrapped value+full */
  }
  .tablescroll{overflow-x:visible; overflow-y:visible}
  .tablecard{scroll-margin-top:8px}
  table{width:100%; margin:0 auto; border-collapse:collapse; min-width:1266px}
  colgroup{display:none}                     /* grid tracks size the columns now, not <col> */
  thead,tbody{display:block; width:100%}     /* let rows be the grid containers */
  thead tr,tbody tr{display:grid; grid-template-columns:var(--grid-cols); align-items:center}
  thead th{font-family:var(--mono); font-size:12px; letter-spacing:.05em; text-transform:uppercase;
        color:var(--muted); text-align:left; padding:12px 12px; border-bottom:1px solid var(--line); white-space:nowrap; user-select:none;
        display:flex; align-items:center; min-width:0}   /* min-width:0 lets cells shrink to their track */
  thead{position:sticky; top:0; z-index:30; background:#141c2c}   /* whole header sticks; opaque bg so rows don't show through */
  thead th.sortable{cursor:pointer}
  thead th.sortable:hover{color:var(--text)}
  thead th.num{justify-content:flex-end; text-align:right}
  thead th.center{justify-content:center; text-align:center}
  /* Sort arrow sits absolutely at the bottom of the sorted header (position:relative context
     below), so it costs no inline width and no extra height (lives in the header's padding). */
  thead th{position:relative}
  .arrow{position:absolute; left:0; right:0; bottom:1px; text-align:center; margin:0;
        font-size:10px; line-height:1; color:var(--gold); pointer-events:none}
  tbody td{padding:8px 12px; display:flex; flex-direction:column; justify-content:center; min-width:0; overflow:hidden}
  /* cells stack their content vertically (single-child cells are unaffected; Released and
     QHPP have multiple direct children that must stack, not sit side by side). Horizontal
     placement of the stack is set by the alignment classes below via align-items. */
  tbody td{align-items:flex-start}                 /* default: left */
  tbody td.num{align-items:flex-end}               /* numeric: right */
  tbody td.center{align-items:center}              /* centered */
  td.pad{padding-left:18px; padding-right:18px}
  tbody tr{border-bottom:1px solid #222d45}
  tbody tr:last-child{border-bottom:0}
  tbody tr:nth-child(even){background:rgba(127,160,230,.035)}   /* subtle zebra; translucent so the card gradient still shows through */
  tbody tr:hover{background:#1b2640}                            /* declared after zebra so hover always wins */


  .gamecell{display:flex; align-items:center; gap:10px; align-self:stretch; width:100%}
  .gamecell .hidebtn{margin-right:-2px}   /* sit snug to the thumbnail */
  .thumb{position:relative; flex:none; width:150px; height:57px; border-radius:5px; overflow:hidden; background:#0b0f18; border:1px solid #2a3550}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .thumb .pop{position:fixed; z-index:60; width:380px; height:178px; border-radius:8px; overflow:hidden;
        border:1px solid var(--line); box-shadow:0 14px 40px #000b; display:none; pointer-events:none; background:#0b0f18}
  .thumb .pop img{width:100%; height:100%; object-fit:cover}
  /* Adult-tagged games (T6): serve the real art but blur it and mark 18+.
     Permanent blur for now — no click-to-reveal until a real age gate exists. */
  .thumb.adult img{filter:blur(8px); transform:scale(1.08)}   /* scale hides blurred edges */
  .thumb.adult .pop img{filter:blur(16px); transform:scale(1.06)}
  .thumb.adult::after{content:"18+"; position:absolute; inset:0; z-index:2;
        display:flex; align-items:center; justify-content:center;
        font:700 13px/1 system-ui,sans-serif; letter-spacing:.5px; color:#fff;
        text-shadow:0 1px 3px #000c; pointer-events:none;
        background:radial-gradient(circle at center, #0006, #0002)}
  .gmeta{min-width:96px; flex:1}     /* title never collapses below readable width */
  .gtitle{font-weight:600; font-size:15px; color:var(--title); cursor:pointer; line-height:1.25;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .gtitle:hover{text-decoration:underline}
  .gsub{font-family:var(--mono); font-size:12px; color:var(--muted-2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .wish-dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--gold); margin-left:7px; vertical-align:middle}

  .num{font-family:var(--mono); text-align:right; white-space:nowrap}
  .center{text-align:center}
  .dot{width:9px; height:9px; border-radius:50%; flex:none}
  .rval{font-family:var(--mono); font-size:14px}

  /* stacked reviews: all-time over recent */
  .ratecell{display:flex; flex-direction:column; gap:3px}
  .rrow{display:flex; align-items:center; gap:6px}
  .rlbl{font-family:var(--mono); font-size:12px; color:var(--muted-2); width:26px; flex:none; text-transform:uppercase}
  .rrow .rval{font-size:13px}
  .rcount{font-family:var(--mono); font-size:12px; color:var(--muted-2)}
  .rrow.recent.stale .rval,.rrow.recent.muted .rval{color:var(--muted-2)}
  .rrow.recent.stale{opacity:.7}

  /* trend column */
  .trend{font-family:var(--mono); font-size:14px; font-weight:600; white-space:nowrap}
  .trend.up{color:var(--teal)} .trend.down{color:var(--coral)}
  .trend.flat{color:var(--muted-2); font-weight:400} .trend.none{color:var(--muted-2)}
  .trend.stale{opacity:.5; font-weight:400}

  .pricebox{display:flex; flex-direction:column; align-items:flex-start; gap:1px; line-height:1.2}
  .price-init{font-family:var(--mono); font-size:12px; color:var(--muted-2); text-decoration:line-through}
  .price-final{font-family:var(--mono); font-size:14px; font-weight:600}
  .disc{font-family:var(--mono); font-size:13px; color:#0e1320; background:var(--coral); padding:1px 5px; border-radius:5px; font-weight:700}
  /* Price + Discount read as one tight unit: trim the inner padding between the two
     columns so they sit close, while staying separate sortable headers/columns. */
  tbody td[data-label="Price"]{padding-right:4px}
  tbody td[data-label="Discount"]{padding-left:4px}
  thead th[data-sort="price_final"]{padding-right:4px}
  thead th[data-sort="discount_pct"]{padding-left:4px}
  .free{font-family:var(--mono); font-size:13px; color:var(--teal)}

  .countdown{font-family:var(--mono); font-size:13px; color:var(--coral)}
  .countdown.soon{font-weight:600}
  .countdown.ended{color:var(--muted-2); font-weight:400; font-style:italic}
  .nosale{color:var(--muted-2)}
  .rel{font-family:var(--mono); font-size:13px; color:var(--muted)}
  .age{font-family:var(--mono); font-size:12px; color:var(--muted-2); margin-top:2px}
  .updated{font-family:var(--mono); font-size:12px; color:var(--muted-2); margin-top:2px; white-space:nowrap}
  .updated.none{color:#c98a8a}

  /* QHPP dual value: after-discount (left, primary) + full price (right). Active
     basis is highlighted (qsel), the inactive one dimmed (qdim). Positions fixed. */
  /* QHPP dual value: after-discount (left, primary) + full price (right). Coloring is
     driven entirely by qsel (active basis -> gold) and qdim (inactive -> muted), so the
     base color must stay neutral or it would override them. */
  .qsel{color:var(--gold) !important; font-weight:700}
  .qdim{color:var(--muted-2) !important}
  .qval.qdim{font-weight:600}
  /* Not-on-sale rows: the QHPP is computed on the full price (there's no discount), so it
     must read differently from an active sale deal — neutral text (not gold) plus a small
     "full" tag, so it isn't mistaken for a discounted value. */
  .qval.qfull{color:var(--muted); font-weight:600}
  .qtag{font-family:var(--mono); font-size:12px; color:var(--muted-2)}
  .qtag.full{color:#7f8db0; letter-spacing:.03em}

  /* hide-game [x] button: sits to the LEFT of the thumbnail (not overlaying it).
     Subtle by default, reddens on hover. Slim so it costs little horizontal space. */
  .hidebtn{flex:none; width:18px; height:38px; padding:0; border-radius:5px;
        border:1px solid #3a2530; background:#1a1014; color:#9a7480; font-size:15px;
        line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
        transition:background .12s, color .12s, border-color .12s}
  .hidebtn:hover{background:#7a2535; color:#fff; border-color:#a33}
  tr:hover .hidebtn{color:#c98a96}            /* row hover: nudge it more visible */
  tr:hover .hidebtn:hover{color:#fff}

  .unhide-link{font-family:var(--mono); font-size:inherit; color:var(--blue); background:none;
        border:none; padding:0; cursor:pointer}
  .unhide-link:hover{color:var(--gold); text-decoration:underline}

  /* all tags shown, wrap, fixed position, light up if selected */
  .tags{display:flex; gap:6px; flex-wrap:wrap}
  .tag{font-family:var(--mono); font-size:12px; color:var(--muted); background:#212c44; border:1px solid #2e3a58;
        padding:2px 8px; border-radius:6px; cursor:pointer; white-space:nowrap}
  .tag:hover{color:var(--text); border-color:var(--blue)}
  .tag.sel{background:var(--gold-soft); border-color:var(--gold-deep); color:var(--gold)}

  /* Stack fills the cell (block, not inline-block) so its centered content can't spill past
     the column and read as an overlap with the neighbour. Both lines are nowrap: the three
     HLTB figures stay on one row and "avg N h" stays on the next, never colliding even when
     the numbers are large (the wide free-game rows that used to overlap). */
  .hltb-stack{display:block; text-align:center}
  .hltb{display:flex; gap:10px; justify-content:center; white-space:nowrap}
  .hcol .v{font-family:var(--mono); font-size:15px}
  .hcol .l{font-family:var(--mono); font-size:12px; color:var(--muted-2); letter-spacing:.04em; text-transform:uppercase}
  .hcol.sel .v{color:var(--gold)} .hcol.sel .l{color:var(--gold)}
  /* estimated value (filled from the genre-average ratio, not from HLTB):
     distinct blue accent + a dotted underline as a second, color-independent cue.
     help-cursor signals the explanatory tooltip on hover. */
  .hcol.est{cursor:help}
  .hcol.est .v{color:var(--blue); border-bottom:1px dotted var(--blue); padding-bottom:1px}
  .hcol.est .l{color:var(--blue)}
  /* when an estimated column is ALSO the selected QHPP metric, gold wins for the
     number (emphasis), but keep the dotted underline so it still reads as estimated. */
  .hcol.est.sel .v{color:var(--gold); border-bottom-color:var(--gold)}
  .hcol.est.sel .l{color:var(--gold)}
  .havg{font-family:var(--mono); font-size:14px; color:var(--muted); text-align:center; margin-top:4px; white-space:nowrap}
  .havg b{color:var(--text); font-weight:700; font-size:15px}
  .havg.sel{color:var(--gold)} .havg.sel b{color:var(--gold)}

  /* Weighted (playtime-weighted rating) cell — one value next to Steam's %. */
  .wrcell{display:flex; align-items:center; justify-content:center; gap:6px; cursor:help}
  .wrcell .dot{width:8px; height:8px; border-radius:50%; flex:none}
  .wrval{font-family:var(--mono); font-size:16px; font-weight:600}
  .wrval.na{color:var(--muted-2); font-weight:400}
  .wrdelta{font-family:var(--mono); font-size:11px; padding:1px 4px; border-radius:4px; background:var(--panel-2, rgba(255,255,255,.05))}
  .wrdelta.pos{color:var(--teal)} .wrdelta.neg{color:var(--coral)}
  /* low-confidence weighted rating: grayed + dotted underline (color-independent cue) */
  .wrcell.lowconf .wrval{color:var(--muted-2); border-bottom:1px dotted var(--muted-2); padding-bottom:1px}

  /* Playtime cell — stacked recommend (▲) over not-recommend (▼) medians. */
  .ptcell{display:flex; flex-direction:column; gap:3px; align-items:flex-end}
  .ptcell.empty{color:var(--muted-2); font-family:var(--mono); text-align:right}
  .ptrow{display:flex; align-items:baseline; gap:6px; cursor:help; white-space:nowrap}
  .ptrow .ptup{color:var(--teal); font-size:12px}
  .ptrow .ptdown{color:var(--coral); font-size:12px}
  .ptval{font-family:var(--mono); font-size:15px; color:var(--text); min-width:44px; text-align:right}
  .ptval.na{color:var(--muted-2)}
  .ptval .pth{font-size:11px; color:var(--muted-2); margin-left:1px}
  .ptn{font-family:var(--mono); font-size:11px; color:var(--muted-2); min-width:30px; text-align:right}
  /* Playtime header toggle (mirrors the HLTB metric buttons) */
  /* Playtime-sort toggle lives in the filter bar and is only a selector — it uses the
     neutral segmented-control styling like every other toggle (no red/green). */
  .ptup, .ptdown{font-weight:700}
  /* The column header echoes the SELECTED median (rec ▲ / not ▼) so you can see what
     clicking the header will sort by. Active side keeps its semantic color; other is dimmed. */
  th .ptup{color:var(--teal)} th .ptdown{color:var(--coral)}
  th .ptdim{color:var(--muted-2); opacity:.4}

  .qtop{display:flex; align-items:baseline; justify-content:flex-end; gap:8px}
  .qval{font-family:var(--mono); font-size:17px; font-weight:600; color:var(--text)}
  .qalt{font-family:var(--mono); font-size:12px; color:var(--muted-2)}
  .qbar{position:relative; height:6px; background:#2a3550; border-radius:99px; margin-top:7px; overflow:hidden; align-self:stretch; width:100%}
  .qfill{position:absolute; left:0; top:0; bottom:0; border-radius:99px;
        background:linear-gradient(90deg,var(--gold-deep),var(--gold)); transition:width .3s ease}
  .qnull{font-family:var(--mono); font-size:13px; color:var(--muted-2); text-align:right}

  .empty{padding:54px 20px; text-align:center; color:var(--muted); font-size:15px}
  .empty b{color:var(--text); font-weight:600}
  .foot{margin-top:18px; font-family:var(--mono); font-size:12px; color:var(--muted-2); line-height:1.9}

  /* ── Narrow screens: table collapses to stacked cards ─────────────────────────────
     Lighter-touch pass — same card structure as before (thead hidden, each row a block,
     each cell a label→value flex line), with more generous spacing, clearer separation
     between rows, and Tags given a full-width left-aligned row so they breathe instead of
     cramming against the right edge. */
  @media (max-width:1290px){
    table{min-width:0; max-width:none; margin:0}
    colgroup{display:none}
    thead{display:none}
    table,tbody{display:block; width:100%}
    /* reset the desktop grid: rows/cells go back to block/flex card layout. These selectors
       match the base grid rules' specificity so they actually win inside the query. */
    thead tr,tbody tr{display:block; grid-template-columns:none}
    tbody tr{padding:16px 14px; border-bottom:1px solid var(--line)}
    tbody tr:nth-child(even){background:transparent}   /* no zebra in card mode — cards stay uniform */
    tbody tr:hover{background:transparent}
    tbody td,tbody td.num,tbody td.center{padding:6px 0; border:0; display:flex; flex-direction:row;
        justify-content:space-between; align-items:center; gap:16px; min-height:26px; overflow:visible}
    td.pad{padding:6px 0}
    tbody td::before{content:attr(data-label); font-family:var(--mono); font-size:12px; letter-spacing:.04em;
        text-transform:uppercase; color:var(--muted-2); flex:none}
    .gtitle{-webkit-line-clamp:3}
    .thumb{width:184px; height:69px}
    .pricebox{align-items:flex-end}
    .num,.qtop,.hltb{justify-content:flex-end}
    .center{justify-content:flex-end !important}
    .ratecell{align-items:flex-end}
    .hltb-stack{text-align:right}
    td.tdqhpp{flex-wrap:wrap}
    .qbar{flex:1; max-width:180px; margin-top:0}
    .age,.updated{text-align:right}
    .grouplabel{width:auto; text-align:left}
    /* Tags: full-width row, label on its own line, chips wrap left-aligned with room. */
    td[data-label="Tags"]{flex-direction:column; align-items:stretch; gap:6px}
    .tags{justify-content:flex-start; margin-top:2px}
  }

  /* ── Phones (~≤560px): finer sizing so the tightest rows don't collide ──────────────
     Smaller thumbnail, roomier tap targets, and the Game header allowed to stack the
     title under the thumbnail when the row gets truly narrow. */
  @media (max-width:560px){
    .tablecard{border-radius:10px; margin-top:8px}
    tbody tr{padding:14px 12px}
    tbody td{padding:7px 0; gap:12px}
    .thumb{width:132px; height:50px}
    .gamecell{gap:8px}
    .gtitle{font-size:15px}
    /* the three HLTB figures + avg can crowd their label on a phone: give the value side
       priority and let the label sit above it if space is tight. */
    td[data-label="HLTB M/E/100%"]{align-items:flex-start}
    .hltb{gap:8px}
  }
  @media (prefers-reduced-motion:reduce){ .qfill{transition:none} }
</style>

<body>

<div class="topbar compact" id="topbar">
 <div class="wrap">
  <div class="barwrap">
    <div class="bar-main">
      <div class="brand">
        <div class="logo">Q<b>H</b>PP</div>
        <div class="tagline">quality hours per price · steam value hunter</div>
      </div>
      <label class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
        <input id="q" type="search" placeholder="Search a game title…" autocomplete="off" />
      </label>
      <div class="meta" id="meta"></div>
      <div class="pagesize" id="pagesize" title="Games shown per page (scroll down to load more)">
        <span class="pagesize-lbl">per page</span>
        <button data-size="100" class="on">100</button>
        <button data-size="500">500</button>
        <button data-size="2000">2000</button>
      </div>
    </div>

    <div class="bar-filters" id="barFilters">
      <div class="ctl-row">
        <div class="wishrow">
          <span class="wishlabel">Wishlist</span>
          <div class="wishbox">
            <input id="steamid" type="text" placeholder="profile URL, name, SteamID64, STEAM_0:… — any format" autocomplete="off" />
            <button id="wishimport" type="button">Import</button>
          </div>
          <button class="toggle wish" id="wishOnly" aria-pressed="false" style="display:none">Wishlist only</button>
          <button class="wishclear" id="wishClear" style="display:none">✕ Clear</button>
        </div>
        <button class="linkbtn" id="clear" style="margin-left:auto">Reset all filters</button>
      </div>

      <div class="ctl-row">
        <div class="field">
          <label>QHPP price basis</label>
          <div class="seg" role="group" aria-label="QHPP price basis">
            <button id="qb-after"  aria-pressed="true"  title="Base QHPP on the current discounted (sale) price">Sale</button>
            <button id="qb-before" aria-pressed="false" title="Base QHPP on the full (non-sale) price">Full</button>
          </div>
        </div>
        <div class="field">
          <label>HLTB metric for QHPP</label>
          <div class="seg metric" role="group" aria-label="HLTB metric">
            <button data-metric="main"     aria-pressed="true"  title="Main Story: hours to finish the core game, ignoring side content (HowLongToBeat).">Main</button>
            <button data-metric="extra"    aria-pressed="false" title="Main + Extras: the main story plus most side quests and optional content (HowLongToBeat).">+Extras</button>
            <button data-metric="complete" aria-pressed="false" title="Completionist: hours to do everything, 100% completion (HowLongToBeat).">100%</button>
            <button data-metric="avg"      aria-pressed="false" title="Average of the Main, +Extras, and 100% times.">Avg</button>
          </div>
        </div>
        <div class="field">
          <label>HLTB data</label>
          <div class="seg" role="group" aria-label="HLTB data quality">
            <button data-hquality="loose" aria-pressed="false" title="Use estimated HLTB values (filled from genre-average ratios) when HowLongToBeat is missing a time.">All</button>
            <button data-hquality="real" aria-pressed="true" title="Only use real HowLongToBeat values. Estimated times are hidden and not used, so games without a real value for the selected metric show no HLTB/QHPP.">Real</button>
          </div>
        </div>
        <div class="field">
          <label>Min rating</label>
          <div class="seg" role="group" aria-label="Minimum rating">
            <button data-minscore="0"  aria-pressed="true">Any</button>
            <button data-minscore="60" aria-pressed="false">60+</button>
            <button data-minscore="70" aria-pressed="false">70+</button>
            <button data-minscore="80" aria-pressed="false">80+</button>
            <button data-minscore="90" aria-pressed="false">90+</button>
          </div>
        </div>
        <div class="field">
          <label>Reviews sort by</label>
          <div class="seg" role="group" aria-label="Rating source for the Reviews column sort">
            <button data-ratesrc="all"    aria-pressed="false" title="Sort the Reviews column by the all-time review score">All-time</button>
            <button data-ratesrc="recent" aria-pressed="true"  title="Sort the Reviews column by the past-30-day review score">30-day</button>
          </div>
        </div>
        <div class="field">
          <label>Playtime sort</label>
          <div class="seg" role="group" aria-label="Which median drives the Playtime column sort">
            <button data-ptmetric="up"   aria-pressed="true"  title="Sort the Playtime column by recommenders' median playtime">▲ rec</button>
            <button data-ptmetric="down" aria-pressed="false" title="Sort the Playtime column by non-recommenders' median playtime">▼ not</button>
          </div>
        </div>
        <div class="field">
          <label>Min reviews</label>
          <div class="seg" role="group" aria-label="Minimum review count">
            <button data-rev="0" aria-pressed="false" title="0-9 reviews">0</button>
            <button data-rev="1" aria-pressed="true" title="10-99 reviews">10</button>
            <button data-rev="2" aria-pressed="true" title="100-999 reviews">100</button>
            <button data-rev="3" aria-pressed="true" title="1k-4.9k reviews">1k</button>
            <button data-rev="4" aria-pressed="true" title="5k+ reviews">5k+</button>
          </div>
        </div>
        <div class="field">
          <label>Price range (USD)</label>
          <div style="display:flex; align-items:center; gap:6px">
            <span class="pricesep">min $</span>
            <div class="numinput"><input id="minprice" type="number" min="0" step="1" inputmode="decimal" placeholder="0" />
              <span class="steppers"><button type="button" data-step="minprice" data-d="1">▲</button><button type="button" data-step="minprice" data-d="-1">▼</button></span></div>
            <span class="pricesep">– max $</span>
            <div class="numinput"><input id="maxprice" type="number" min="0" step="1" inputmode="decimal" placeholder="∞" />
              <span class="steppers"><button type="button" data-step="maxprice" data-d="1">▲</button><button type="button" data-step="maxprice" data-d="-1">▼</button></span></div>
          </div>
        </div>
        <div class="field" style="align-self:flex-end">
          <label>&nbsp;</label>
          <button class="toggle" id="saleOnly" aria-pressed="false">On sale only</button>
        </div>
        <div class="field">
          <label>Review trend</label>
          <div class="seg" role="group" aria-label="Review trend">
            <button data-trend="up" aria-pressed="true" title="Improving: recent score above all-time">▲</button>
            <button data-trend="flat" aria-pressed="true" title="Stable: recent score near all-time">≈</button>
            <button data-trend="down" aria-pressed="true" title="Declining: recent score below all-time">▼</button>
          </div>
        </div>
        <div class="field">
          <label>Updated within</label>
          <div class="seg" role="group" aria-label="Updated within">
            <button data-upd="any"  aria-pressed="true">Any</button>
            <button data-upd="1mo">1mo</button>
            <button data-upd="3mo">3mo</button>
            <button data-upd="6mo">6mo</button>
            <button data-upd="1yr">1yr</button>
            <button data-upd="1yr+" title="No update in over a year (abandonware)">1yr+</button>
          </div>
        </div>
        <div class="field rangefield">
          <label>QHPP range (log scale, fits current results)</label>
          <div class="rangewrap">
            <div class="rangetrack"><div class="rangefill" id="qrangefill"></div></div>
            <input type="range" id="qmin" min="0" max="1000" step="1" value="0" />
            <input type="range" id="qmax" min="0" max="1000" step="1" value="1000" />
          </div>
          <div class="rangevals"><b id="qminv">0</b> to <b id="qmaxv">∞</b></div>
        </div>
      </div>

      <div class="ctl-row">
        <div class="taglegend" aria-hidden="true">
          <span>Click a tag:</span>
          <span class="chip inc"><span class="mk">✓</span>require</span>
          <span class="tl-arrow">→ again:</span>
          <span class="chip exc"><span class="mk">✕</span>exclude</span>
          <span class="tl-arrow">→ again: clear</span>
        </div>
        <div class="tagrail-wrap" id="tagrail" style="flex:1"
             title="Click a tag to require it · click again to exclude it · once more to clear. Counts update to show how many of the current results have each tag."></div>
      </div>
    </div>

    <button class="collapse-handle" id="collapseBtn"><span id="collapseLabel">⌄ Show filters</span></button>
  </div>
 </div>
</div>

<div class="wrap body">
  <div class="tablecard">
    <div class="tablescroll">
      <table>
        <colgroup>
          <col class="c-game"/><col class="c-rev"/><col class="c-weighted"/><col class="c-trend"/><col class="c-price"/><col class="c-disc"/>
          <col class="c-sale"/><col class="c-rel"/><col class="c-tags"/><col class="c-playtime"/><col class="c-hltb"/><col class="c-qhpp"/>
        </colgroup>
        <thead>
          <tr>
            <th class="sortable" data-sort="title">Game</th>
            <th class="sortable" data-sort="rating_pct" title="All-time over recent (past 30 days) review score">Reviews</th>
            <th class="sortable num" data-sort="wr" title="Playtime-weighted rating: each review counted by how long that player actually played (capped at 2× the game's median so no single obsessive dominates). A recommendation from someone with 300 hours counts more than a 20-minute one. Compare against Steam's flat % in the tooltip. Grayed when too few reviews to be reliable.">Weighted</th>
            <th class="sortable center" data-sort="trend" title="Recent minus all-time — improving, stable, or declining">Trend</th>
            <th class="sortable" data-sort="price_final">Price</th>
            <th class="sortable center" data-sort="discount_pct">Discount</th>
            <th class="sortable center" data-sort="discount_end">Sale ends</th>
            <th class="sortable center" data-sort="release_ts">Released</th>
            <th>Tags</th>
            <th class="sortable num pad" data-sort="playtime" title="Median hours played, split by review recommendation. Green ▲ = players who recommended it; red ▼ = players who did not. A long playtime on a 'not recommended' is a credible signal (someone knows the game well and still says skip it). Hover a value for mean, sample size, and spread. Click to sort; choose which side drives the sort with the Playtime-sort toggle in the filters.">Playtime · <span class="ptup" id="pthUp">▲</span>/<span class="ptdown" id="pthDown">▼</span></th>
            <th class="sortable num pad" data-sort="hltb" title="Main / Main+Extras / Completionist (hours), with average below. Sorts by whichever HLTB metric is selected above.">HLTB · M / E / 100%</th>
            <th class="sortable num pad" data-sort="qhpp">QHPP <span class="arrow" id="qarrow">▼</span></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="loadmore" id="loadmore" style="display:none"></div>
    <div class="empty" id="empty" style="display:none"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<div class="toast-host" id="toastHost"></div>

<script>

// Steam's CDN sometimes answers a missing capsule with a 200 + a blank/degenerate

// or empty thumb. We therefore advance the chain on BOTH a hard error AND a "loaded

// at the end (leaving the last-attempted src in place).
function stepThumb(img, hardError){
  // "loaded but empty" guard: a successfully decoded real image has naturalWidth > 1.
  if(!hardError && img.naturalWidth > 1) return;   // genuine image -> keep it
  const a = img.getAttribute("data-appid");
  let step = (+img.getAttribute("data-step") || 0) + 1;
  const chain = imgChain(a);
  if(step < chain.length){
    img.setAttribute("data-step", step);
    img.src = chain[step];
  }
  // else: exhausted the chain; leave the last attempt as-is (rare).
}

// ----- QHPP log range; resets to fit on any non-range filter change -----
const posToVal = (pos, dmax) => Math.pow(dmax + 1, pos/1000) - 1;

function recomputeDomain(){

    // user set the range explicitly (incl. via URL) — keep it, just clamp to new domain
    state.qMinVal = Math.min(state.qMinVal, state.qDomain);
    if(!state.qMaxUnbounded) state.qMaxVal = Math.min(state.qMaxVal, state.qDomain);

               + `<div class="havg${sel==='avg'?' sel':''}">avg <b>${fmtHLTB(avgShown)}</b> h</div></div>`;

    // QHPP cell: positions are FIXED — after-discount (sale) always left/primary,
    // full-price always right/secondary — they never swap. The active price-basis
    // toggle just highlights which one drives sort+filter. When not on sale the two
    // are equal, so show a single value. The bar (fillPct) is log-scaled.
    const qAfter = computeQ(g, "after");     // sale-price QHPP
    const qFull  = computeQ(g, "before");    // full-price QHPP
    const onSale = g.discount_pct > 0 && qAfter != null && qFull != null && qAfter !== qFull;
    // QHPP display precision: 3-digit values → 0 decimals, 2-digit → 1, 1-digit → 2.
    const fmtQ = v => v >= 100 ? v.toFixed(0) : v >= 10 ? v.toFixed(1) : v.toFixed(2);
    let qhpp;
    if(qAfter == null && qFull == null){
      qhpp = `<div class="qnull">—</div>`;
    } else if(!onSale){
      // single number (not discounted, or one side missing); highlight if its basis is active
      const v = qAfter != null ? qAfter : qFull;
      const barV = activeQ(g);
      qhpp = `<div class="qtop"><span class="qval qfull" title="Not on sale — quality-adjusted hours per price at the full price">${fmtQ(v)}</span><span class="qtag full" title="This game isn't discounted, so its QHPP is based on the full price">full</span></div>`
           + `<div class="qbar"><div class="qfill" style="width:${fillPct(barV).toFixed(1)}%"></div></div>`;
    } else {
      const aSel = state.qBasis === "after", bSel = state.qBasis === "before";
      const left  = `<span class="qval${aSel?' qsel':' qdim'}" title="QHPP at the discounted (sale) price — quality-adjusted hours per dollar right now">${fmtQ(qAfter)}</span>`;
      const right = `<span class="qalt${bSel?' qsel':''}" title="QHPP at the full (non-sale) price — what the value is once the discount ends">${fmtQ(qFull)} full</span>`;
      const barV = activeQ(g);
      qhpp = `<div class="qtop">${left}${right}</div>`
           + `<div class="qbar"><div class="qfill" style="width:${fillPct(barV).toFixed(1)}%"></div></div>`;
    }

    const wished = state.wishlist && state.wishlist.has(g.appid) ? '<span class="wish-dot" title="On your wishlist"></span>' : '';
    const age = ageStr(g.release_ts);

    // stacked reviews: all-time over recent (recent greyed when stale / absent)
    const allRow = `<div class="rrow" title="All-time: ${g.rating_pct==null?'no':g.rating_pct+'% of '+(g.review_count||0).toLocaleString()} reviews positive">`
      + `<span class="rlbl">all</span><span class="dot" style="background:${ratingColor(g.rating_pct)}"></span>`
      + `<span class="rval" style="color:${ratingColor(g.rating_pct)}">${g.rating_pct==null?'—':g.rating_pct+'%'}</span>`
      + `<span class="rcount">${compactNum(g.review_count)}</span></div>`;
    const stale = recentStale(g);
    let recRow;
    if(g.recent_pct == null){
      recRow = `<div class="rrow recent muted" title="No recent review score (Steam shows one only for games 45+ days old with enough recent reviews)"><span class="rlbl">30d</span>`
        + `<span class="dot" style="background:var(--muted-2)"></span><span class="rval">—</span></div>`;
    } else {
      recRow = `<div class="rrow recent${stale?' stale':''}" title="Recent Reviews (past 30 days): ${g.recent_pct}% of ${(g.recent_count||0).toLocaleString()} reviews${stale?' · score is over '+RECENT_STALE_DAYS+' days old':''}">`
        + `<span class="rlbl">30d</span><span class="dot" style="background:${stale?'var(--muted-2)':ratingColor(g.recent_pct)}"></span>`
        + `<span class="rval"${stale?'':` style="color:${ratingColor(g.recent_pct)}"`}>${g.recent_pct}%</span>`
        + `<span class="rcount">${compactNum(g.recent_count)}</span></div>`;
    }
    const reviews = `<div class="ratecell">${allRow}${recRow}</div>`;

    // trend column: recent − all-time, with dead-band; greyed if stale
    const tcls = trendClass(g), tval = gTrend(g);
    let trend;
    if(tcls === "none") trend = `<span class="trend none">—</span>`;
    else if(tcls === "flat") trend = `<span class="trend flat${stale?' stale':''}" title="Stable: recent within 3 pts of all-time">≈</span>`;
    else if(tcls === "up") trend = `<span class="trend up${stale?' stale':''}" title="Improving: recent ${tval} pts above all-time">▲ ${tval}</span>`;
    else trend = `<span class="trend down${stale?' stale':''}" title="Declining: recent ${Math.abs(tval)} pts below all-time">▼ ${Math.abs(tval)}</span>`;

    // Weighted rating cell: playtime-weighted % (capped variant), shown next to
    // Steam's flat %. Grayed (low-confidence) when fewer than PT_CONFIDENT reviews.
    let wrCell;
    if(g.wr == null){
      wrCell = `<div class="wrcell"><span class="wrval na">—</span></div>`;
    } else {
      const lowConf = (g.wr_n != null && g.wr_n < window.PT_CONFIDENT);
      const delta = (g.wr_steam != null) ? Math.round(g.wr - g.wr_steam) : null;
      const deltaStr = delta == null ? "" : (delta > 0 ? `+${delta}` : `${delta}`);
      const tip = `Playtime-weighted: ${g.wr}% (from ${g.wr_n} reviews). `
        + `Steam flat %: ${g.wr_steam==null?'—':g.wr_steam+'%'}`
        + (delta!=null?` (${deltaStr} pts vs Steam)`:``)
        + `. Uncapped weighted: ${g.wr_raw==null?'—':g.wr_raw+'%'}.`
        + (lowConf?` ⚠ Only ${g.wr_n} reviews — low confidence, needs ${window.PT_CONFIDENT}+ to be reliable.`:``);
      wrCell = `<div class="wrcell${lowConf?' lowconf':''}" title="${tip}">`
        + `<span class="dot" style="background:${lowConf?'var(--muted-2)':ratingColor(g.wr)}"></span>`
        + `<span class="wrval" style="${lowConf?'':`color:${ratingColor(g.wr)}`}">${g.wr}%</span>`
        + (delta!=null&&!lowConf?`<span class="wrdelta ${delta>0?'pos':delta<0?'neg':''}">${deltaStr}</span>`:``)
        + `</div>`;
    }

    // Playtime cell: stacked medians, green ▲ (recommend) over red ▼ (not-recommend).
    // Clean median shown; mean + sample + p25-p75 spread on hover (computed frontend-side
    // is impossible here since we only ship medians — so the hover shows median + n + the
    // opposite-side comparison, which is the useful at-a-glance info from the summary).
    const ptRow = (mins, n, up) => {
      const arrow = up ? '▲' : '▼';
      const cls = up ? 'ptup' : 'ptdown';
      if(mins == null){
        return `<div class="ptrow" title="${up?'Recommend':'Not recommend'}: too few reviews (need 3+) for a median">`
             + `<span class="${cls}">${arrow}</span><span class="ptval na">—</span></div>`;
      }
      const h = (mins/60);
      // 2-digit+ hours drop the decimal (it's just noise); only sub-10h keep one decimal.
      const hStr = h >= 10 ? Math.round(h) : h.toFixed(1);
      // Sample size (n) stays in the data + tooltip, but is no longer shown inline — the
      // column reads as playtime only, far less clutter.
      const tip = `${up?'Recommenders':'Non-recommenders'}: median ${hStr}h across ${n} review${n===1?'':'s'}`;
      return `<div class="ptrow" title="${tip}">`
           + `<span class="${cls}">${arrow}</span>`
           + `<span class="ptval">${hStr}<span class="pth">h</span></span></div>`;
    };
    let ptCell;
    if(g.pt_up == null && g.pt_down == null){
      ptCell = `<div class="ptcell empty">—</div>`;
    } else {
      ptCell = `<div class="ptcell">${ptRow(g.pt_up, g.pt_nup, true)}${ptRow(g.pt_down, g.pt_ndown, false)}</div>`;
    }

    return `<tr>
      <td data-label="Game"><div class="gamecell">
          <button class="hidebtn" data-hide="${g.appid}" title="Hide this game for this session" aria-label="Hide ${esc(g.title)}">×</button>
          <span class="thumb${isAdult(g) ? ' adult' : ''}" data-appid="${g.appid}">
            <img loading="lazy" src="${capsuleUrl(g.appid)}" alt="" referrerpolicy="no-referrer"
                 data-appid="${g.appid}" data-step="0"
                 onerror="stepThumb(this,true)" onload="stepThumb(this,false)" />
            <span class="pop"><img alt="" referrerpolicy="no-referrer" /></span>
          </span>
          <span class="gmeta">
            <a class="gtitle" href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.title)}</a>${wished}
            <div class="gsub">${g.review_count? g.review_count.toLocaleString()+" reviews" : "app "+g.appid}</div>
          </span></div></td>
      <td data-label="Reviews">${reviews}</td>
      <td data-label="Weighted" class="num">${wrCell}</td>
      <td data-label="Trend" class="center">${trend}</td>
      <td data-label="Price">${price}</td>
      <td data-label="Discount" class="center">${disc}</td>
      <td data-label="Sale ends" class="center">${sale}</td>
      <td data-label="Released" class="center"><span class="rel">${fmtRelease(g)}</span>${age?`<div class="age">${age}</div>`:""}<div class="updated${!g.last_update_ts?' none':''}" title="${g.last_update_ts?'Last content update: '+new Date(g.last_update_ts*1000).toISOString().slice(0,10):'No update posts found on Steam'}">${updatedStr(g.last_update_ts)}</div></td>
      <td data-label="Tags"><div class="tags">${tagHtml}</div></td>
      <td data-label="Playtime" class="num pad">${ptCell}</td>
      <td data-label="HLTB M/E/100%" class="num pad">${hltb}</td>
      <td data-label="QHPP" class="num pad tdqhpp">${qhpp}</td>
    </tr>`;
  }).join("");

  // Infinite scroll: if more filtered games remain beyond the current page, show a
  // sentinel row at the bottom; an IntersectionObserver loads the next page when it
  // scrolls into view. Otherwise show nothing (we've rendered everything).
  const remaining = state._totalFiltered - games.length;
  const foot = $("#loadmore");
  if(remaining > 0){
    foot.style.display = "";
    foot.textContent = `Showing ${games.length} of ${state._totalFiltered} — scroll for more…`;
    ensurePageObserver();
  } else {
    foot.style.display = "none";
  }
  renderMeta();
}

// Lazily create one IntersectionObserver that watches the loadmore sentinel. When it
// becomes visible, bump pagesShown and re-render (which appends the next slice).
let _pageObserver = null;
function ensurePageObserver(){
  if(_pageObserver) return;
  const foot = $("#loadmore");
  _pageObserver = new IntersectionObserver(entries => {
    if(entries.some(e => e.isIntersecting)){
      // Only grow if there's actually more to show.
      if(state.pageSize * state.pagesShown < state._totalFiltered){
        state.pagesShown += 1;
        render();
      }
    }
  }, {rootMargin: "400px"});   // start loading a bit before the user hits the very bottom
  _pageObserver.observe(foot);
}

// Reset to page 1 whenever the filtered set changes (filter/sort/search/page-size change),
// so the user starts at the top of the new result set rather than deep in a stale page.
function resetPaging(){ state.pagesShown = 1; }

// ----- tag rail: stable membership (full counts), contextual badges -----
function computeFullCounts(){
  const counts = {};
  state.data.games.forEach(g => canonSet(g).forEach(t => counts[t] = (counts[t]||0)+1));
  state.fullCounts = counts;
}
function buildTagRail(){
  const full = state.fullCounts;
  // contextual counts over the current (non-range) filtered set
  const ctx = {};
  state.data.games.filter(passNonRange).forEach(g => canonSet(g).forEach(t => ctx[t] = (ctx[t]||0)+1));
  const active = new Set([...state.tagsInc, ...state.tagsExc]);
  const buckets = {}; GROUP_ORDER.forEach(g => buckets[g] = []);
  Object.keys(full).forEach(t => {
    if(full[t] < MIN_TAG_COUNT && !active.has(t)) return;     // stable membership: hide rare tags
    buckets[TAG_CAT[t] || "Other"].push(t);
  });
  const label = t => t.replace(/\b\w/g, c=>c.toUpperCase());
  const chipHtml = (t, extra) => {
    const c = ctx[t] || 0;
    const f = full[t] || 0;
    // Show one number when the filtered count equals the full-corpus count (e.g. on first
    // load with no filters). Once filtering diverges them, show "filtered / total".
    const countStr = (c === f) ? `${f}` : `${c} / ${f}`;
    // Reserve width for the WIDEST form this chip can ever show ("full / full", e.g.
    // "211 / 211") so that when a filter introduces the second number the chip doesn't
    // grow — no reflow/flicker across the whole rail. In a mono font, ch units map to
    // character widths exactly: 2×digits + 3 (the " / " separator) + ~1ch headroom.
    const digits = String(f).length;
    const reserveCh = 2 * digits + 3 + 1;
    let cls = "chip", mk = "";
    if(extra) cls += " tag-extra";
    if(state.tagsInc.has(t)){ cls += " inc"; mk = '<span class="mk">✓</span>'; }
    else if(state.tagsExc.has(t)){ cls += " exc"; mk = '<span class="mk">✕</span>'; }
    else if(c === 0){ cls += " dim"; }
    return `<button class="${cls}" data-tag="${esc(t)}" title="${c} of current results · ${f} total">${mk}${esc(label(t))}<span class="ct" style="min-width:${reserveCh}ch">${countStr}</span></button>`;
  };
  const byName = (a,b) => a.localeCompare(b);
  // Groups small enough to always show in full (no top-10 split). Players & Mode is short.
  const NO_SPLIT = new Set(["Players & Mode"]);
  const TOP_N = 10;

  let html = "";
  GROUP_ORDER.forEach(g => {
    const tags = buckets[g];
    if(!tags.length) return;

    let foundation, overflow;
    if(NO_SPLIT.has(g) || tags.length <= TOP_N){
      // Show everything, alphabetical. No overflow tier.
      foundation = tags.slice().sort(byName);
      overflow = [];
    } else {
      // Foundation = the TOP_N most-USED tags (membership by full-corpus count desc,
      // name asc as a stable tiebreak). Overflow = the rest. Each tier is then sorted
      // ALPHABETICALLY on its own, so chips never reshuffle by count — two independent
      // A-Z lists (foundation row, then overflow row). Any active (include/exclude) tag
      // is forced into the foundation so a selected chip is never hidden behind "+ more".
      const forced = tags.filter(t => active.has(t));
      const rest = tags.filter(t => !active.has(t));
      rest.sort((a,b) => (full[b]-full[a]) || byName(a,b));   // rank by usage for membership
      const topSet = new Set([...forced, ...rest.slice(0, Math.max(0, TOP_N - forced.length))]);
      foundation = tags.filter(t => topSet.has(t)).sort(byName);
      overflow   = tags.filter(t => !topSet.has(t)).sort(byName);
    }

    const chips = foundation.map(t => chipHtml(t, false)).join("")
                + overflow.map(t => chipHtml(t, true)).join("");
    const moreBtn = overflow.length
      ? `<button class="tagmore" data-more="${esc(g)}">+${overflow.length} more</button>`
      : "";
    html += `<div class="taggroup" data-group="${esc(g)}"><span class="grouplabel">${g}</span>`
          + `<span class="grouptags">${chips}${moreBtn}</span></div>`;
  });
  $("#tagrail").innerHTML = html;
}
function hideGame(appid){
  state.hidden.add(Number(appid));
  update();                        // re-render without it; refreshes counts + hidden control
}
function unhideAll(){
  state.hidden.clear();
  update();
}

function cycleTag(t, dir){
  // 3-state cycle: none -> include -> exclude -> none.
  // dir=+1 (left-click) walks forward, dir=-1 (right-click) walks backward.
  t = canon(t.toLowerCase());
  const inc = state.tagsInc.has(t), exc = state.tagsExc.has(t);
  const cur = inc ? 1 : exc ? 2 : 0;          // 0 none, 1 include, 2 exclude
  const next = (cur + (dir < 0 ? 2 : 1)) % 3; // +1 forward, +2 ≡ -1 backward (mod 3)
  state.tagsInc.delete(t); state.tagsExc.delete(t);
  if(next === 1) state.tagsInc.add(t);
  else if(next === 2) state.tagsExc.add(t);
  syncURL();
  update();
}

// ----- wishlist -----
// SteamID64 = base + accountID.  These three formats are pure math (no network):
//   steamID64  76561198019774128
//   steamID2   STEAM_0:0:29754200   -> accountID = Z*2 + Y
//   steamID3   [U:1:59508400]       -> accountID = the bracketed number
const STEAMID64_BASE = 76561197960265728n; // 0x0110000100000000 (individual account, public universe)
// Resolve an input string to a SteamID64 *without* any network call.
// Returns { id } when solvable locally, { vanity } when it needs a keyed Steam
// lookup (a /id/<name> URL or a bare custom name), or null when unrecognisable.
function parseSteamId(input){
  input = (input||"").trim();
  if(!input) return null;

  // steamID64: 17 digits, bare or inside a /profiles/<id> URL
  let m = input.match(/(?:profiles\/)?(\d{17})(?:[/?#]|$)/);
  if(m) return { id: m[1] };

  // steamID2:  STEAM_X:Y:Z  (X universe ignored, accountID = Z*2 + Y)
  m = input.match(/^STEAM_[0-5]:([01]):(\d+)$/i);
  if(m){
    const acct = BigInt(m[2]) * 2n + BigInt(m[1]);
    return { id: (STEAMID64_BASE + acct).toString() };
  }

  // steamID3:  [U:1:accountID]  or bare  U:1:accountID
  m = input.match(/^\[?U:1:(\d+)\]?$/i);
  if(m) return { id: (STEAMID64_BASE + BigInt(m[1])).toString() };

  // vanity /id/<name> URL  ->  needs the Worker to resolve
  m = input.match(/steamcommunity\.com\/id\/([^/?#]+)/i);
  if(m) return { vanity: decodeURIComponent(m[1]) };

  // bare custom name (letters/digits/_-, not all-numeric) -> treat as vanity
  if(/^[A-Za-z0-9_-]{2,32}$/.test(input) && !/^\d+$/.test(input)){
    return { vanity: input };
  }

  return null;
}
// ===== Wishlist import via the QHPP Cloudflare Worker proxy =====
// The Worker calls Steam server-side (no CORS, key kept secret) and returns just the
// appid list. SET THIS to your deployed Worker URL (e.g. the *.workers.dev address, or
// your custom route). Until it's set, the import button explains it's not configured.
const WISHLIST_PROXY = "https://qhpp-wishlist.mlmariss.workers.dev";

async function importWishlist(){
  const parsed = parseSteamId($("#steamid").value);
  if(!parsed){
    toast(`Couldn't read that. Paste your <b>profile URL</b> (<code>/id/name</code> or <code>/profiles/&lt;id&gt;</code>), a 17-digit <b>SteamID64</b>, a <code>STEAM_0:…</code> or <code>[U:1:…]</code> ID, or your custom name. Not sure? Look it up at <a href="https://steamid.io" target="_blank" rel="noopener">steamid.io</a>.`, "err", 11000);
    return;
  }
  if(WISHLIST_PROXY.includes("REPLACE-WITH-YOUR-WORKER")){
    toast(`Wishlist import isn't configured yet (no proxy URL set).`, "err", 8000);
    return;
  }

  // Vanity name → resolve to SteamID64 via the Worker first.
  let id = parsed.id;
  if(!id && parsed.vanity){
    toast("Resolving profile name…", "", 4000);
    let vres = null, vnet = false;
    try {
      const r = await fetch(`${WISHLIST_PROXY}/?vanity=${encodeURIComponent(parsed.vanity)}`, {cache:"no-store"});
      vres = await r.json().catch(() => null);
    } catch(e){ vnet = true; }
    if(vnet || !vres){
      toast(`Couldn't reach the lookup service. Check your connection and try again in a moment.`, "err", 9000);
      return;
    }
    if(vres.ok === false || !vres.steamid){
      toast(`No Steam profile found for <b>${parsed.vanity}</b>. Check the name, or paste your full <code>/profiles/&lt;id&gt;</code> URL or SteamID64 instead.`, "err", 10000);
      return;
    }
    id = vres.steamid;
  }
  toast("Fetching wishlist…", "", 4000);

  let data = null, netError = false;
  try {
    const r = await fetch(`${WISHLIST_PROXY}/?steamid=${encodeURIComponent(id)}`, {cache:"no-store"});
    data = await r.json().catch(() => null);
  } catch(e){ netError = true; }

  if(netError || !data){
    toast(`Couldn't reach the wishlist service. Check your connection and try again in a moment.`, "err", 9000);
    return;
  }
  if(data.ok === false){
    if(data.reason === "private_or_empty"){
      toast(`No games came back. Either the wishlist is empty, or the profile's <b>game details</b> are private — set them to Public at <a href="https://steamcommunity.com/my/edit/settings" target="_blank" rel="noopener">steamcommunity.com/my/edit/settings</a>, then retry.`, "err", 11000);
    } else if(data.reason === "bad_steamid"){
      toast(`That SteamID didn't look valid (need the 17-digit SteamID64).`, "err", 8000);
    } else {
      toast(`Steam didn't respond (it may be down or rate-limiting). Try again shortly.`, "err", 9000);
    }
    return;
  }

  const appids = Array.isArray(data.appids) ? data.appids : [];
  if(!appids.length){
    toast(`No wishlist games returned.`, "err", 7000);
    return;
  }
  state.wishlist = new Set(appids);
  const inDb = state.data.games.filter(g => state.wishlist.has(g.appid)).length;
  toast(`Imported <b>${state.wishlist.size}</b> wishlist games — <b>${inDb}</b> are in this database.`, "ok", 7000);
  $("#wishOnly").style.display = ""; $("#wishClear").style.display = "";
  update();
}
function clearWishlist(){
  state.wishlist = null; state.wishOnly = false;
  $("#wishOnly").style.display = "none"; $("#wishOnly").setAttribute("aria-pressed","false");
  $("#wishClear").style.display = "none"; $("#steamid").value = "";
  update();
}

// ----- sorting -----
function syncSortArrows(){
  document.querySelectorAll("thead th.sortable").forEach(th=>{
    const existing = th.querySelector(".arrow");
    if(th.dataset.sort === state.sortKey){
      const mark = state.sortDir < 0 ? "▼" : "▲";
      if(existing) existing.textContent = mark;
      else th.insertAdjacentHTML("beforeend", ` <span class="arrow">${mark}</span>`);
    } else if(existing && th.dataset.sort !== "qhpp"){
      existing.remove();
    } else if(existing && th.dataset.sort === "qhpp" && state.sortKey !== "qhpp"){
      existing.textContent = "▼";   // default QHPP arrow stays as a hint
    }
  });
}
function setSort(key){
  if(state.sortKey === key){ state.sortDir *= -1; }
  else { state.sortKey = key; state.sortDir = (key === "title") ? 1 : -1; }
  document.querySelectorAll("thead th.sortable").forEach(th=>{
    const existing = th.querySelector(".arrow");
    if(th.dataset.sort === key){
      const mark = state.sortDir < 0 ? "▼" : "▲";
      if(existing) existing.textContent = mark;
      else th.insertAdjacentHTML("beforeend", ` <span class="arrow">${mark}</span>`);
    } else if(existing && th.dataset.sort !== "qhpp"){ existing.remove(); }
  });
  render(); syncURL();
}
function setBasis(b){
  state.qBasis = b;
  $("#qb-after").setAttribute("aria-pressed", b==="after");
  $("#qb-before").setAttribute("aria-pressed", b==="before");
  update();
}
function setMetric(m){
  state.hltbMetric = m;
  document.querySelectorAll("[data-metric]").forEach(o => o.setAttribute("aria-pressed", o.dataset.metric===m));
  update();
}
// Playtime-sort toggle: this only *selects* which median (recommenders' ▲ or
// non-recommenders' ▼) the Playtime column sorts by — it does not sort on its own.
// The row order changes only when Playtime is the active sort (i.e. after its header is
// clicked). Otherwise we just record the choice and update the header hint.
function syncPtHeader(){
  const up = document.getElementById("pthUp"), dn = document.getElementById("pthDown");
  if(!up || !dn) return;
  const rec = state.ptMetric === "up";
  up.classList.toggle("ptdim", !rec);   // dim whichever side isn't selected
  dn.classList.toggle("ptdim", rec);
}
function setPtMetric(m){
  state.ptMetric = m;
  document.querySelectorAll("[data-ptmetric]").forEach(o => o.setAttribute("aria-pressed", o.dataset.ptmetric===m));
  syncPtHeader();                                // header shows what a header-click will sort by
  if(state.sortKey === "playtime"){ update(); }   // re-sort only if already sorting by playtime
  else { syncURL(); }                             // otherwise just persist the selection
}

// ----- URL state: shareable, refresh-safe filter permalinks -----
// Compact querystring so a filtered view can be copy-pasted or reloaded. Session-only
// state (hidden games) is deliberately NOT serialized. The QHPP slider is serialized
// only when manually moved (qRangeTouched), since it otherwise auto-fits the results.
let _urlSuspended = false;     // guard so loadFromURL() doesn't trigger a write mid-restore

function syncURL(){
  if(_urlSuspended) return;
  const p = new URLSearchParams();
  if(state.q) p.set("q", state.q);
  if(state.tagsInc.size) p.set("inc", [...state.tagsInc].join(","));
  if(state.tagsExc.size) p.set("exc", [...state.tagsExc].join(","));
  if(state.saleOnly) p.set("sale", "1");
  if(state.qBasis !== "after") p.set("basis", state.qBasis);
  if(state.hltbMetric !== "main") p.set("hltb", state.hltbMetric);
  if(state.hltbQuality !== "real") p.set("hq", state.hltbQuality);
  if(state.minScore) p.set("minscore", state.minScore);
  { const def = [1,2,3,4].join(","), cur = [...state.revBands].sort().join(",");
    if(cur !== def) p.set("rev", cur); }
  if(state.minPrice != null) p.set("pmin", state.minPrice);
  if(state.maxPrice != null) p.set("pmax", state.maxPrice);
  if(state.trendSet.size > 0 && state.trendSet.size < 3) p.set("trend", [...state.trendSet].join(","));
  if(state.updatedWithin !== "any") p.set("upd", state.updatedWithin);
  if(state.wishOnly) p.set("wishonly", "1");
  if(state.ratingSource !== "recent") p.set("ratesrc", state.ratingSource);
  if(state.ptMetric !== "up") p.set("pt", state.ptMetric);
  if(state.sortKey !== "qhpp") p.set("sort", state.sortKey);
  if(!(state.sortKey === "qhpp" && state.sortDir === -1)) p.set("dir", state.sortDir < 0 ? "d" : "a");
  if(state.pageSize !== 100) p.set("per", state.pageSize);
  if(state.qRangeTouched){
    p.set("qmin", state.qMinVal.toFixed(3));
    if(!state.qMaxUnbounded) p.set("qmax", state.qMaxVal.toFixed(3));
  }
  const qs = p.toString();
  const url = qs ? "?" + qs : location.pathname;
  history.replaceState(null, "", url);
}

function loadFromURL(){
  const p = new URLSearchParams(location.search);
  if(![...p.keys()].length) return;
  _urlSuspended = true;
  const setIf = (k, fn) => { if(p.has(k)) fn(p.get(k)); };

  setIf("q", v => { state.q = v; const el=$("#q"); if(el) el.value = v; });
  setIf("inc", v => v.split(",").filter(Boolean).forEach(t => state.tagsInc.add(canon(t.toLowerCase()))));
  setIf("exc", v => v.split(",").filter(Boolean).forEach(t => state.tagsExc.add(canon(t.toLowerCase()))));
  setIf("sale", () => { state.saleOnly = true; const el=$("#saleOnly"); if(el) el.setAttribute("aria-pressed","true"); });
  setIf("basis", v => { if(v==="before"||v==="after"){ state.qBasis=v;
    $("#qb-after").setAttribute("aria-pressed", v==="after"); $("#qb-before").setAttribute("aria-pressed", v==="before"); } });
  setIf("hltb", v => { state.hltbMetric=v;
    document.querySelectorAll("[data-metric]").forEach(o => o.setAttribute("aria-pressed", o.dataset.metric===v)); });
  setIf("hq", v => { if(v==="loose"||v==="real"){ state.hltbQuality=v;
    document.querySelectorAll("[data-hquality]").forEach(o => o.setAttribute("aria-pressed", o.dataset.hquality===v)); } });
  setIf("minscore", v => { state.minScore = parseInt(v,10)||0;
    document.querySelectorAll("[data-minscore]").forEach(o => o.setAttribute("aria-pressed", o.dataset.minscore===String(state.minScore))); });
  setIf("rev", v => { const idxs = v.split(",").map(n => parseInt(n,10)).filter(n => n>=0 && n<REV_BANDS.length);
    state.revBands = new Set(idxs);
    syncRevButtons(); });
  setIf("pmin", v => { const n=parseFloat(v); if(!isNaN(n)){ state.minPrice=n; const el=$("#minprice"); if(el) el.value=n; } });
  setIf("pmax", v => { const n=parseFloat(v); if(!isNaN(n)){ state.maxPrice=n; const el=$("#maxprice"); if(el) el.value=n; } });
  setIf("trend", v => { state.trendSet = new Set(v.split(",").filter(x => ["up","flat","down"].includes(x)));
    if(state.trendSet.size === 0) state.trendSet = new Set(["up","flat","down"]);
    document.querySelectorAll("[data-trend]").forEach(o => o.setAttribute("aria-pressed", state.trendSet.has(o.dataset.trend))); });
  setIf("upd", v => { state.updatedWithin=v;
    document.querySelectorAll("[data-upd]").forEach(o => o.setAttribute("aria-pressed", o.dataset.upd===v)); });
  setIf("wishonly", () => { state.wishOnly = true; });
  setIf("sort", v => { state.sortKey = v; });
  setIf("dir", v => { state.sortDir = v==="a" ? 1 : -1; });
  setIf("pt", v => { if(v==="up"||v==="down"){ state.ptMetric = v;
    document.querySelectorAll("[data-ptmetric]").forEach(o => o.setAttribute("aria-pressed", o.dataset.ptmetric===v)); } });
  setIf("ratesrc", v => { if(v==="all"||v==="recent"){ state.ratingSource = v;
    document.querySelectorAll("[data-ratesrc]").forEach(o => o.setAttribute("aria-pressed", o.dataset.ratesrc===v)); } });
  setIf("per", v => { const n = parseInt(v,10); if([100,500,2000].includes(n)){ state.pageSize = n;
    document.querySelectorAll("#pagesize button").forEach(o => o.classList.toggle("on", o.dataset.size===String(n))); } });
  // QHPP range restored after domain is computed (see applyURLRange), just capture raw:
  state._pendingQMin = p.has("qmin") ? parseFloat(p.get("qmin")) : null;
  state._pendingQMax = p.has("qmax") ? parseFloat(p.get("qmax")) : null;

  _urlSuspended = false;
}

// Apply a URL-provided QHPP range after recomputeDomain has set the domain once.
function applyURLRange(){
  if(state._pendingQMin == null && state._pendingQMax == null) return;
  state.qRangeTouched = true;
  if(state._pendingQMin != null) state.qMinVal = Math.max(0, state._pendingQMin);
  if(state._pendingQMax != null){ state.qMaxVal = state._pendingQMax; state.qMaxUnbounded = false; }
  state._pendingQMin = state._pendingQMax = null;
  syncRangeUI();
}


// Reflect the enabled review bands on the band buttons.
function syncRevButtons(){
  document.querySelectorAll("[data-rev]").forEach(o =>
    o.setAttribute("aria-pressed", state.revBands.has(parseInt(o.dataset.rev, 10))));
}
// Filters collapse/expand via the button ONLY — no scroll-driven auto-collapse (T7).
// The nav is normal page flow: it scrolls away naturally and the sticky <thead> takes
// over as the pinned bar, so the filter panel never ambushes the reader on scroll.

  $("#topbar").classList.toggle("compact", compact);
  $("#collapseLabel").textContent = compact ? "⌄ Show filters" : "⌃ Hide filters";
}

function init(data){
  state.data = data;
  loadFromURL();                       // hydrate state from querystring (if any)
  computeFullCounts(); recomputeDomain(); applyURLRange();
  buildTagRail(); renderFoot();
  syncSortArrows();                    // reflect restored sort key/dir in headers
  syncPtHeader();                      // reflect restored playtime-median selection
  render();

  window.addEventListener("popstate", () => {   // back/forward navigation
    // reset to defaults, then re-read URL, then refresh everything
    state.q=""; state.tagsInc.clear(); state.tagsExc.clear(); state.saleOnly=false;
    state.qBasis="after"; state.hltbMetric="main"; state.minScore=0; state.revBands=new Set([1,2,3,4]);
    state.minPrice=null; state.maxPrice=null; state.trendSet=new Set(["up","flat","down"]); state.updatedWithin="any";
    state.wishOnly=false; state.sortKey="qhpp"; state.sortDir=-1; state.ratingSource="recent"; state.hltbQuality="real"; state.ptMetric="up"; state.qRangeTouched=false;
    loadFromURL();
    recomputeDomain(); applyURLRange(); buildTagRail(); syncSortArrows(); syncPtHeader(); render();
  });

  $("#q").addEventListener("input", e => { state.q = e.target.value; update(); });
  // Page-size selector: change games-per-page, reset to page 1, re-render.
  document.querySelectorAll("#pagesize button").forEach(b =>
    b.addEventListener("click", () => {
      state.pageSize = parseInt(b.dataset.size, 10);
      document.querySelectorAll("#pagesize button").forEach(x => x.classList.toggle("on", x === b));
      resetPaging(); render(); syncURL();
    }));
  $("#saleOnly").addEventListener("click", e => {
    state.saleOnly = !state.saleOnly; e.currentTarget.setAttribute("aria-pressed", state.saleOnly); update();
  });
  $("#qb-after").addEventListener("click", () => setBasis("after"));
  $("#qb-before").addEventListener("click", () => setBasis("before"));
  document.querySelectorAll("[data-metric]").forEach(b => b.addEventListener("click", () => setMetric(b.dataset.metric)));
  document.querySelectorAll("[data-ptmetric]").forEach(b => b.addEventListener("click", () => setPtMetric(b.dataset.ptmetric)));
  document.querySelectorAll("[data-hquality]").forEach(b =>
    b.addEventListener("click", () => {
      state.hltbQuality = b.dataset.hquality;
      document.querySelectorAll("[data-hquality]").forEach(o => o.setAttribute("aria-pressed", o === b));
      update();
    }));
  document.querySelectorAll("[data-minscore]").forEach(b =>
    b.addEventListener("click", () => {
      state.minScore = parseInt(b.dataset.minscore, 10);
      document.querySelectorAll("[data-minscore]").forEach(o => o.setAttribute("aria-pressed", o === b));
      update();
    }));
  document.querySelectorAll("[data-ratesrc]").forEach(b =>
    b.addEventListener("click", () => {
      state.ratingSource = b.dataset.ratesrc;
      document.querySelectorAll("[data-ratesrc]").forEach(o => o.setAttribute("aria-pressed", o === b));
      syncSortArrows();     // header hint reflects which score drives the Reviews sort
      if(state.sortKey === "rating_pct"){ render(); }
      syncURL();
    }));
  document.querySelectorAll("[data-rev]").forEach(b =>
    b.addEventListener("click", () => {
      const i = parseInt(b.dataset.rev, 10);
      // Independent toggle: flip this band on/off. Gaps are allowed.
      if(state.revBands.has(i)) state.revBands.delete(i); else state.revBands.add(i);
      syncRevButtons();
      update();
    }));
  document.querySelectorAll("[data-trend]").forEach(b =>
    b.addEventListener("click", () => {
      const k = b.dataset.trend;
      if(state.trendSet.has(k)) state.trendSet.delete(k); else state.trendSet.add(k);
      // Never allow all-off (confusing empty result) — treat empty as all-on.
      if(state.trendSet.size === 0) state.trendSet = new Set(["up","flat","down"]);
      document.querySelectorAll("[data-trend]").forEach(o => o.setAttribute("aria-pressed", state.trendSet.has(o.dataset.trend)));
      update();
    }));
  document.querySelectorAll("[data-upd]").forEach(b =>
    b.addEventListener("click", () => {
      state.updatedWithin = b.dataset.upd;
      document.querySelectorAll("[data-upd]").forEach(o => o.setAttribute("aria-pressed", o === b));

  const priceHandler = () => {

  $("#minprice").addEventListener("input", priceHandler);

  document.querySelectorAll("[data-step]").forEach(btn => btn.addEventListener("click", () => {
