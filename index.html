// ----- URL state: shareable, refresh-safe filter permalinks -----
// Compact querystring so a filtered view can be copy-pasted or reloaded. Session-only
// state (hidden games) is deliberately NOT serialized. The QTPD slider is serialized
// only when manually moved (qRangeTouched), since it otherwise auto-fits the results.
let _urlSuspended = false;     // guard so loadFromURL() doesn't trigger a write mid-restore

function syncURL(){
  if(_urlSuspended) return;
  const p = new URLSearchParams();
  if(state.q) p.set("q", state.q);
  if(state.tagsInc.size) p.set("inc", [...state.tagsInc].join(","));
  if(state.tagsExc.size) p.set("exc", [...state.tagsExc].join(","));
  if(state.tagMode !== "and") p.set("tagmode", state.tagMode);
  if(state.priceClass.size < 3) p.set("pc", ["full","sale","free"].filter(c => state.priceClass.has(c)).join(","));
  if(state.qBasis !== "after") p.set("basis", state.qBasis);
  if(state.hltbMetric !== "main") p.set("hltb", state.hltbMetric);
  if(state.hltbQuality !== "real") p.set("hq", state.hltbQuality);
  if(state.minScore) p.set("minscore", state.minScore);
  { const def = [1,2,3,4].join(","), cur = [...state.revBands].sort().join(",");
    if(cur !== def) p.set("rev", cur); }
  if(state.minPrice != null) p.set("pmin", state.minPrice);
  if(state.maxPrice != null) p.set("pmax", state.maxPrice);
  if(state.trendSet.size > 0 && state.trendSet.size < 3) p.set("trend", [...state.trendSet].join(","));
  if(state.updatedWithin !== "any") p.set("upd", state.updatedWithin);
  if(state.wishOnly) p.set("wishonly", "1");
  // PICS flags cluster — only non-default values emitted (keeps shared links clean).
  // The tri-state presence flags split across two lists: `flags` = require present (the
  // pre-tri-state meaning, so old shared links keep working), `noflags` = require absent.
  { const F = state.flags;
    const TRI = [["ea","ea"], ["eula","eula"], ["fse","fse"], ["vrOnly","vr"]];
    const on  = TRI.filter(([k]) => F[k] === "only").map(([,tok]) => tok);
    const off = TRI.filter(([k]) => F[k] === "hide").map(([,tok]) => tok);
    if(on.length)  p.set("flags", on.join(","));
    if(off.length) p.set("noflags", off.join(","));
    if(F.ai !== "any")   p.set("ai", F.ai);
    if(F.ctrl !== "any") p.set("ctrl", F.ctrl);
    if(F.deck !== "any") p.set("deck", F.deck);
    if(F.adultF !== "any") p.set("adult", F.adultF);
  }
  if(state.ratingSource !== "recent") p.set("ratesrc", state.ratingSource);
  if(state.ptMetric !== "up") p.set("pt", state.ptMetric);
  if(state.sortKey !== "qtpd") p.set("sort", state.sortKey);
  if(!(state.sortKey === "qtpd" && state.sortDir === -1)) p.set("dir", state.sortDir < 0 ? "d" : "a");
  if(state.pageSize !== 100) p.set("per", state.pageSize);
  if(state.qRangeTouched){
    p.set("qmin", state.qMinVal.toFixed(3));
    if(!state.qMaxUnbounded) p.set("qmax", state.qMaxVal.toFixed(3));
  }
  const qs = p.toString();
  const url = qs ? "?" + qs : location.pathname;
  history.replaceState(null, "", url);
}

function loadFromURL(){
  const p = new URLSearchParams(location.search);
  if(![...p.keys()].length) return;
  _urlSuspended = true;
  const setIf = (k, fn) => { if(p.has(k)) fn(p.get(k)); };

  setIf("q", v => { state.q = v; const el=$("#q"); if(el) el.value = v; const box=$("#searchBox"); if(box) box.classList.toggle("has-q", !!v); });
  setIf("inc", v => v.split(",").filter(Boolean).forEach(t => state.tagsInc.add(canon(t.toLowerCase()))));
  setIf("exc", v => v.split(",").filter(Boolean).forEach(t => state.tagsExc.add(canon(t.toLowerCase()))));
  setIf("tagmode", v => { if(v==="or"||v==="and"){ state.tagMode = v;
    document.querySelectorAll("[data-tagmode]").forEach(o => o.setAttribute("aria-pressed", o.dataset.tagmode===v)); } });
  setIf("pc", v => { const want = v.split(",").filter(c => ["full","sale","free"].includes(c));
    if(want.length){ state.priceClass = new Set(want); syncPriceClassUI(); } });
  setIf("basis", v => { if(v==="before"||v==="after"){ state.qBasis=v;
    $("#qb-after").setAttribute("aria-pressed", v==="after"); $("#qb-before").setAttribute("aria-pressed", v==="before"); } });
  setIf("hltb", v => { state.hltbMetric=v;
    document.querySelectorAll("[data-metric]").forEach(o => o.setAttribute("aria-pressed", o.dataset.metric===v)); });
  setIf("hq", v => { if(v==="loose"||v==="real"){ state.hltbQuality=v;
    document.querySelectorAll("[data-hquality]").forEach(o => o.setAttribute("aria-pressed", o.dataset.hquality===v)); } });
  setIf("minscore", v => { state.minScore = parseInt(v,10)||0;
    document.querySelectorAll("[data-minscore]").forEach(o => o.setAttribute("aria-pressed", o.dataset.minscore===String(state.minScore))); });
  setIf("rev", v => { const idxs = v.split(",").map(n => parseInt(n,10)).filter(n => n>=0 && n<REV_BANDS.length);
    state.revBands = new Set(idxs);
    syncRevButtons(); });
  setIf("pmin", v => { const n=parseFloat(v); if(!isNaN(n)){ state.minPrice=n; const el=$("#minprice"); if(el) el.value=n; } });
  setIf("pmax", v => { const n=parseFloat(v); if(!isNaN(n)){ state.maxPrice=n; const el=$("#maxprice"); if(el) el.value=n; } });
  setIf("trend", v => { state.trendSet = new Set(v.split(",").filter(x => ["up","flat","down"].includes(x)));
    if(state.trendSet.size === 0) state.trendSet = new Set(["up","flat","down"]);
    document.querySelectorAll("[data-trend]").forEach(o => o.setAttribute("aria-pressed", state.trendSet.has(o.dataset.trend))); });
  setIf("upd", v => { state.updatedWithin=v;
    document.querySelectorAll("[data-upd]").forEach(o => o.setAttribute("aria-pressed", o.dataset.upd===v)); });
  setIf("wishonly", () => { state.wishOnly = true; });
  // PICS flags cluster restore.
  // Each list only sets the keys it names, so `flags` and `noflags` don't clobber each other.
  { const TOK = { ea:"ea", eula:"eula", fse:"fse", vr:"vrOnly" };
    const readTri = (param, mode) => setIf(param, v => v.split(",").filter(Boolean)
      .forEach(tok => { if(TOK[tok]) state.flags[TOK[tok]] = mode; }));
    readTri("flags", "only");
    readTri("noflags", "hide"); }
  setIf("ai",    v => { if(["hide","only"].includes(v)) state.flags.ai = v; });
  setIf("ctrl",  v => { if(["full","partial"].includes(v)) state.flags.ctrl = v; });
  setIf("deck",  v => { if(["verified","playable","unsupported"].includes(v)) state.flags.deck = v; });
  setIf("adult", v => { if(["hide","only"].includes(v)) state.flags.adultF = v; });
  setIf("sort", v => { state.sortKey = v; });
  setIf("dir", v => { state.sortDir = v==="a" ? 1 : -1; });
  setIf("pt", v => { if(v==="up"||v==="down"){ state.ptMetric = v;
    document.querySelectorAll("[data-ptmetric]").forEach(o => o.setAttribute("aria-pressed", o.dataset.ptmetric===v)); } });
  setIf("ratesrc", v => { if(v==="all"||v==="recent"){ state.ratingSource = v;
    document.querySelectorAll("[data-ratesrc]").forEach(o => o.setAttribute("aria-pressed", o.dataset.ratesrc===v)); } });
  setIf("per", v => { const n = parseInt(v,10); if([100,500,2000].includes(n)){ state.pageSize = n;
    document.querySelectorAll("#pagesize button").forEach(o => o.classList.toggle("on", o.dataset.size===String(n))); } });
  // QTPD range restored after domain is computed (see applyURLRange), just capture raw:
  state._pendingQMin = p.has("qmin") ? parseFloat(p.get("qmin")) : null;
  state._pendingQMax = p.has("qmax") ? parseFloat(p.get("qmax")) : null;

  _urlSuspended = false;
}

// Apply a URL-provided QTPD range after recomputeDomain has set the domain once.
function applyURLRange(){
  if(state._pendingQMin == null && state._pendingQMax == null) return;
  state.qRangeTouched = true;
  if(state._pendingQMin != null) state.qMinVal = Math.max(0, state._pendingQMin);
  if(state._pendingQMax != null){ state.qMaxVal = state._pendingQMax; state.qMaxUnbounded = false; }
  state._pendingQMin = state._pendingQMax = null;
  syncRangeUI();
}


// Reflect the enabled review bands on the band buttons.
function syncRevButtons(){
  document.querySelectorAll("[data-rev]").forEach(o =>
    o.setAttribute("aria-pressed", state.revBands.has(parseInt(o.dataset.rev, 10))));
}
// Filters collapse/expand via the button ONLY — no scroll-driven auto-collapse (T7).
// The nav is normal page flow: it scrolls away naturally and the sticky <thead> takes
// over as the pinned bar, so the filter panel never ambushes the reader on scroll.
function setFiltersCompact(compact){
  $("#topbar").classList.toggle("compact", compact);
  $("#collapseLabel").textContent = compact ? "⌄ Show filters" : "⌃ Hide filters";
}

function init(data){
  state.data = data;
  loadFromURL();                       // hydrate state from querystring (if any)
  computeFullCounts(); recomputeDomain(); applyURLRange();
  buildTagRail(); renderFoot();
  syncSortArrows();                    // reflect restored sort key/dir in headers
  syncPtHeader();                      // reflect restored playtime-median selection
  syncFlagsUI();                       // reflect restored PICS flag cluster state
  // L3/L5 + L1: restore the saved view mode and accordion open/closed states before first paint.
  // #4 — default to Grid on mobile (box art suits small screens); desktop still defaults to Table.
  // A previously-saved choice always wins.
  let savedView = null; try{ savedView = localStorage.getItem("qtpd.view"); }catch(e){}
  state.view = savedView || (isNarrow() ? "grid" : "table");
  if(!VIEWS.includes(state.view)) state.view = "table";
  applyLayout();        // sets grid-view/layout-card classes + the device-appropriate view buttons
  applySections();
  render();

  window.addEventListener("popstate", () => {   // back/forward navigation
    // reset to defaults, then re-read URL, then refresh everything
    state.q=""; state.tagsInc.clear(); state.tagsExc.clear(); state.tagMode="and"; state.priceClass=new Set(["full","sale","free"]);
    state.qBasis="after"; state.hltbMetric="main"; state.minScore=0; state.revBands=new Set([1,2,3,4]);
    state.minPrice=null; state.maxPrice=null; state.trendSet=new Set(["up","flat","down"]); state.updatedWithin="any";
    state.tagMode="and"; state.wishOnly=false; state.sortKey="qtpd"; state.sortDir=-1; state.ratingSource="recent"; state.hltbQuality="real"; state.ptMetric="up"; state.qRangeTouched=false;
    state.flags={ ea:"any", eula:"any", fse:"any", vrOnly:"any", ai:"any", ctrl:"any", deck:"any", adultF:"any" };
    loadFromURL();
    document.querySelectorAll("[data-tagmode]").forEach(o => o.setAttribute("aria-pressed", o.dataset.tagmode===state.tagMode));
    syncPriceClassUI();
    recomputeDomain(); applyURLRange(); buildTagRail(); syncSortArrows(); syncPtHeader(); syncFlagsUI(); render();
  });

  // Header search: toggle the persistent red ✕ whenever the field holds text; the ✕ clears it.
  const syncSearchClear = () => $("#searchBox").classList.toggle("has-q", !!$("#q").value);
  $("#q").addEventListener("input", e => { state.q = e.target.value; syncSearchClear(); update(); });
  $("#qClear").addEventListener("click", () => {
    const el = $("#q"); el.value = ""; state.q = ""; syncSearchClear(); el.focus(); update();
  });
  // Wishlist input: same persistent-✕ affordance — it just empties the field (Import/Wishlist
  // buttons still do the fetch/clear-results work; #wishClear handles an imported list).
  const syncWishClear = () => $("#wishBox").classList.toggle("has-q", !!$("#steamid").value);
  $("#steamid").addEventListener("input", syncWishClear);
  $("#steamidClear").addEventListener("click", () => {
    const el = $("#steamid"); el.value = ""; syncWishClear(); el.focus();
  });
  // Page-size selector: change games-per-page, reset to page 1, re-render.
  document.querySelectorAll("#pagesize button").forEach(b =>
    b.addEventListener("click", () => {
      state.pageSize = parseInt(b.dataset.size, 10);
      document.querySelectorAll("#pagesize button").forEach(x => x.classList.toggle("on", x === b));
      resetPaging(); render(); syncURL();
    }));
  // Price-type band: All is a one-way reset (re-lights every facet, never itself un-presses).
  // Facets Full/Sale/Free toggle independently but can never all be off — un-pressing the
  // last lit facet snaps back to All-on, so the list is never empty.
  syncPriceClassUI();
  $$("#priceClass button").forEach(btn => btn.addEventListener("click", () => {
    const pc = btn.dataset.pc;
    if(pc === "all"){
      state.priceClass = new Set(["full","sale","free"]);
    } else if(state.priceClass.has(pc)){
      if(state.priceClass.size > 1) state.priceClass.delete(pc);
      // last one lit: leave as-is (can't reach empty)
    } else {
      state.priceClass.add(pc);
    }
    syncPriceClassUI();
    update();
  }));
  $("#qb-after").addEventListener("click", () => setBasis("after"));
  $("#qb-before").addEventListener("click", () => setBasis("before"));
  document.querySelectorAll("[data-metric]").forEach(b => b.addEventListener("click", () => setMetric(b.dataset.metric)));
  document.querySelectorAll("[data-ptmetric]").forEach(b => b.addEventListener("click", () => setPtMetric(b.dataset.ptmetric)));
  document.querySelectorAll("[data-hquality]").forEach(b =>
    b.addEventListener("click", () => {
      state.hltbQuality = b.dataset.hquality;
      document.querySelectorAll("[data-hquality]").forEach(o => o.setAttribute("aria-pressed", o === b));
      update();
    }));
  document.querySelectorAll("[data-minscore]").forEach(b =>
    b.addEventListener("click", () => {
      state.minScore = parseInt(b.dataset.minscore, 10);
      document.querySelectorAll("[data-minscore]").forEach(o => o.setAttribute("aria-pressed", o === b));
      update();
    }));
  document.querySelectorAll("[data-ratesrc]").forEach(b =>
    b.addEventListener("click", () => {
      state.ratingSource = b.dataset.ratesrc;
      document.querySelectorAll("[data-ratesrc]").forEach(o => o.setAttribute("aria-pressed", o === b));
      syncSortArrows();     // header hint reflects which score drives the Reviews sort
      // Both halves of the Reviews column follow the period toggle, so re-sort for either.
      if(state.sortKey === "rating_pct" || state.sortKey === "review_count"){ render(); }
      syncURL();
    }));
  document.querySelectorAll("[data-rev]").forEach(b =>
    b.addEventListener("click", () => {
      const i = parseInt(b.dataset.rev, 10);
      // Independent toggle: flip this band on/off. Gaps are allowed.
      if(state.revBands.has(i)) state.revBands.delete(i); else state.revBands.add(i);
      syncRevButtons();
      update();
    }));
  document.querySelectorAll("[data-trend]").forEach(b =>
    b.addEventListener("click", () => {
      const k = b.dataset.trend;
      if(state.trendSet.has(k)) state.trendSet.delete(k); else state.trendSet.add(k);
      // Never allow all-off (confusing empty result) — treat empty as all-on.
      if(state.trendSet.size === 0) state.trendSet = new Set(["up","flat","down"]);
      document.querySelectorAll("[data-trend]").forEach(o => o.setAttribute("aria-pressed", state.trendSet.has(o.dataset.trend)));
      update();
    }));
  document.querySelectorAll("[data-upd]").forEach(b =>
    b.addEventListener("click", () => {
      state.updatedWithin = b.dataset.upd;
      document.querySelectorAll("[data-upd]").forEach(o => o.setAttribute("aria-pressed", o === b));
      update();
    }));
  // --- PICS Flags cluster wiring ---
  // Single-select segmented groups: ai / ctrl / deck / adult.
  const segGroup = (attr, key) => {
    document.querySelectorAll(`[data-${attr}]`).forEach(b =>
      b.addEventListener("click", () => {
        state.flags[key] = b.dataset[attr];
        document.querySelectorAll(`[data-${attr}]`).forEach(o => o.setAttribute("aria-pressed", o === b));
        update();
      }));
  };
  segGroup("ai", "ai");
  segGroup("ctrl", "ctrl");
  segGroup("deck", "deck");
  segGroup("adult", "adultF");
  // Tri-state presence groups (data-flag/data-val="any"|"hide"|"only"): ea / vrOnly / fse / eula.
  document.querySelectorAll("[data-flag]").forEach(b =>
    b.addEventListener("click", () => {
      const key = b.dataset.flag, val = b.dataset.val;
      state.flags[key] = val;
      document.querySelectorAll(`[data-flag="${key}"]`).forEach(o =>
        o.setAttribute("aria-pressed", o.dataset.val === val));
      update();
    }));
  const priceHandler = () => {
    const lo = $("#minprice").value.trim(), hi = $("#maxprice").value.trim();
    state.minPrice = lo === "" ? null : Math.max(0, parseFloat(lo));
    state.maxPrice = hi === "" ? null : Math.max(0, parseFloat(hi));
    update();
  };
  $("#minprice").addEventListener("input", priceHandler);
  $("#maxprice").addEventListener("input", priceHandler);
  document.querySelectorAll("[data-step]").forEach(btn => btn.addEventListener("click", () => {
    const inp = $("#"+btn.dataset.step);
    let v = parseFloat(inp.value || "0"); if(isNaN(v)) v = 0;
    v = Math.max(0, v + parseInt(btn.dataset.d,10));
    inp.value = v; priceHandler();
  }));
  // Tag match-mode (ALL / ANY for required tags)
  document.querySelectorAll("[data-tagmode]").forEach(b =>
    b.addEventListener("click", () => {
      state.tagMode = b.dataset.tagmode;
      document.querySelectorAll("[data-tagmode]").forEach(o => o.setAttribute("aria-pressed", o === b));
      update();
    }));
  // Tag-name search. Only the RAIL is rebuilt — the game list is untouched, so this
  // deliberately does not call update()/render(). Debounced because buildTagRail's
  // contextual counts are an O(games) pass and we don't want one per keystroke.
  {
    const box = $("#tagSearchBox"), inp = $("#tagSearch"), clr = $("#tagSearchClear");
    let t = null;
    const apply = v => {
      state.tagQuery = v;
      box.classList.toggle("has-q", !!v.trim());
      clearTimeout(t);
      t = setTimeout(buildTagRail, 120);
    };
    inp.addEventListener("input", () => apply(inp.value));
    inp.addEventListener("keydown", e => {          // Esc clears without leaving the field
      if(e.key === "Escape" && inp.value){ e.stopPropagation(); inp.value = ""; apply(""); }
    });
    clr.addEventListener("click", () => { inp.value = ""; apply(""); inp.focus(); });
  }
  $("#qmin").addEventListener("input", () => onRangeInput("min"));
  $("#qmax").addEventListener("input", () => onRangeInput("max"));

  $("#wishimport").addEventListener("click", importWishlist);
  $("#steamid").addEventListener("keydown", e => { if(e.key === "Enter") importWishlist(); });
  $("#wishOnly").addEventListener("click", e => {
    state.wishOnly = !state.wishOnly; e.currentTarget.setAttribute("aria-pressed", state.wishOnly); update();
  });
  $("#wishClear").addEventListener("click", clearWishlist);

  $("#collapseBtn").addEventListener("click", () => {
    setFiltersCompact(!$("#topbar").classList.contains("compact"));
  });
  // Logo doubles as a filter toggle — click the "QTPD" wordmark to open/close the filter nav.
  $("#logoToggle").addEventListener("click", () => {
    setFiltersCompact(!$("#topbar").classList.contains("compact"));
  });

  $("#clear").addEventListener("click", () => {
    state.q=""; state.tagsInc.clear(); state.tagsExc.clear(); state.tagMode="and"; state.priceClass=new Set(["full","sale","free"]);
    document.querySelectorAll("[data-tagmode]").forEach(o => o.setAttribute("aria-pressed", o.dataset.tagmode==="and"));
    state.minScore=0; state.revBands=new Set([1,2,3,4]); state.minPrice=null; state.maxPrice=null; state.wishOnly=false;
    state.trendSet=new Set(["up","flat","down"]); state.updatedWithin="any"; state.ratingSource="recent"; state.hltbQuality="real"; state.ptMetric="up";
    $("#q").value=""; $("#minprice").value=""; $("#maxprice").value="";
    syncPriceClassUI(); $("#wishOnly").setAttribute("aria-pressed","false");
    document.querySelectorAll("[data-minscore]").forEach(o => o.setAttribute("aria-pressed", o.dataset.minscore==="0"));
    document.querySelectorAll("[data-trend]").forEach(o => o.setAttribute("aria-pressed", "true"));
    document.querySelectorAll("[data-ratesrc]").forEach(o => o.setAttribute("aria-pressed", o.dataset.ratesrc==="recent"));
    document.querySelectorAll("[data-hquality]").forEach(o => o.setAttribute("aria-pressed", o.dataset.hquality==="real"));
    document.querySelectorAll("[data-ptmetric]").forEach(o => o.setAttribute("aria-pressed", o.dataset.ptmetric==="up")); syncPtHeader();
    syncRevButtons();
    document.querySelectorAll("[data-upd]").forEach(o => o.setAttribute("aria-pressed", o.dataset.upd==="any"));
    state.flags={ ea:"any", eula:"any", fse:"any", vrOnly:"any", ai:"any", ctrl:"any", deck:"any", adultF:"any" };
    syncFlagsUI();
    update();
  });

  document.querySelectorAll("thead .sortable").forEach(th =>
    th.addEventListener("click", (e) => { e.stopPropagation(); setSort(th.dataset.sort); }));

  // Tags column collapse. Tags isn't sortable and its header does nothing else, so the whole
  // <th> is the toggle. Collapsing hands the column's 3fr of growth to Game (see the
  // body.tags-collapsed grid template), which is where the width is actually useful.
  // Arrows point the way the click will move things: "><" closes, "<>" reopens.
  (() => {
    const th = document.getElementById("tagsTh");
    const ind = document.getElementById("tagsToggle");
    if(!th || !ind) return;
    const sync = () => {
      const off = document.body.classList.contains("tags-collapsed");
      ind.textContent = off ? "<>" : "><";
      th.title = off ? "Expand the Tags column"
                     : "Collapse the Tags column to give the width to Game (bigger art, full titles)";
      th.setAttribute("aria-expanded", String(!off));
    };
    th.addEventListener("click", () => {
      const off = document.body.classList.toggle("tags-collapsed");
      try{ localStorage.setItem("qtpd.tagsCollapsed", off ? "1" : "0"); }catch(e){}
      sync();
    });
    sync();   // pre-paint restore already set the class; match the indicator to it
  })();

  // Mobile sort control: picking a field sets that sort with its natural default direction;
  // the ▼/▲ button flips direction. Mirrors the header behavior for the card layout.
  // Bind a <select>+dir pair (mobile top-bar sort AND the desktop grid sort) to the sort state.
  const bindSortControl = (selectId, dirId) => {
    const sel = document.getElementById(selectId); if(!sel) return;
    sel.addEventListener("change", () => {
      state.sortKey = sel.value;
      state.sortDir = (sel.value === "title") ? 1 : -1;   // A→Z for names, high→low otherwise
      syncSortArrows(); render(); syncURL();
    });
    const d = document.getElementById(dirId);
    if(d) d.addEventListener("click", () => { state.sortDir *= -1; syncSortArrows(); render(); syncURL(); });
  };
  bindSortControl("msort", "msortdir");
  // Desktop grid sort: build the field buttons, wire clicks (row + overflow menu), the dir flip,
  // and re-fit on resize. The buttons drive the same state.sortKey/sortDir as everything else.
  buildGridSortButtons();
  layoutGridSort();   // initial fit (applyLayout ran before the buttons existed)
  {
    const bar = document.getElementById("gridSort");
    bar.addEventListener("click", e => {
      const b = e.target.closest("[data-sortk]");
      if(b){
        const k = b.dataset.sortk;
        if(state.sortKey === k){ state.sortDir *= -1; }          // re-click same field flips direction
        else { state.sortKey = k; state.sortDir = (k === "title") ? 1 : -1; }
        setGsortMenu(false); syncSortArrows(); render(); syncURL();
        return;
      }
      if(e.target.closest("#gsortMoreBtn")){
        setGsortMenu(!document.getElementById("gsortMore").classList.contains("open"));
        return;
      }
    });
    const gd = document.getElementById("gsortdir");
    if(gd) gd.addEventListener("click", () => { state.sortDir *= -1; syncSortArrows(); render(); syncURL(); });
    // Close the overflow menu on any outside click.
    document.addEventListener("click", e => {
      if(!e.target.closest("#gsortMore")) setGsortMenu(false);
    });
  }
  let _gsortRAF = 0;
  window.addEventListener("resize", () => {
    cancelAnimationFrame(_gsortRAF);
    _gsortRAF = requestAnimationFrame(layoutGridSort);
  });
  document.body.addEventListener("click", e => {
    const h = e.target.closest("[data-hide]");
    if(h){ e.preventDefault(); e.stopPropagation(); hideGame(h.dataset.hide); return; }
    const more = e.target.closest("[data-more]");
    if(more){ e.preventDefault(); more.closest(".taggroup").classList.toggle("expanded"); return; }
    const t = e.target.closest("[data-tag]");
    if(t) cycleTag(t.dataset.tag, +1);          // left-click: forward
  });
  document.body.addEventListener("contextmenu", e => {
    const t = e.target.closest("[data-tag]");
    if(t){ e.preventDefault(); cycleTag(t.dataset.tag, -1); }  // right-click: backward
  });

  // ── Lorenzo-list wiring ───────────────────────────────────────────────────────────────
  // L3/L5: view switcher + keep layout class in sync as the viewport crosses the table floor.
  document.querySelectorAll("#viewSwitch [data-view]").forEach(b => b.addEventListener("click", () => {
    if(b.classList.contains("disabled")){
      toast(b.dataset.view === "table"
        ? "Table view is desktop-only — mobile shows the same data as cards."
        : "Card view is mobile-only — desktop shows the full table.", "", 5000);
      return;
    }
    setView(b.dataset.view);
  }));
  window.matchMedia("(max-width:1374px)").addEventListener("change", applyLayout);
  // Grid card interactions: tap a card to expand its info; Steam link + Close handled inline.
  $("#gridview").addEventListener("click", e => {
    const card = e.target.closest(".gcard"); if(!card) return;
    if(e.target.closest("a")) return;                                   // let the Steam link open
    // The 18+ gate takes precedence over expand on an unrevealed adult card. Same three
    // stages and the same "reveal never navigates" rule as the table thumb — see the
    // adultSetStage block. The store stays reachable through the expanded card's "Steam ↗".
    if(card.classList.contains("adult") && !card.classList.contains("revealed")
        && e.target.closest(".gart")){
      e.preventDefault(); e.stopPropagation();
      adultSetStage(card, adultStage(card) === 1 ? 2 : 3);
      return;
    }
    if(e.target.closest("[data-gclose]")){ card.classList.remove("open"); return; }
    card.classList.toggle("open");
  });
  $("#gridview").addEventListener("keydown", e => {
    if((e.key === "Enter" || e.key === " ") && e.target.classList.contains("gcard")){ e.preventDefault(); e.target.classList.toggle("open"); }
  });
  // L1: accordion sections toggle open/closed (persisted). Two fold targets: the header
  // column (caret + title + count), and any dead space in the section's own row — the wide
  // empty strips beside the controls, which are the largest targets on the row. Everything
  // that is (or holds) a real control opts out via FOLD_SAFE, and each safe island carries a
  // ~6px invisible margin in CSS, so the gutters between controls belong to the control and
  // a near-miss can't fold the section.
  const FOLD_SAFE = "button, input, select, textarea, a, label, .seg, .field, .numinput,"
                  + ".chip, .tagmore, .taglegend, .tagmode, .grouplabel, .wishrow";
  document.querySelectorAll(".filter-section").forEach(sec =>
    sec.addEventListener("click", e => {
      // The header is itself a <button>, so it has to be tested before FOLD_SAFE.
      const head = e.target.closest(".section-head");
      if(head) { if(head.closest(".filter-section") === sec) toggleSection(sec.dataset.section); return; }
      if(e.target.closest(FOLD_SAFE)) return;                 // a control, or its safe margin
      if(window.getSelection().toString()) return;            // don't fold at the end of a text drag
      toggleSection(sec.dataset.section);
    }));
  // The wishlist row isn't a filter section (it's a global action that stays visible), so its
  // dead space folds the whole bar instead — same as the "Hide filters" handle below it.
  $(".bar-filters > .ctl-row").addEventListener("click", e => {
    if(e.target.closest(FOLD_SAFE)) return;
    if(window.getSelection().toString()) return;
    $(".collapse-handle").click();
  });
  // L2: clicking a summarized filter term opens its inline editor (or deep-links into the bar).
  $("#filterSummary").addEventListener("click", e => {
    if(e.target.closest("[data-reset]")){ $("#clear").click(); return; }   // #8 — warning Reset reuses the real reset
    const b = e.target.closest("[data-sumf]"); if(b) openSummaryEditor(b, b.dataset.sumf);
  });
  // L4: utility actions.
  $("#randomBtn").addEventListener("click", randomPick);
  $("#exportBtn").addEventListener("click", () => openExportPopover($("#exportBtn")));
  $("#shareBtn").addEventListener("click", copyLink);
  // Popover dismissal (backdrop click / Escape).
  $("#popBackdrop").addEventListener("click", closePopover);
  document.addEventListener("keydown", e => { if(e.key === "Escape") closePopover(); });
  // Mobile: once scrolled a little, shrink the sticky compact nav to just the summary + Show-filters
  // bar (CSS hides bar-main under body.nav-scrolled). Passive + class-only so scrolling stays smooth.
  let _navScrolled = false;
  const onNavScroll = () => {
    const s = window.scrollY > 24;
    if(s !== _navScrolled){ _navScrolled = s; document.body.classList.toggle("nav-scrolled", s); }
  };
  window.addEventListener("scroll", onNavScroll, {passive:true});
  onNavScroll();
}

// Collapse a sale whose end date has passed: show base price, no discount, no QTPD
// discount — entirely offline, no scraping. Returns true if it changed the game.
function expireSaleIfEnded(game, now){
  if(game.discount_end && game.discount_end <= now && game.discount_pct > 0){
    game.discount_pct = 0;
    if(game.price_initial != null) game.price_final = game.price_initial;
    game._expired_sale = true;     // marks "sale just ended" for display until reload
    game.discount_end = null;
    return true;
  }
  return false;
}

// Load the catalog plus the three decoupled data layers, merge each by appid:
//   games.json  : catalog, rating, tags, last_update, release (the slow stuff)
//   prices.json : price_initial/final, discount_pct, discount_end (fast pricing layer)
//   hltb.json   : main/extra/complete/avg completion times (static)
//   recent.json : 30-day review scores
// Anything missing from a layer falls back to whatever games.json still carries (a new
// game has price/rating from the initial scrape until the refreshers catch up). QTPD is
// then computed client-side from the merged fields. Past-due sales collapse offline.
Promise.all([
  fetch("games.json",  {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("prices.json", {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("hltb.json",   {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("tags.json",   {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("recent.json", {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("playtime.json",{cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("ratings.json", {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("updates.json", {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  // PICS layer: one slim merged file (pics_merge.py) + three tiny decode maps.
  fetch("pics.json",    {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("lookups/tags.json",      {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("lookups/genres.json",    {cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
  fetch("lookups/categories.json",{cache:"no-store"}).then(r => r.ok ? r.json() : null).catch(() => null),
]).then(([g, pj, hj, tj, rj, ptj, ratj, uj, picsj, tagLk, genreLk, catLk]) => {
  const data = (g && g.games && g.games.length) ? g : SAMPLE;
  const priceMap  = (pj && pj.prices) ? pj.prices : null;
  const hltbMap   = (hj && hj.hltb)   ? hj.hltb   : null;
  const tagsMap   = (tj && tj.tags)   ? tj.tags   : null;
  const recentMap = (rj && rj.recent) ? rj.recent : null;
  // playtime.json: per-game [median_up_min, median_down_min, n_up, n_down] (positional).
  // ratings.json:  per-game [steam_pct, raw_pct, capped_pct, n] (positional).
  const playtimeMap = (ptj && ptj.playtime) ? ptj.playtime : null;
  const ratingsMap  = (ratj && ratj.playtime_ratings) ? ratj.playtime_ratings : null;
  // updates.json: authoritative event_type-based update history (the new sharded layer).
  // Used ONLY as a FALLBACK for now: games.json's last_update_ts (News-API, primary) wins
  // where present; where it's null we backfill from updates last_any_ts (max of the
  // major/regular/minor tiers = "any update"). As the update shards populate over the
  // coming rotations this fills the old system's gaps; later the precedence flips (new
  // becomes primary, old the fallback) once coverage is broad. See ARCHITECTURE §9.5.
  const updatesMap  = (uj && uj.games) ? uj.games : null;
  // PICS metadata layer (pics.json = one slim merged file from pics_merge.py).
  // Carries Valve-authoritative fields: ranked store_tags (IDs), feature categories,
  // Steam Deck compat, AI disclosure, family-share/EULA flags, controller support,
  // and the derived ea/adult/vr_only booleans. Decoded client-side via the lookup maps.
  const picsMap  = (picsj && picsj.apps) ? picsj.apps : null;
  window.PICS_TAG_LK   = (tagLk   && tagLk.tags)   ? tagLk.tags   : (tagLk   || {});  // id -> name
  window.PICS_GENRE_LK = (genreLk && genreLk.genres)? genreLk.genres: (genreLk || {});
  window.PICS_CAT_LK   = catLk || {};   // "category_N" -> feature name
  // True only when pics.json actually carries games. An empty placeholder
  // ({apps:{}}) is truthy-but-empty, so guard on the count — otherwise the flag
  // filters activate with no data behind them and zero out the whole list.
  window.HAS_PICS = !!(picsMap && Object.keys(picsMap).length);
  // Decode a category id (int) -> feature name via the categories map ("category_N" keys).
  const catName = id => window.PICS_CAT_LK["category_" + id] || window.PICS_CAT_LK[String(id)] || null;
  // gray threshold: below this many reviews the weighted rating renders low-confidence.
  window.PT_CONFIDENT = (ratj && ratj.confident_reviews) ? ratj.confident_reviews : 10;
  const now = NOW();
  data.games.forEach(game => {
    const key = String(game.appid);
    // prices.json is the source of truth for the pricing layer (falls back to games.json).
    if(priceMap && priceMap[key]){
      const p = priceMap[key];
      if(p.price_initial !== undefined) game.price_initial = p.price_initial;
      if(p.price_final   !== undefined) game.price_final   = p.price_final;
      if(p.discount_pct  !== undefined) game.discount_pct  = p.discount_pct;
      game.discount_end = (p.discount_end != null) ? p.discount_end : null;
    } else {
      game.discount_end = game.discount_end ?? null;
    }
    // hltb.json provides completion times (games.json no longer stores them).
    if(hltbMap && hltbMap[key]){
      const h = hltbMap[key];
      game.hltb_main = h.main; game.hltb_extra = h.extra;
      game.hltb_complete = h.complete; game.hltb_avg = h.avg; game.hltb_match = h.match;
      // which of main/extra/complete are estimated (filled from the typical
      // ratio rather than fetched from HLTB) — drives the distinct rendering.
      game.hltb_est = Array.isArray(h.est) ? h.est : [];
    }
    // tags.json provides SteamSpy user-tags; kept as a FALLBACK only. PICS store_tags
    // (decoded below) are primary when present — Valve-ranked and more reliable on the
    // long tail. SteamSpy fills games PICS lacks.
    if(tagsMap && Array.isArray(tagsMap[key]) && tagsMap[key].length){
      game.tags_ss = tagsMap[key];        // keep SteamSpy separately as fallback source
      game.tags = tagsMap[key];           // provisional; PICS overrides just below
    }
    // --- PICS metadata merge (Valve-authoritative) ---
    if(picsMap && picsMap[key]){
      const p = picsMap[key];
      // Tags: PICS ranked IDs -> names (primary). Fall back to SteamSpy if PICS empty.
      if(Array.isArray(p.tags) && p.tags.length){
        const names = p.tags.map(id => window.PICS_TAG_LK[String(id)] || window.PICS_TAG_LK[id]).filter(Boolean);
        if(names.length) game.tags = names;
        game.tag_ids = p.tags;            // ranked IDs kept for index-once filtering
      }
      // Feature categories (modes/controller/etc): authoritative, replaces tag-inference.
      if(Array.isArray(p.cats)){
        game.cat_ids = p.cats;
        game.catSet = new Set(p.cats);    // prebuilt once for O(1) filter membership
      }
      if(Array.isArray(p.genres)) game.genre_ids = p.genres;
      // Derived filter flags (precomputed by the summarizer — never re-derived here).
      game.pics_ea      = !!p.ea;
      game.pics_adult   = !!p.adult;
      game.pics_vr_only = !!p.vr_only;
      game.pics_ai      = p.ai || 0;      // 0 none / 1 pre-gen / 2 live-gen
      game.pics_fse     = !!p.fse;        // family-share excluded
      game.pics_eula    = !!p.eula;       // has custom EULA
      game.pics_controller = p.controller || null;   // "full" | "partial"
      if(p.deck && typeof p.deck === "object"){
        game.deck_cat = (p.deck.cat != null) ? p.deck.cat : null;  // 1 Unsup /2 Play /3 Verified
      }
      game.pics_state = p.state || null;  // "released" | "prerelease"
      // Store header path. Authoritative art location; imgChain prefers it over the
      // appid-derived URLs, which 404 for games on the store_item_assets scheme.
      if(p.art) game.art = p.art;
    }
    if(recentMap && recentMap[key]){
      const r = recentMap[key];
      game.recent_pct = r.recent_pct; game.recent_count = r.recent_count; game.recent_scraped_at = r.recent_scraped_at;
    }
    // playtime.json -> median playtimes (minutes) split by review recommendation.
    // Array positions: [0]=recommend median, [1]=not-recommend median, [2]=n_up, [3]=n_down.
    if(playtimeMap && playtimeMap[key]){
      const a = playtimeMap[key];
      game.pt_up = a[0]; game.pt_down = a[1]; game.pt_nup = a[2]; game.pt_ndown = a[3];
    }
    // ratings.json -> playtime-weighted rating. [0]=steam%, [1]=raw%, [2]=capped%, [3]=n.
    // We display `capped` (2x-median-capped, whale-resistant); keep the others for tooltip/debug.
    if(ratingsMap && ratingsMap[key]){
      const a = ratingsMap[key];
      game.wr_steam = a[0]; game.wr_raw = a[1]; game.wr = a[2]; game.wr_n = a[3];
    }
    // updates.json backfill: ONLY when the old News-API last_update_ts is missing. The
    // new event-based layer then supplies "last update of ANY type" (last_any_ts) so a
    // game the old system saw as blank but that DID get patched stops showing "no upd".
    // Old system stays primary; this only fills nulls. (Precedence flips later.)
    if((game.last_update_ts == null) && updatesMap && updatesMap[key] && updatesMap[key].last_any_ts != null){
      game.last_update_ts = updatesMap[key].last_any_ts;
    }
    // updates.json cadence -> the Updated column's patch-frequency badge. Summed across
    // all sizes (major+regular+minor) for the 90d and 365d windows (both cumulative in
    // the source). Independent of the null-backfill above: attached for every game
    // updates.json covers, whether or not News-API already supplied a last_update_ts.
    if(updatesMap && updatesMap[key] && updatesMap[key].counts){
      const c = updatesMap[key].counts;
      const sum = w => c[w] ? (c[w].major||0)+(c[w].regular||0)+(c[w].minor||0) : 0;
      game.upd_c90  = sum("90d");
      game.upd_c365 = sum("365d");
    }
    expireSaleIfEnded(game, now);     // offline collapse of any already-ended sale
  });
  init(data);
});

/* ── Custom tooltip engine ─────────────────────────────────────────────────────────────────────
   One styled floating box replaces the browser's native `title` tooltip everywhere, so filters,
   column headers, and cell values all look and read the same. It is fully event-delegated: a
   single set of document listeners covers every element that has (or later gets) a `title`,
   including rows rendered on the fly — no per-element wiring, cheap on resources.

   How native suppression works: on hover we blank the element's `title` (keeping the attribute so
   the `[title]` cursor rules still match) and restore it on leave, so the OS never draws its own
   grey tooltip on top of ours. The plain title text stays the accessible source of truth and is
   what shows if JS is ever off.

   Coloring (decorate()) is automatic from the plain text — no per-tip markup to maintain:
     • the leading subject (before the first — or :) → gold  (what the tip is about)
     • numbers / percentages / multipliers          → blue
     • a small set of positive / negative cues       → teal / coral (matching recommend / not). */
(function(){
  if(matchMedia && matchMedia("(hover: none)").matches) return;  // touch: no hover tooltips
  const TIP = document.createElement("div");
  TIP.className = "uitip"; TIP.setAttribute("role","tooltip");
  const mount = () => (document.body || document.documentElement).appendChild(TIP);
  if(document.body) mount(); else addEventListener("DOMContentLoaded", mount);

  let curEl = null, curTitle = null, raf = 0, lastX = 0, lastY = 0;

  const escT = s => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  // POS skips "recommend…" when it's part of a negative phrase ("not recommended",
  // "non-recommenders") so those stay coral, not teal.
  const POS = /(?<!not )(?<!non-)\b(recommend(?:ed|ers)?|reliable|verified|improving)\b/gi;
  const NEG = /\b(not recommend(?:ed)?|non-recommenders?|low confidence|too few|declining|abandonware|unsupported|blocked?)\b/gi;
  const NUM = /(\d[\d,]*(?:\.\d+)?(?:\s?[%×])?|\b\d+\+)/g;
  function decorate(text){
    let s = escT(text);
    // Leading subject: text up to the first em-dash or colon (kept short so we don't paint a
    // whole sentence). Marked first, before number/word passes touch the rest.
    s = s.replace(/^([^:—]{2,46}?)(\s*[—:])/, '<span class="tk-key">$1</span>$2');
    // Order matters: NEG before POS so "not recommended" isn't half-painted by the POS pass.
    s = s.replace(NEG, '<span class="tk-neg">$&</span>');
    s = s.replace(POS, '<span class="tk-pos">$&</span>');
    s = s.replace(NUM, '<span class="tk-num">$&</span>');
    return s;
  }
  function place(){
    const pad = 14, vw = innerWidth, vh = innerHeight;
    const w = TIP.offsetWidth, h = TIP.offsetHeight;
    let x = lastX + 16, y = lastY + 18;
    if(x + w + pad > vw) x = lastX - w - 14;           // flip left near the right edge
    if(x < pad) x = pad;
    if(y + h + pad > vh) y = lastY - h - 14;           // flip above near the bottom edge
    if(y < pad) y = pad;
    TIP.style.left = x + "px"; TIP.style.top = y + "px";
  }
  function show(el, t){
    if(curEl) restore();
    curEl = el; curTitle = t;
    el.setAttribute("title", "");                       // suppress the native tooltip
    TIP.innerHTML = decorate(t);
    place();
    requestAnimationFrame(() => TIP.classList.add("show"));
  }
  function restore(){
    if(curEl && curEl.getAttribute("title") === "") curEl.setAttribute("title", curTitle);
    curEl = null; curTitle = null;
  }
  function hide(){ restore(); TIP.classList.remove("show"); }

  document.addEventListener("mouseover", e => {
    const el = e.target.closest && e.target.closest("[title]");
    if(el === curEl) return;
    const t = el && el.getAttribute("title");
    if(t){ show(el, t); } else if(curEl){ hide(); }
  });
  document.addEventListener("mousemove", e => {
    lastX = e.clientX; lastY = e.clientY;
    if(!curEl) return;
    if(!raf) raf = requestAnimationFrame(() => { raf = 0; place(); });
  });
  document.addEventListener("mouseout", e => {
    if(curEl && !(e.relatedTarget && curEl.contains(e.relatedTarget))) hide();
  });
  addEventListener("scroll", hide, true);
  document.addEventListener("mousedown", hide, true);
  addEventListener("blur", hide);
})();
</script>
</body>
