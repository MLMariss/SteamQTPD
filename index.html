<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QHPP — Steam value hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0e1320; --panel:#161d2e; --panel-2:#1b2438; --line:#232c42;
    --text:#e6ebf5; --muted:#8b97b3; --muted-2:#5d6885;
    --gold:#f2b441; --gold-dim:#5a4a22; --blue:#5b8def; --coral:#ff6b6b;
    --teal:#46c79a;
    --sans:"IBM Plex Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 500px at 80% -10%, #18203400, #0e1320),
      var(--bg);
    color:var(--text); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.4;
  }
  a{color:var(--blue); text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1240px; margin:0 auto; padding:28px 22px 60px}

  /* ---- masthead ---- */
  .mast{display:flex; align-items:flex-end; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:22px}
  .brand{display:flex; align-items:baseline; gap:14px}
  .logo{font-weight:700; font-size:30px; letter-spacing:-.04em; line-height:1;
        background:linear-gradient(180deg,#fff,#cdd6ea); -webkit-background-clip:text; background-clip:text; color:transparent}
  .logo b{color:var(--gold); -webkit-text-fill-color:var(--gold)}
  .tagline{font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.02em}
  .meta{font-family:var(--mono); font-size:12px; color:var(--muted); text-align:right; line-height:1.7}
  .meta .n{color:var(--text)}
  .preview-badge{display:inline-block; margin-left:8px; padding:1px 7px; border:1px solid var(--gold-dim);
        color:var(--gold); border-radius:999px; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase}

  /* ---- controls ---- */
  .controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px}
  .search{flex:1 1 240px; min-width:200px; position:relative}
  .search input{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text);
        font-family:var(--sans); font-size:14px; padding:10px 12px 10px 34px; border-radius:9px; outline:none}
  .search input::placeholder{color:var(--muted-2)}
  .search input:focus-visible{border-color:var(--blue); box-shadow:0 0 0 3px #5b8def33}
  .search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted-2)}
  .seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:9px; overflow:hidden}
  .seg button{appearance:none; background:transparent; border:0; color:var(--muted); font-family:var(--mono);
        font-size:12px; padding:9px 12px; cursor:pointer; letter-spacing:.02em}
  .seg button[aria-pressed="true"]{background:var(--panel-2); color:var(--text)}
  .seg button:focus-visible{outline:2px solid var(--blue); outline-offset:-2px}
  .toggle{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:12px; padding:9px 13px; border-radius:9px; cursor:pointer; letter-spacing:.02em}
  .toggle[aria-pressed="true"]{border-color:var(--coral); color:var(--coral)}
  .toggle:focus-visible{outline:2px solid var(--blue); outline-offset:2px}
  .pricefilter{display:inline-flex; align-items:center; gap:5px; background:var(--panel); border:1px solid var(--line);
        border-radius:9px; padding:0 11px; font-family:var(--mono); font-size:12px; color:var(--muted)}
  .pricefilter input{width:56px; background:transparent; border:0; color:var(--text); font-family:var(--mono);
        font-size:13px; padding:9px 0; outline:none}
  .pricefilter:focus-within{border-color:var(--blue); box-shadow:0 0 0 3px #5b8def33}

  /* ---- tag rail ---- */
  .tagrail{display:flex; gap:7px; flex-wrap:wrap; margin:4px 0 18px}
  .chip{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:11.5px; padding:5px 10px; border-radius:999px; cursor:pointer}
  .chip:hover{border-color:var(--muted-2); color:var(--text)}
  .chip[aria-pressed="true"]{background:#22305020; border-color:var(--blue); color:var(--blue)}
  .chip .x{opacity:.7; margin-left:4px}

  /* ---- table ---- */
  .tablecard{background:linear-gradient(180deg,#161d2e,#131a29); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  table{width:100%; border-collapse:collapse}
  thead th{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase;
        color:var(--muted); text-align:left; padding:13px 14px; border-bottom:1px solid var(--line); white-space:nowrap; user-select:none}
  thead th.sortable{cursor:pointer}
  thead th.sortable:hover{color:var(--text)}
  thead th.num{text-align:right}
  .arrow{color:var(--gold); margin-left:4px; font-size:10px}
  tbody td{padding:13px 14px; border-bottom:1px solid #1d263b; vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#1a2336}

  .gtitle{font-weight:600; font-size:14.5px}
  .gsub{font-family:var(--mono); font-size:11px; color:var(--muted-2); margin-top:3px}

  .num{font-family:var(--mono); text-align:right; white-space:nowrap}
  .rating{display:flex; align-items:center; gap:7px; justify-content:flex-start}
  .dot{width:8px; height:8px; border-radius:50%; flex:none}
  .rval{font-family:var(--mono); font-size:13.5px}
  .rcount{font-family:var(--mono); font-size:10.5px; color:var(--muted-2)}

  .price-final{font-family:var(--mono); font-size:14px; font-weight:600}
  .price-init{font-family:var(--mono); font-size:11.5px; color:var(--muted-2); text-decoration:line-through; margin-right:6px}
  .disc{display:inline-block; margin-left:7px; font-family:var(--mono); font-size:10.5px; color:#0e1320;
        background:var(--coral); padding:1px 5px; border-radius:5px; font-weight:600}
  .free{font-family:var(--mono); font-size:12.5px; color:var(--teal)}

  .countdown{font-family:var(--mono); font-size:12.5px; color:var(--coral)}
  .countdown.soon{font-weight:600}
  .nosale{color:var(--muted-2)}
  .rel{font-family:var(--mono); font-size:12px; color:var(--muted)}

  .tags{display:flex; gap:5px; flex-wrap:wrap; max-width:230px}
  .tag{font-family:var(--mono); font-size:10.5px; color:var(--muted); background:#1d2740; border:1px solid #28324c;
        padding:2px 7px; border-radius:6px; cursor:pointer; white-space:nowrap}
  .tag:hover{color:var(--text); border-color:var(--blue)}
  .tag.more{cursor:default; color:var(--muted-2); border-style:dashed}

  .hltb{display:flex; gap:11px; justify-content:flex-end}
  .hcol{text-align:right}
  .hcol .v{font-family:var(--mono); font-size:13px}
  .hcol .l{font-family:var(--mono); font-size:9px; color:var(--muted-2); letter-spacing:.06em; text-transform:uppercase}

  /* signature: QHPP value meter */
  .qcell{min-width:150px}
  .qtop{display:flex; align-items:baseline; justify-content:flex-end; gap:8px}
  .qval{font-family:var(--mono); font-size:16px; font-weight:600; color:var(--gold)}
  .qalt{font-family:var(--mono); font-size:11px; color:var(--muted-2)}
  .qbar{position:relative; height:6px; background:#212b44; border-radius:99px; margin-top:7px; overflow:hidden}
  .qfill{position:absolute; left:0; top:0; bottom:0; border-radius:99px;
        background:linear-gradient(90deg,#a87d1f,var(--gold)); transition:width .35s ease}
  .qnull{font-family:var(--mono); font-size:12px; color:var(--muted-2); text-align:right}

  .empty{padding:48px 20px; text-align:center; color:var(--muted)}
  .empty b{color:var(--text); font-weight:600}
  .foot{margin-top:18px; font-family:var(--mono); font-size:11px; color:var(--muted-2); line-height:1.8}
  .foot code{color:var(--muted)}

  /* ---- responsive: cards under 860px ---- */
  @media (max-width:860px){
    thead{display:none}
    table,tbody,tr,td{display:block; width:100%}
    tbody tr{padding:14px; border-bottom:1px solid var(--line)}
    tbody tr:hover{background:transparent}
    tbody td{padding:4px 0; border:0; display:flex; justify-content:space-between; align-items:center; gap:14px}
    tbody td::before{content:attr(data-label); font-family:var(--mono); font-size:10.5px; letter-spacing:.05em;
        text-transform:uppercase; color:var(--muted-2)}
    .tags{max-width:none; justify-content:flex-end}
    .num,.qtop,.hltb,.rating{justify-content:flex-end}
    .qcell{min-width:0; flex:1}
    .qbar{flex:1; max-width:160px; margin-top:0}
    td.tdqhpp{flex-wrap:wrap}
  }
  @media (prefers-reduced-motion:reduce){ .qfill{transition:none} }
</style>
</head>
<body>
<div class="wrap">

  <div class="mast">
    <div class="brand">
      <div class="logo">Q<b>H</b>PP</div>
      <div class="tagline">quality hours per dollar · steam value hunter</div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <div class="controls">
    <label class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="q" type="search" placeholder="Search a game title…" autocomplete="off" />
    </label>
    <div class="seg" role="group" aria-label="QHPP price basis">
      <button id="qb-after"  aria-pressed="true">QHPP after</button>
      <button id="qb-before" aria-pressed="false">before</button>
    </div>
    <button class="toggle" id="saleOnly" aria-pressed="false">On sale only</button>
    <div class="seg" role="group" aria-label="Minimum rating">
      <button data-minscore="0" aria-pressed="true">any</button>
      <button data-minscore="70" aria-pressed="false">70+</button>
      <button data-minscore="80" aria-pressed="false">80+</button>
      <button data-minscore="90" aria-pressed="false">90+</button>
    </div>
    <label class="pricefilter">max $<input id="maxprice" type="number" min="0" step="1" inputmode="numeric" placeholder="∞" /></label>
    <button class="toggle" id="clear" style="border-color:var(--line);color:var(--muted)">Reset</button>
  </div>

  <div class="tagrail" id="tagrail"></div>

  <div class="tablecard">
    <table>
      <thead>
        <tr>
          <th class="sortable" data-sort="title">Game</th>
          <th class="sortable" data-sort="rating_pct">Rating</th>
          <th class="sortable" data-sort="price_final">Price</th>
          <th class="sortable" data-sort="discount_end">Sale ends</th>
          <th class="sortable" data-sort="release_ts">Released</th>
          <th>Tags</th>
          <th class="sortable num" data-sort="hltb_complete" title="Main / Main+Extras / Completionist (hours)">HLTB · M/E/C</th>
          <th class="sortable num" data-sort="qhpp">QHPP <span class="arrow" id="qarrow">▼</span></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
// ----- embedded preview data (used only if games.json can't be fetched, e.g. file://) -----
const SAMPLE = {sample:true, generated_at: Math.floor(Date.now()/1000), count:6, games:[
 {appid:900001,title:"Verdant Exile",url:"https://store.steampowered.com/app/900001",release_ts:1678752000,rating_pct:93,review_count:7640,price_initial:29.99,price_final:11.99,discount_pct:60,discount_end:Math.floor(Date.now()/1000)+9*86400,is_free:false,tags:["Survival","Crafting","Open World","Base Building","Farming","Co-op","Singleplayer","Exploration"],hltb_main:40,hltb_extra:75,hltb_complete:150,hltb_avg:88.3,qhpp_before:2.738,qhpp_after:6.849},
 {appid:900002,title:"Tideforge",url:"https://store.steampowered.com/app/900002",release_ts:1628553600,rating_pct:96,review_count:18900,price_initial:19.99,price_final:14.99,discount_pct:25,discount_end:Math.floor(Date.now()/1000)+4*86400+3600*5,is_free:false,tags:["Automation","Crafting","Base Building","Factory","Singleplayer","Resource Management","Open World","Indie"],hltb_main:30,hltb_extra:60,hltb_complete:120,hltb_avg:70,qhpp_before:3.362,qhpp_after:4.483},
 {appid:900003,title:"Hollowreach",url:"https://store.steampowered.com/app/900003",release_ts:1714608000,rating_pct:91,review_count:4210,price_initial:24.99,price_final:14.99,discount_pct:40,discount_end:Math.floor(Date.now()/1000)+6*86400,is_free:false,tags:["Survival","Crafting","Open World","Base Building","Exploration","Co-op","Singleplayer","Sandbox"],hltb_main:14,hltb_extra:26,hltb_complete:48,hltb_avg:29.3,qhpp_before:1.067,qhpp_after:1.779},
 {appid:900004,title:"Stoneward",url:"https://store.steampowered.com/app/900004",release_ts:1573084800,rating_pct:78,review_count:932,price_initial:16.99,price_final:16.99,discount_pct:0,discount_end:null,is_free:false,tags:["Survival","Crafting","Difficult","Atmospheric","Singleplayer","Exploration","Indie","Open World"],hltb_main:9,hltb_extra:15,hltb_complete:22,hltb_avg:15.3,qhpp_before:0.702,qhpp_after:0.702},
 {appid:900005,title:"Driftbound",url:"https://store.steampowered.com/app/900005",release_ts:1655251200,rating_pct:84,review_count:26500,price_initial:null,price_final:null,discount_pct:0,discount_end:null,is_free:true,tags:["Free to Play","Survival","Multiplayer","Crafting","Open World","Co-op","MMO","Base Building"],hltb_main:25,hltb_extra:null,hltb_complete:null,hltb_avg:25,qhpp_before:null,qhpp_after:null},
 {appid:900006,title:"Ashen Hollow Deep",url:"https://store.steampowered.com/app/900006",release_ts:1740009600,rating_pct:88,review_count:211,price_initial:12.99,price_final:12.99,discount_pct:0,discount_end:null,is_free:false,tags:["Survival","Crafting","Mining","Underground","Singleplayer","Exploration","Indie","Atmospheric"],hltb_main:null,hltb_extra:null,hltb_complete:null,hltb_avg:null,qhpp_before:null,qhpp_after:null}
]};

// ----- state -----
const state = { data:null, q:"", tags:new Set(), saleOnly:false, qBasis:"after",
                minScore:0, maxPrice:null, sortKey:"qhpp", sortDir:-1 };

// ----- helpers -----
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const activeQ = g => state.qBasis === "after" ? g.qhpp_after : g.qhpp_before;
const altQ    = g => state.qBasis === "after" ? g.qhpp_before : g.qhpp_after;

function ratingColor(p){
  if(p == null) return "var(--muted-2)";
  if(p >= 85) return "var(--teal)";
  if(p >= 70) return "var(--gold)";
  if(p >= 40) return "#e08a4a";
  return "var(--coral)";
}
function fmtCountdown(end){
  if(!end) return null;
  let s = end - Math.floor(Date.now()/1000);
  if(s <= 0) return {text:"ended", soon:true};
  const d = Math.floor(s/86400); s -= d*86400;
  const h = Math.floor(s/3600);  s -= h*3600;
  const m = Math.floor(s/60);    const sec = s - m*60;
  const pad = n => String(n).padStart(2,"0");
  const text = d > 0 ? `${d}d ${pad(h)}h ${pad(m)}m` : `${pad(h)}h ${pad(m)}m ${pad(sec)}s`;
  return {text, soon: d < 1};
}
function relTime(ts){
  const s = Math.floor(Date.now()/1000) - ts;
  if(s < 3600) return Math.max(1,Math.floor(s/60)) + "m ago";
  if(s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtRelease(g){
  if(g.release_ts){ const d = new Date(g.release_ts*1000); return `${MONTHS[d.getUTCMonth()]} ${d.getUTCFullYear()}`; }
  return g.release_date || "—";
}

// ----- rendering -----
function visibleGames(){
  let g = state.data.games.slice();
  const q = state.q.trim().toLowerCase();
  if(q) g = g.filter(x => x.title.toLowerCase().includes(q));
  if(state.saleOnly) g = g.filter(x => x.discount_pct > 0);
  if(state.minScore > 0) g = g.filter(x => x.rating_pct != null && x.rating_pct >= state.minScore);
  if(state.maxPrice != null) g = g.filter(x => {
    const p = x.is_free ? 0 : x.price_final;          // treat Free as $0 for a max-price cap
    return p != null && p <= state.maxPrice;
  });
  if(state.tags.size) g = g.filter(x => {
    const t = new Set((x.tags||[]).map(s=>s.toLowerCase()));
    for(const want of state.tags) if(!t.has(want)) return false;
    return true;
  });
  const k = state.sortKey, dir = state.sortDir;
  const val = x => k === "qhpp" ? activeQ(x) : x[k];
  g.sort((a,b)=>{
    let av = val(a), bv = val(b);
    if(k === "title"){ return dir * a.title.localeCompare(b.title); }
    const an = av == null, bn = bv == null;        // nulls always sink
    if(an && bn) return 0;
    if(an) return 1;
    if(bn) return -1;
    return dir * (av - bv);
  });
  return g;
}

function render(){
  const games = visibleGames();
  const tbody = $("#rows"), empty = $("#empty");
  // value-meter scale across the visible set, on the active QHPP basis
  const qs = games.map(activeQ).filter(v => v != null);
  const qMin = Math.min(...qs), qMax = Math.max(...qs);
  const fillPct = v => {
    if(v == null || !qs.length) return 0;
    if(qMax === qMin) return 100;
    return 6 + 94 * (v - qMin) / (qMax - qMin);   // 6% floor so lowest stays visible
  };

  if(!games.length){
    tbody.innerHTML = "";
    empty.style.display = "block";
    empty.innerHTML = "<b>No games match these filters.</b><br>Clear the search or deselect tags to see more.";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = games.map(g => {
    // price cell
    let price;
    if(g.is_free) price = `<span class="free">Free</span>`;
    else if(g.price_final == null) price = `<span class="nosale">—</span>`;
    else if(g.discount_pct > 0)
      price = `<span class="price-init">$${g.price_initial.toFixed(2)}</span><span class="price-final">$${g.price_final.toFixed(2)}</span><span class="disc">-${g.discount_pct}%</span>`;
    else price = `<span class="price-final">$${g.price_final.toFixed(2)}</span>`;

    // sale ends
    let sale;
    if(g.discount_pct > 0 && g.discount_end){
      const c = fmtCountdown(g.discount_end);
      sale = `<span class="countdown${c.soon?" soon":""}" data-end="${g.discount_end}">${c.text}</span>`;
    } else if(g.discount_pct > 0){
      sale = `<span class="countdown">on sale</span>`;
    } else sale = `<span class="nosale">—</span>`;

    // tags (first 4 clickable, rest collapsed)
    const shown = (g.tags||[]).slice(0,4);
    const extra = (g.tags||[]).length - shown.length;
    const tagHtml = shown.map(t => `<button class="tag" data-tag="${esc(t.toLowerCase())}">${esc(t)}</button>`).join("")
                  + (extra>0 ? `<span class="tag more">+${extra}</span>` : "");

    // hltb
    const hc = (v,l) => `<div class="hcol"><div class="v">${v==null?'—':v}</div><div class="l">${l}</div></div>`;
    const hltb = `<div class="hltb">${hc(g.hltb_main,'main')}${hc(g.hltb_extra,'+ext')}${hc(g.hltb_complete,'100%')}</div>`;

    // qhpp signature cell
    const av = activeQ(g), other = altQ(g);
    let qhpp;
    if(av == null){
      qhpp = `<div class="qnull">—</div>`;
    } else {
      const otherTxt = other == null ? "" : `<span class="qalt">${other.toFixed(2)} ${state.qBasis==="after"?"full":"sale"}</span>`;
      qhpp = `<div class="qtop"><span class="qval">${av.toFixed(2)}</span>${otherTxt}</div>
              <div class="qbar"><div class="qfill" style="width:${fillPct(av).toFixed(1)}%"></div></div>`;
    }

    return `<tr>
      <td data-label="Game"><a class="gtitle" href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.title)}</a>
          <div class="gsub">${g.review_count? g.review_count.toLocaleString()+" reviews":"app "+g.appid}</div></td>
      <td data-label="Rating"><div class="rating"><span class="dot" style="background:${ratingColor(g.rating_pct)}"></span>
          <span><span class="rval" style="color:${ratingColor(g.rating_pct)}">${g.rating_pct==null?'—':g.rating_pct+'%'}</span></span></div></td>
      <td data-label="Price">${price}</td>
      <td data-label="Sale ends">${sale}</td>
      <td data-label="Released" class="num"><span class="rel">${fmtRelease(g)}</span></td>
      <td data-label="Tags"><div class="tags">${tagHtml}</div></td>
      <td data-label="HLTB M/E/C" class="num">${hltb}</td>
      <td data-label="QHPP" class="num tdqhpp qcell">${qhpp}</td>
    </tr>`;
  }).join("");
}

// live countdown tick
setInterval(() => {
  document.querySelectorAll(".countdown[data-end]").forEach(el => {
    const c = fmtCountdown(parseInt(el.dataset.end,10));
    if(c){ el.textContent = c.text; el.classList.toggle("soon", c.soon); }
  });
}, 1000);

// ----- tag rail (most common tags across the dataset) -----
function buildTagRail(){
  const counts = {};
  state.data.games.forEach(g => (g.tags||[]).forEach(t => {
    const k = t.toLowerCase(); counts[k] = (counts[k]||0)+1;
  }));
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,18);
  const rail = $("#tagrail");
  rail.innerHTML = top.map(([t,n]) => {
    const on = state.tags.has(t);
    const label = t.replace(/\b\w/g, c=>c.toUpperCase());
    return `<button class="chip" data-tag="${esc(t)}" aria-pressed="${on}">${esc(label)}${on?'<span class="x">×</span>':''}</button>`;
  }).join("");
}

function toggleTag(t){
  t = t.toLowerCase();
  if(state.tags.has(t)) state.tags.delete(t); else state.tags.add(t);
  buildTagRail(); render();
}

// ----- meta + footer -----
function renderMeta(){
  const d = state.data;
  const badge = d.sample ? '<span class="preview-badge">preview data</span>' : '';
  const when = d.sample ? '' : `updated ${relTime(d.generated_at)} · `;
  $("#meta").innerHTML = `<span class="n">${d.games.length}</span> games · ${when}USD${badge}`;
  $("#foot").innerHTML =
    `QHPP = (avg HLTB hours × rating%) ÷ price · higher = more quality-adjusted hours per dollar · null for free games & games without HLTB data.<br>`+
    `Data: Steam store + reviews, SteamSpy tags, How Long To Beat. Edit <code>seeds.txt</code> and run <code>scraper.py</code> to refresh.`;
}

// ----- wire up -----
function setSort(key){
  if(state.sortKey === key){ state.sortDir *= -1; }
  else { state.sortKey = key; state.sortDir = (key === "title") ? 1 : -1; }
  document.querySelectorAll("thead th .arrow:not(#qarrow)").forEach(a=>a.remove());
  document.querySelectorAll("thead th.sortable").forEach(th=>{
    const a = th.querySelector(".arrow");
    if(th.dataset.sort === key){
      const mark = state.sortDir < 0 ? "▼" : "▲";
      if(a) a.textContent = mark;
      else th.insertAdjacentHTML("beforeend", ` <span class="arrow">${mark}</span>`);
    } else if(a && th.dataset.sort !== "qhpp"){ a.remove(); }
  });
  render();
}

function init(data){
  state.data = data;
  buildTagRail(); renderMeta(); render();

  $("#q").addEventListener("input", e => { state.q = e.target.value; render(); });
  $("#saleOnly").addEventListener("click", e => {
    state.saleOnly = !state.saleOnly; e.currentTarget.setAttribute("aria-pressed", state.saleOnly); render();
  });
  $("#qb-after").addEventListener("click", () => setBasis("after"));
  $("#qb-before").addEventListener("click", () => setBasis("before"));

  document.querySelectorAll("[data-minscore]").forEach(b =>
    b.addEventListener("click", () => {
      state.minScore = parseInt(b.dataset.minscore, 10);
      document.querySelectorAll("[data-minscore]").forEach(o =>
        o.setAttribute("aria-pressed", o === b));
      render();
    }));
  $("#maxprice").addEventListener("input", e => {
    const v = e.target.value.trim();
    state.maxPrice = v === "" ? null : Math.max(0, parseFloat(v));
    render();
  });

  $("#clear").addEventListener("click", () => {
    state.q=""; state.tags.clear(); state.saleOnly=false; state.minScore=0; state.maxPrice=null;
    $("#q").value=""; $("#maxprice").value=""; $("#saleOnly").setAttribute("aria-pressed","false");
    document.querySelectorAll("[data-minscore]").forEach(o =>
      o.setAttribute("aria-pressed", o.dataset.minscore === "0"));
    buildTagRail(); render();
  });
  document.querySelectorAll("thead th.sortable").forEach(th =>
    th.addEventListener("click", () => setSort(th.dataset.sort)));
  // event delegation for tag clicks (rail + in-row tags)
  document.body.addEventListener("click", e => {
    const t = e.target.closest("[data-tag]");
    if(t){ toggleTag(t.dataset.tag); }
  });
}
function setBasis(b){
  state.qBasis = b;
  $("#qb-after").setAttribute("aria-pressed", b==="after");
  $("#qb-before").setAttribute("aria-pressed", b==="before");
  renderMeta(); render();
}

// load real data, fall back to embedded sample (covers file:// preview)
fetch("games.json", {cache:"no-store"})
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(d => init(d && d.games && d.games.length ? d : SAMPLE))
  .catch(() => init(SAMPLE));
</script>
