<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QTPD</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0e1320; --panel:#192133; --panel-2:#212c42; --line:#2c3858;
    --text:#f1f4fb; --title:#ffffff; --muted:#b9c4dd; --muted-2:#94a0c0;
    --gold:#ffc24d; --gold-deep:#b98a28; --gold-soft:#3a2f17; --blue:#6f9bff; --coral:#ff7d7d;
    --teal:#5dd6a8; --green:#54c98a; --red:#ff7d7d;
    --sans:"IBM Plex Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1400px 560px at 82% -12%, #1a2236 0%, #0e1320 60%), var(--bg);
    color:var(--text); font-family:var(--sans); font-size:14px;
    -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  a{color:var(--blue); text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{width:100%; max-width:2400px; margin:0 auto; padding:0 clamp(8px,1.4vw,30px)}
  .wrap.body{padding-bottom:70px}

  /* ---- header (scrolls away; table header takes over as sticky, see thead below) ---- */
  .topbar{position:relative; z-index:40; padding-top:10px; background:var(--bg)}
  .barwrap{background:linear-gradient(180deg,#1a2336,#161e2f); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .bar-main{display:flex; align-items:center; gap:16px; padding:12px 16px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:13px; flex:none}
  .logo{font-family:inherit; font-weight:700; font-size:28px; letter-spacing:-.04em; line-height:1;
        background:linear-gradient(180deg,#fff,#d6deef); -webkit-background-clip:text; background-clip:text; color:transparent;
        border:0; padding:0; cursor:pointer; -webkit-tap-highlight-color:transparent}
  .logo:hover b{filter:brightness(1.15)}
  .logo:focus-visible{outline:2px solid var(--gold); outline-offset:3px; border-radius:4px}
  .logo b{color:var(--gold); -webkit-text-fill-color:var(--gold)}
  .tagline{font-family:var(--mono); font-size:13px; color:var(--muted); letter-spacing:.02em}
  .search{flex:1 1 240px; min-width:180px; position:relative}
  .search input{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text);
        font-family:var(--sans); font-size:14px; padding:10px 34px 10px 36px; border-radius:9px; outline:none}
  .search input::placeholder{color:var(--muted-2)}
  .search input:focus-visible{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33}
  /* Kill the browser's own (flaky, hover-only) search ✕ — we render our own persistent one. */
  .search input::-webkit-search-cancel-button{-webkit-appearance:none; appearance:none}
  .search svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted-2)}
  .search .field-x{right:8px}

  /* Shared in-field clear (✕): red like the Reset button so it reads as "remove what's typed",
     and it stays put whenever the field holds text (no hover-to-reveal). Used by the header
     search and the wishlist box; the tag-search ✕ (.ts-x) matches the same colour. */
  .field-x{position:absolute; top:50%; transform:translateY(-50%); display:none;
        appearance:none; background:transparent; border:0; padding:4px; cursor:pointer;
        color:var(--coral); font-size:14px; line-height:1}
  .field-x:hover{color:#ffb0b0}
  .has-q > .field-x{display:block}
  .meta{font-family:var(--mono); font-size:13px; color:var(--muted); text-align:right; line-height:1.55; flex:none}
  .meta .n{color:var(--text)}
  .preview-badge{display:inline-block; margin-left:8px; padding:2px 8px; border:1px solid var(--gold-deep);
        color:var(--gold); border-radius:999px; font-size:12px; letter-spacing:.05em; text-transform:uppercase}

  .bar-filters{padding:0 16px; border-top:1px solid var(--line)}
  /* Folded filter bar reads as a clean vertical list — the wishlist row, then the three section
     headers, all similar height. #1 no container vertical padding; #2 the wishlist row gets its
     own balanced vertical space (min-height matches a section header) and centres its box in it;
     #3 drop the divider between the wishlist row and Value so the input isn't sandwiched between
     two lines. (Mobile reorders the wishlist row to the bottom — see the layout-card block.) */
  .bar-filters > .ctl-row:first-child{margin:0; padding:6px 0; min-height:47px; align-items:center}
  body:not(.layout-card) .bar-filters > .filter-section[data-section="value"]{border-top:0}
  .topbar.compact .bar-filters{display:none}             /* instant, no animation */
  .topbar.compact .tagline{display:none}
  .topbar.compact .logo{font-size:23px}

  .collapse-handle{display:block; width:100%; border:0; border-top:1px solid var(--line); background:var(--panel);
        color:var(--muted); font-family:var(--mono); font-size:13px; letter-spacing:.04em; padding:8px; cursor:pointer}
  .collapse-handle:hover{background:var(--panel-2); color:var(--text)}

  .ctl-row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:12px}
  .ctl-row:last-child{margin-bottom:0}
  .field{display:flex; flex-direction:column; gap:6px}
  .field > label{font-family:var(--mono); font-size:12px; color:var(--muted-2); letter-spacing:.05em; text-transform:uppercase}
  /* Flags is the widest cluster in the bar (8 groups, ~23 buttons). Once every presence flag
     shares the same Any/Exclude/Only schema the buttons stop needing generous hit padding to be
     readable, so this section alone trades 3px of horizontal padding per button to keep the whole
     cluster on ONE row. Vertical padding is untouched, so the row height and hit area hold. */
  .filter-section[data-section="flags"] .seg button{padding-left:9px; padding-right:9px}
  /* A field carrying an explainer tooltip advertises it with the help (?) cursor — the single,
     uncluttered "there's an explanation here" signal (see the global [title] rule below). The
     old dotted underline was dropped: once every explained field wore one, the page read as a
     mess of underlines. The tooltip itself covers the whole .field, not just the label. */
  .field[title] > label{cursor:help}
  .field[title]:hover > label{color:var(--text)}

  /* ── Tooltip affordance ────────────────────────────────────────────────────────────────────
     One consistent cue that a field carries an explanation: the help (?) cursor on hover. It
     replaces the old per-field dotted underline (too much clutter once everything had a tip).
     Genuine action buttons keep their pointer — a click is their point, the tip is a bonus —
     but the sortable column headers, filter fields, and hoverable cell values all advertise
     their tip with ?. Emptying the native `title` on hover (the JS engine below) keeps the
     attribute present, so these selectors stay matched while the custom tooltip is shown. */
  [title]{cursor:help}
  .util-btn[title], .viewseg button[title], .pagesize button[title], .steppers button[title],
  #msortdir[title], #gsortdir[title], .gsort-b[title], .gsort-morebtn[title], .logo[title],
  .field-x[title], .hidebtn[title], [data-tag][title], .sumf[title], .sumreset[title],
  .unhide-link[title], .seg button[title], .section-head[title], #wishimport[title],
  #clear[title], .linkbtn[title]{cursor:pointer}
  /* Text fields that carry a tip keep the text caret, not the help cursor. */
  input[title]{cursor:text}
  /* …but the sortable headers (single and split) DO wear the ? — they are the fields this
     redesign is about — even though a click also sorts. */
  thead th.sortable[title], thead th.th-split[title], .th-split .splitsort{cursor:help}

  /* ── Custom tooltip ────────────────────────────────────────────────────────────────────────
     Every explanation on the page (filters, headers, cell values) is now drawn by one styled
     floating box instead of the OS's tiny grey native tooltip, so they all look identical and
     read clearly. Bigger text + generous padding + a raised panel with a border and a real
     shadow, so it stands off the page instead of blending in. Keyword coloring (below) is
     applied automatically by the JS engine — no per-tip markup. */
  .uitip{position:fixed; z-index:9999; left:0; top:0; max-width:340px; pointer-events:none;
        background:#26324c; color:var(--text); border:1px solid var(--line); border-radius:10px;
        padding:11px 14px; font-family:var(--sans); font-size:13.5px; line-height:1.5;
        letter-spacing:.005em; box-shadow:0 8px 26px #000b, 0 0 0 1px #0004;
        opacity:0; transform:translateY(2px); transition:opacity .09s ease, transform .09s ease}
  .uitip.show{opacity:1; transform:translateY(0)}
  /* Subtle keyword coloring — assists the eye without shouting. The leading subject (the "what
     this is about") is gold; numbers/percentages are blue; positive/negative cues pick up the
     teal/coral the rest of the app already uses for recommend / not-recommend. */
  .uitip .tk-key{color:var(--gold); font-weight:600}
  .uitip .tk-num{color:var(--blue); font-weight:500}
  .uitip .tk-pos{color:var(--teal); font-weight:500}
  .uitip .tk-neg{color:var(--coral); font-weight:500}

  .seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:9px; overflow:hidden}
  .seg button{appearance:none; background:transparent; border:0; color:var(--muted); font-family:var(--mono);
        font-size:13px; padding:9px 12px; cursor:pointer; letter-spacing:.01em; white-space:nowrap}
  .seg button[aria-pressed="true"]{background:var(--panel-2); color:var(--text)}
  /* "Changed from default" = gold. Applied by markChangedControls() (JS) to the pressed button
     of any group whose value differs from its default — so a group at its default reads neutral
     (blue-ish) and only manually-adjusted controls light up gold. This supersedes the old blanket
     `.seg.metric [aria-pressed]` gold, which lit "Main" gold even when it was the untouched default. */
  .seg button[aria-pressed="true"].changed{background:var(--gold-soft); color:var(--gold)}
  .seg button:focus-visible{outline:2px solid var(--blue); outline-offset:-2px}

  /* per-page size selector in the top bar */
  .pagesize{display:inline-flex; align-items:center; gap:7px; flex:none}
  .pagesize-lbl{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
  .pagesize button{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:12px; padding:5px 9px; cursor:pointer; border-radius:7px}
  .pagesize button:hover{color:var(--text)}
  .pagesize button.on{background:var(--gold-soft); color:var(--gold); border-color:var(--gold-soft)}
  .pagesize button:focus-visible{outline:2px solid var(--blue); outline-offset:-2px}
  /* infinite-scroll sentinel / "loading more" row */
  .loadmore{text-align:center; padding:18px; font-family:var(--mono); font-size:12px; color:var(--muted)}

  /* Mobile sort control — hidden on desktop (the table headers sort there). Shown in the bar
     in card mode, where the <thead> is display:none and would otherwise leave no way to sort. */
  .mobile-sort{display:none; align-items:center; gap:7px; flex:none}
  .ms-lbl{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
  .mobile-sort select{appearance:none; -webkit-appearance:none; -moz-appearance:none; background:var(--panel);
        border:1px solid var(--line); color:var(--text); font-family:var(--mono); font-size:13px;
        padding:8px 28px 8px 10px; border-radius:8px; cursor:pointer;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none' stroke='%2394a0c0' stroke-width='1.6'><path d='M1 1l4 4 4-4'/></svg>");
        background-repeat:no-repeat; background-position:right 10px center}
  .mobile-sort select:focus-visible{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33; outline:none}
  .mobile-sort #msortdir{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--gold);
        font-family:var(--mono); font-size:14px; line-height:1; padding:8px 11px; border-radius:8px; cursor:pointer}
  .mobile-sort #msortdir:hover{border-color:var(--gold-deep)}
  .mobile-sort #msortdir:focus-visible{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33; outline:none}

  .toggle{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:13px; padding:9px 14px; border-radius:9px; cursor:pointer; letter-spacing:.01em}
  /* active = changed-from-default → gold (the sale/wishlist toggles are only ever "on" when the
     user turned them on, so pressed == changed; no separate .changed class needed here) */
  .toggle[aria-pressed="true"]{background:var(--gold-soft); border-color:var(--gold-deep); color:var(--gold)}
  .toggle.wish[aria-pressed="true"]{border-color:var(--gold); color:var(--gold)}
  .toggle:focus-visible{outline:2px solid var(--blue); outline-offset:2px}
  .linkbtn{background:none; border:0; color:var(--muted-2); font-family:var(--mono); font-size:12px;
        cursor:pointer; text-decoration:underline; padding:6px 2px; white-space:nowrap}
  .linkbtn:hover{color:var(--text)}

  /* themed number steppers */
  .numinput{display:inline-flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line);
        border-radius:9px; padding:0 8px 0 11px; font-family:var(--mono); font-size:13px; color:var(--muted-2)}
  .numinput input{width:54px; background:transparent; border:0; color:var(--text); font-family:var(--mono);
        font-size:14px; padding:9px 0; outline:none; text-align:right;
        -webkit-appearance:none; -moz-appearance:textfield; appearance:textfield}
  .numinput input::-webkit-outer-spin-button,.numinput input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .numinput:focus-within{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33}
  /* changed-from-default (a price bound was typed) → gold, matching the seg toggles */
  .numinput.changed{background:var(--gold-soft); border-color:var(--gold-deep)}
  .numinput.changed input{color:var(--gold)}
  .steppers{display:flex; flex-direction:column; gap:2px}
  .steppers button{width:22px; height:17px; line-height:1; border:1px solid var(--line); background:var(--panel-2);
        color:var(--muted); border-radius:4px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; padding:0}
  .steppers button:hover{color:var(--gold); border-color:var(--gold-deep)}
  .pricesep{color:var(--muted-2); padding:0 2px}

  /* wishlist (inline) */
  .wishrow{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  /* Dead space on the wishlist row folds the whole bar (see the .bar-filters > .ctl-row
     handler). The whole .wishrow opts out as one island — it already has a bounding box of
     its own, so unlike a .field it needs no extra hit-box margin. */
  .bar-filters > .ctl-row{cursor:pointer}
  .bar-filters > .ctl-row .wishrow{cursor:auto}
  .wishlabel{font-family:var(--mono); font-size:12px; color:var(--muted-2); letter-spacing:.05em; text-transform:uppercase}
  .wishbox{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:0 0 0 12px}
  .wishbox input{width:280px; background:transparent; border:0; color:var(--text); font-family:var(--mono); font-size:13px; padding:9px 0; outline:none}
  .wishbox input::placeholder{color:var(--muted-2)}
  .wishbox button{background:var(--panel-2); border:0; border-left:1px solid var(--line); color:var(--text);
        font-family:var(--mono); font-size:13px; padding:9px 14px; cursor:pointer; border-radius:0 8px 8px 0}
  .wishbox button:hover{background:#283656}
  .wishbox:focus-within{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33}
  /* The wishbox is a flex bar, so its clear ✕ sits inline (not absolute) between the field and
     Import — override the generic .wishbox button chrome back to a bare red glyph. */
  .wishbox .field-x{position:static; transform:none; background:transparent; border:0; border-radius:0;
        padding:2px 2px 2px 4px; margin-right:-4px; color:var(--coral); font-size:14px}
  .wishbox .field-x:hover{background:transparent; color:#ffb0b0}
  .wishbox.has-q .field-x{display:flex; align-items:center}
  .wishclear{background:var(--panel); border:1px solid var(--line); color:var(--muted); border-radius:9px;
        font-family:var(--mono); font-size:13px; padding:9px 12px; cursor:pointer}
  .wishclear:hover{border-color:var(--coral); color:var(--coral)}

  /* toasts (transient wishlist messages) */
  .toast-host{position:fixed; right:18px; bottom:18px; z-index:200; display:flex; flex-direction:column; gap:8px; max-width:380px}
  .toast{background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:11px 14px;
        font-family:var(--mono); font-size:13px; color:var(--text); box-shadow:0 10px 30px #000a; animation:toastin .18s ease}
  .toast.err{border-color:var(--coral)} .toast.ok{border-color:var(--teal)} .toast a{color:var(--blue)} .toast b{color:var(--gold)}
  @keyframes toastin{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}

  /* qtpd dual range */
  .rangefield{min-width:300px; flex:1 1 320px; max-width:520px}
  .rangewrap{position:relative; height:30px; margin-top:2px}
  .rangetrack{position:absolute; top:13px; left:2px; right:2px; height:5px; background:#2c3858; border-radius:99px}
  .rangefill{position:absolute; top:0; height:100%; background:linear-gradient(90deg,var(--gold-deep),var(--gold)); border-radius:99px}
  .rangewrap input[type=range]{position:absolute; left:0; top:0; width:100%; height:30px; margin:0; background:none;
        pointer-events:none; -webkit-appearance:none; appearance:none}
  .rangewrap input[type=range]:focus{outline:none}
  .rangewrap input[type=range]::-webkit-slider-thumb{pointer-events:all; -webkit-appearance:none; appearance:none;
        height:18px; width:18px; border-radius:50%; background:var(--gold); cursor:pointer; border:2px solid #0e1320; box-shadow:0 1px 3px #0008}
  .rangewrap input[type=range]::-moz-range-thumb{pointer-events:all; height:16px; width:16px; border-radius:50%;
        background:var(--gold); cursor:pointer; border:2px solid #0e1320}
  .rangelabel{display:inline-flex; align-items:baseline; gap:8px; cursor:help}
  /* changed-from-default (range dragged off 0–∞) → gold label, consistent with the other controls */
  .rangelabel.changed{color:var(--gold)}
  .rangevals{font-family:var(--mono); font-size:12px; color:var(--muted); text-transform:none; letter-spacing:0}
  .rangevals b{color:var(--gold); font-weight:600}

  /* grouped tag rail (no search; hover tooltip carries the hint) */
  .tagrail-wrap{cursor:default}
  .taggroup{display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; margin-bottom:8px}
  .grouplabel{font-family:var(--mono); font-size:12.5px; color:var(--gold); letter-spacing:.05em; text-transform:uppercase;
        flex:none; width:120px; text-align:right; opacity:1}
  .grouptags{display:flex; gap:7px; flex-wrap:wrap; flex:1}
  .chip{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--text);
        font-family:var(--mono); font-size:13.5px; padding:5px 11px; border-radius:999px; cursor:pointer; white-space:nowrap}
  .chip:hover{border-color:var(--muted-2); color:var(--text)}
  .chip.dim{opacity:.4}
  .chip.inc{background:#1c3528; border-color:var(--green); color:#9cf0c2; opacity:1}
  .chip.exc{background:#3a2026; border-color:var(--red); color:#ffb4b4; text-decoration:line-through; opacity:1}
  /* A tag cycled back to neutral lingers here (dashed, muted) then fades out over ~3s — its
     opacity is driven in JS (see tagLinger) so a mis-click can be re-applied before it vanishes. */
  .chip.linger{background:var(--panel); border-style:dashed; border-color:var(--muted-2); color:var(--muted); transition:opacity .12s linear}
  .chip .mk{margin-right:5px; font-weight:600}
  .chip .ct{opacity:.8; margin-left:5px; display:inline-block; text-align:left; box-sizing:content-box}
  /* T7: per-group overflow tier — hidden until the group's "+ more" is toggled */
  .taggroup .chip.tag-extra{display:none}
  .taggroup.expanded .chip.tag-extra{display:inline-flex}
  .tagmore{appearance:none; background:transparent; border:1px dashed var(--muted-2); color:var(--muted);
        border-radius:99px; padding:3px 10px; font-family:var(--mono); font-size:12.5px; cursor:pointer; white-space:nowrap}
  .tagmore:hover{border-color:var(--gold); color:var(--gold)}
  .taggroup.expanded .tagmore{border-style:solid}
  /* Visible key for the tag click-cycle (the rail's behavior was previously only in a hover
     title). Reuses the real .chip.inc/.chip.exc styles so the swatches can never drift from
     the actual require/exclude colors; pointer-events off so the demo chips aren't clickable. */
  .taglegend{flex-basis:100%; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
        font-family:var(--mono); font-size:13px; color:var(--muted); margin-bottom:2px}
  .taglegend .chip{cursor:default; pointer-events:none; font-size:13px; padding:3px 10px}
  .taglegend .tl-arrow{opacity:.8}

  /* ---- table ---- */
  /* NOTE: no overflow:hidden here — it would clip the sticky <thead> to the card and stop
     it pinning to the viewport. Rounded corners still render via border-radius + border. */
  .tablecard{background:linear-gradient(180deg,#1a2336,#151d2d); border:1px solid var(--line); border-radius:14px; margin-top:12px}
  /* Fluid table (auto layout). Columns size between a per-column min (small-laptop floor,
     keeps every cell legible) and a per-column max (breathing ceiling). The slack concentrates
     on Game and Tags (the content-heavy columns); the slim numeric/sort columns stay narrow.
     Horizontal overflow stays on the PAGE, not this container: putting overflow-x:auto here
     would trap the sticky <thead> in a scroll box (browsers promote a lone overflow-x:auto to
     overflow:auto on both axes). Below the table's min-width the page scrolls sideways — rare
     now, and the sub-1290px card layout covers the small screens. min-width is the exact sum of
     the per-column minimums (1266px) so the declared floor matches what the columns truly need —
     each floor is measured against its widest real content (e.g. HLTB "1281 1464 1670", Reviews
     "ALL 85% 1.5M") so nothing clips. The ceiling is governed by .wrap (max-width:2400px), which
     lets the table fill ultrawide screens edge to edge; on wide monitors the slack goes to Tags
     then Game (their fr weights), keeping the numeric columns pinned. */
  /* ── Table sizing: CSS Grid with minmax() per column ──────────────────────────────────
     `<col>` min/max-width is ignored by browsers (col only honors width/border/bg/visibility),
     so real per-column min/max comes from Grid. The grid is applied at the ROW level (each
     <tr> is a grid), NOT the table level — this is what keeps the sticky <thead> working: the
     thead stays a normal sticky block while each row lays its cells out on the shared track
     template. `--grid-cols` is defined once and used by both header and body rows so columns
     line up. Slim numeric/sort columns get tight minmax(); Game and Tags take fr slack so they
     absorb width on big screens while the rest stay near their floor. The ceiling comes from
     .wrap (max-width:2400px), so the table breathes on ultrawide without a redundant table cap.
     The card layout takes over at <=1290px — just below the table's real floor — so the table
     view is used as far down as it stays legible and there is no overflow gap between the two. */
  :root{
    --grid-cols:
      minmax(268px, 2.2fr)   /* Game       — floor = thumb + 2-line title; strong growth */
      minmax(100px, 128px)   /* Reviews    — floor fits "ALL 85% 1.5M" */
      minmax(48px,  76px)    /* Trend      — sits right after Reviews (it's derived from them) */
      minmax(54px,  104px)   /* Weighted   — stacked value/delta, so a tight floor still fits */
      minmax(96px,  132px)   /* Price/Sale — merged: struck+final price with discount badge */
      minmax(80px,  108px)   /* Sale ends  */
      minmax(96px,  124px)   /* Released   — floor fits "15.3 yrs old" (longest ageStr form) */
      minmax(84px,  108px)   /* Updated    — last-update recency + patch-cadence badge */
      minmax(140px, 3fr)     /* Tags       — MOST growth (soaks up the slack, fewest wrap rows) */
      minmax(82px,  82px)    /* Playtime   — fixed: fits "▲ 9999h" (ptval min-width 44 + arrow + trimmed pad) */
      minmax(132px, 164px)   /* HLTB       — floor fits "1281 1464 1670" */
      minmax(132px, 144px);  /* QTPD       — floor fits wrapped value+full */
  }
  /* Tags collapsed: the column shrinks to a narrow clickable strip. Its 3fr of growth is
     redistributed across the WHOLE row rather than dumped into Game — Game still takes the
     largest share (it has the most to gain: bigger art, full titles), but every data column
     gets a real increase so the numeric block stays proportionate and readable instead of
     sitting cramped next to one huge cell. Columns that are content-bound at a fixed size
     (Playtime, HLTB, QTPD) grow via their ceilings too, since their contents can be wide
     (e.g. "1281 1464 1670", "▲ 9999h") even when a given filtered view shows dashes. */
  body.tags-collapsed:not(.layout-card){
    --grid-cols:
      minmax(268px, 2.4fr)   /* Game       — biggest single share, but not hoarding it */
      minmax(100px, 0.60fr)  /* Reviews    */
      minmax(48px,  0.34fr)  /* Trend      */
      minmax(54px,  0.46fr)  /* Weighted   */
      minmax(96px,  0.60fr)  /* Price/Sale */
      minmax(80px,  0.50fr)  /* Sale ends  */
      minmax(96px,  0.55fr)  /* Released   */
      minmax(84px,  0.50fr)  /* Updated    */
      38px                   /* Tags       — collapsed strip: fits the toggle pill + seam borders */
      minmax(82px,  0.40fr)  /* Playtime   */
      minmax(132px, 0.72fr)  /* HLTB       */
      minmax(132px, 0.64fr); /* QTPD       */
  }
  /* Hide tag chips but keep the <td> as a grid item — display:none would desync the
     header/body track count and shift every following column. */
  body.tags-collapsed:not(.layout-card) tbody td[data-label="Tags"]{
    overflow:hidden; padding-left:0; padding-right:0;
  }
  body.tags-collapsed:not(.layout-card) tbody td[data-label="Tags"] > *{display:none}
  body.tags-collapsed:not(.layout-card) thead th.tagsth .tagslabel{display:none}
  /* Modest art bump sized to Game's actual gain (~+110px, not the full freed 292px —
     the rest goes to the data columns). Title keeps its 2-line clamp: at ~516px the cell
     fits most titles on one line anyway, and clamping to 1 would truncate the long ones. */
  body.tags-collapsed:not(.layout-card) .thumb{width:180px; height:68px}
  /* The toggle affordance. "><" when open (click to close), "<>" when collapsed.
     overflow:hidden is load-bearing: thead th sets white-space:nowrap, so without it the
     indicator spills out of the 34px collapsed track and paints over the next column. */
  thead th.tagsth{cursor:pointer; gap:6px; overflow:hidden}
  thead th.tagsth:hover{color:var(--text)}
  .tagstoggle{font-family:var(--mono); font-size:12px; color:var(--muted-2); flex:none; line-height:1}
  thead th.tagsth:hover .tagstoggle{color:var(--text)}
  /* Collapsed: the strip is narrow, so without a visible container the bare "<>" reads as a
     stray glyph rather than a control. Give it a bordered pill plus rules down both sides of
     the track. Gold is the site-wide "changed from default" signal, so it marks the COLLAPSED
     state itself (a non-default view), not hover — same convention as the filter controls. */
  body.tags-collapsed:not(.layout-card) thead th.tagsth{
    padding-left:0; padding-right:0; gap:0; justify-content:center;
    border-left:1px solid var(--line); border-right:1px solid var(--line);
  }
  body.tags-collapsed:not(.layout-card) thead th.tagsth .tagstoggle{
    border:1px solid var(--gold-deep); border-radius:5px; padding:4px 3px;
    background:var(--gold-soft); color:var(--gold); letter-spacing:-.08em;
  }
  body.tags-collapsed:not(.layout-card) thead th.tagsth:hover .tagstoggle{
    background:var(--gold-deep); color:#1a1206; border-color:var(--gold);
  }
  /* Carry the seam down the body rows so the collapsed column reads as one continuous
     divider instead of a mark that only exists in the header. */
  body.tags-collapsed:not(.layout-card) tbody td[data-label="Tags"]{
    border-left:1px solid var(--line); border-right:1px solid var(--line);
    /* Same grid-centring trap as the header (see `thead th`): the cell's chips are hidden,
       so its content height is ~0 and the seam rendered as a short stub floating in the
       middle of the row instead of a full-height divider. Stretch it to the row. */
    align-self:stretch;
  }
  .tablescroll{overflow-x:visible; overflow-y:visible}
  .tablecard{scroll-margin-top:8px}
  table{width:100%; margin:0 auto; border-collapse:collapse; min-width:1324px}
  /* Collapsed drops Tags' 140px floor, so the table stays legible on narrower screens. */
  body.tags-collapsed:not(.layout-card) table{min-width:1218px}
  colgroup{display:none}                     /* grid tracks size the columns now, not <col> */
  thead,tbody{display:block; width:100%}     /* let rows be the grid containers */
  thead tr,tbody tr{display:grid; grid-template-columns:var(--grid-cols); align-items:center}
  thead th{font-family:var(--mono); font-size:12px; letter-spacing:.05em; text-transform:uppercase;
        color:var(--muted); text-align:left; padding:12px 12px; border-bottom:1px solid var(--line); white-space:nowrap; user-select:none;
        display:flex; align-items:center; min-width:0;   /* min-width:0 lets cells shrink to their track */
        /* The row is a grid with align-items:center, so by default each cell is only as tall
           as its OWN content and is centred in the track — which puts every header's
           border-bottom at a different height. Invisible while all headers are plain text,
           but the collapsed Tags header holds a bordered pill (taller), so its underline sat
           BELOW its neighbours' and the seam didn't meet the header rule. Stretching every
           header to the full track height makes the bottom border one continuous line, and
           the sort arrow (absolutely positioned at the bottom) anchor consistently too. */
        align-self:stretch}
  thead{position:sticky; top:0; z-index:30; background:#141c2c}   /* whole header sticks; opaque bg so rows don't show through */
  thead th.sortable{cursor:pointer}
  thead th.sortable:hover{color:var(--text)}
  thead th.num{justify-content:flex-end; text-align:right}
  /* thead th sets white-space:nowrap, so a label wider than its track spills into the
     neighbouring column — right-aligned (.num) headers spill LEFTWARD, which is how
     "PLAYTIME" ended up printed across the collapsed Tags toggle. Clip each header to its
     own track; the full text is still available via the existing title tooltips. */
  thead th{overflow:hidden}
  /* The collapsed strip must stay clickable and un-overlapped: give it its own stacking
     context above neighbouring headers. */
  body.tags-collapsed:not(.layout-card) thead th.tagsth{z-index:1}
  thead th.center{justify-content:center; text-align:center}
  /* Sort arrow sits absolutely at the bottom of the sorted header (position:relative context
     below), so it costs no inline width and no extra height (lives in the header's padding). */
  thead th{position:relative}
  .arrow{position:absolute; left:0; right:0; bottom:1px; text-align:center; margin:0;
        font-size:10px; line-height:1; color:var(--gold); pointer-events:none}
  /* Split headers (Score/Count, Price/Sale) insert the arrow INTO the clicked sub-button, whose
     box is only as tall as its own text — so the shared `.arrow{bottom:1px}` landed on top of
     the label. Re-anchor it just beneath that button instead, so it reads below the text like a
     single-column header does, centered under the actual sub-label. Still absolutely positioned,
     so it adds no row height (it sits inside the header's existing bottom padding). */
  .splitsort > .arrow{top:100%; bottom:auto; margin-top:1px}
  tbody td{padding:5px 12px; display:flex; flex-direction:column; justify-content:center; min-width:0; overflow:hidden}
  /* cells stack their content vertically (single-child cells are unaffected; Released and
     QTPD have multiple direct children that must stack, not sit side by side). Horizontal
     placement of the stack is set by the alignment classes below via align-items. */
  tbody td{align-items:flex-start}                 /* default: left */
  tbody td.num{align-items:flex-end}               /* numeric: right */
  tbody td.center{align-items:center}              /* centered */
  td.pad{padding-left:18px; padding-right:18px}
  td.tdqtpd{padding-left:6px}   /* QTPD block: trim left gutter so the value/bar breathe */
  tbody td[data-label="Playtime"]{padding-left:6px}   /* Playtime: trim left gutter, value sits closer to Tags */
  tbody tr{border-bottom:1px solid #222d45}
  tbody tr:last-child{border-bottom:0}
  tbody tr:nth-child(even){background:rgba(127,160,230,.035)}   /* subtle zebra; translucent so the card gradient still shows through */
  tbody tr:hover{background:#1b2640}                            /* declared after zebra so hover always wins */


  .gamecell{display:flex; align-items:center; gap:10px; align-self:stretch; width:100%}
  .gamecell .hidebtn{margin-right:-2px}   /* sit snug to the thumbnail */
  .thumb{position:relative; flex:none; width:150px; height:57px; border-radius:5px; overflow:hidden; background:#0b0f18; border:1px solid #2a3550}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .thumb .pop{position:fixed; z-index:60; width:380px; height:178px; border-radius:8px; overflow:hidden;
        border:1px solid var(--line); box-shadow:0 14px 40px #000b; display:none; pointer-events:none; background:#0b0f18}
  .thumb .pop img{width:100%; height:100%; object-fit:cover}
  /* Adult games (PICS content_desc 3/4): blur the art behind a three-stage reveal.
     Stage 1 (default):   blurred + "18+" badge, whole thumb is a button.
     Stage 2 (.confirm):  click once -> "18+?" confirmation prompt.
     Stage 3 (.revealed): click again -> unblur. It does NOT navigate — the store link is
                          the title beside the art. Right-click undoes (see adultSetStage). */
  .thumb.adult img{filter:blur(8px); transform:scale(1.08); transition:filter .18s ease}
  .thumb.adult .pop img{filter:blur(16px); transform:scale(1.06)}
  .thumb.adult{cursor:pointer}
  .thumb.adult::after{position:absolute; inset:0; z-index:2;
        display:flex; align-items:center; justify-content:center;
        font:700 13px/1 system-ui,sans-serif; letter-spacing:.5px; color:#fff;
        text-shadow:0 1px 3px #000c; pointer-events:none;
        background:radial-gradient(circle at center, #0006, #0002)}
  .thumb.adult:not(.revealed)::after{content:"18+"}
  .thumb.adult.confirm::after{content:"18+?"; font-size:15px;
        background:radial-gradient(circle at center, #000a, #0006)}
  .thumb.adult.revealed img{filter:none; transform:none}
  .thumb.adult.revealed{cursor:default}
  .thumb.adult.revealed::after{content:""; background:none}
  .gmeta{min-width:136px; flex:1}     /* title never collapses below readable width */
  .gtitle{font-weight:600; font-size:15px; color:var(--title); cursor:pointer; line-height:1.25;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .gtitle:hover{text-decoration:underline}
  .gsub{font-family:var(--mono); font-size:12px; color:var(--muted-2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .wish-dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--gold); margin-left:7px; vertical-align:middle}

  .num{font-family:var(--mono); text-align:right; white-space:nowrap}
  .center{text-align:center}
  .dot{width:9px; height:9px; border-radius:50%; flex:none}
  .rval{font-family:var(--mono); font-size:14px}

  /* stacked reviews: all-time over recent */
  .ratecell{display:flex; flex-direction:column; gap:3px}
  .rrow{display:flex; align-items:center; gap:6px}
  .rlbl{font-family:var(--mono); font-size:12px; color:var(--muted-2); width:26px; flex:none; text-transform:uppercase}
  .rrow .rval{font-size:13px}
  .rcount{font-family:var(--mono); font-size:12px; color:var(--muted-2)}
  .rrow.recent.stale .rval,.rrow.recent.muted .rval{color:var(--muted-2)}
  .rrow.recent.stale{opacity:.7}

  /* trend column */
  .trend{font-family:var(--mono); font-size:14px; font-weight:600; white-space:nowrap}
  .trend.up{color:var(--teal)} .trend.down{color:var(--coral)}
  .trend.flat{color:var(--muted-2); font-weight:400} .trend.none{color:var(--muted-2)}
  .trend.stale{opacity:.5; font-weight:400}

  /* Merged Price/Sale cell: struck full price on top, sale price below, discount badge
     to the right of the sale price (so the whole price-and-discount unit is one column). */
  .pricebox{display:flex; flex-direction:column; align-items:flex-start; gap:1px; line-height:1.2}
  .price-init{font-family:var(--mono); font-size:12px; color:var(--muted-2); text-decoration:line-through}
  .price-line{display:flex; align-items:center; gap:6px}
  .price-final{font-family:var(--mono); font-size:14px; font-weight:600}
  .disc{font-family:var(--mono); font-size:13px; color:#0e1320; background:var(--coral); padding:1px 5px; border-radius:5px; font-weight:700}
  /* Split "Price / Sale" header: two independently-clickable sort targets in one <th>. */
  thead th.th-split{gap:5px}
  .splitsort{font:inherit; color:inherit; letter-spacing:inherit; text-transform:inherit;
        background:none; border:0; padding:0; cursor:pointer; white-space:nowrap; position:relative}
  .splitsort:hover{color:var(--text)}
  .splitsep{color:var(--muted-2); user-select:none}
  .free{font-family:var(--mono); font-size:13px; color:var(--teal)}

  .countdown{font-family:var(--mono); font-size:13px; color:var(--coral)}
  .countdown.soon{font-weight:600}
  .countdown.ended{color:var(--muted-2); font-weight:400; font-style:italic}
  .nosale{color:var(--muted-2)}
  .rel{font-family:var(--mono); font-size:13px; color:var(--muted)}
  .age{font-family:var(--mono); font-size:12px; color:var(--muted-2); margin-top:2px}
  .updated{font-family:var(--mono); font-size:12px; color:var(--muted-2); margin-top:2px; white-space:nowrap}
  .updated.none{color:#c98a8a}
  .updcad{font-family:var(--mono); font-size:11px; color:var(--muted-2); margin-top:2px; white-space:nowrap; opacity:.85}
  .updcad.hot{color:var(--teal)}

  /* QTPD dual value: after-discount (left, primary) + full price (right). Active
     basis is highlighted (qsel), the inactive one dimmed (qdim). Positions fixed. */
  /* QTPD dual value: after-discount (left, primary) + full price (right). Coloring is
     driven entirely by qsel (active basis -> gold) and qdim (inactive -> muted), so the
     base color must stay neutral or it would override them. */
  .qsel{color:var(--gold) !important; font-weight:700}
  .qdim{color:var(--muted-2) !important}
  .qval.qdim{font-weight:600}
  /* Not-on-sale rows: the QTPD is computed on the full price (there's no discount), so it
     must read differently from an active sale deal — neutral text (not gold) plus a small
     "full" tag, so it isn't mistaken for a discounted value. */
  .qval.qfull{color:var(--muted); font-weight:600}
  .qtag{font-family:var(--mono); font-size:12px; color:var(--muted-2)}
  .qtag.full{color:#7f8db0; letter-spacing:.03em}

  /* hide-game [x] button: sits to the LEFT of the thumbnail (not overlaying it).
     Subtle by default, reddens on hover. Slim so it costs little horizontal space. */
  .hidebtn{flex:none; width:18px; height:38px; padding:0; border-radius:5px;
        border:1px solid #3a2530; background:#1a1014; color:#9a7480; font-size:15px;
        line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
        transition:background .12s, color .12s, border-color .12s}
  .hidebtn:hover{background:#7a2535; color:#fff; border-color:#a33}
  tr:hover .hidebtn{color:#c98a96}            /* row hover: nudge it more visible */
  tr:hover .hidebtn:hover{color:#fff}

  .unhide-link{font-family:var(--mono); font-size:inherit; color:var(--blue); background:none;
        border:none; padding:0; cursor:pointer}
  .unhide-link:hover{color:var(--gold); text-decoration:underline}

  /* all tags shown, wrap, fixed position, light up if selected */
  .tags{display:flex; gap:6px; flex-wrap:wrap}
  .tag{font-family:var(--mono); font-size:12px; color:var(--muted); background:#212c44; border:1px solid #2e3a58;
        padding:2px 8px; border-radius:6px; cursor:pointer; white-space:nowrap}
  .tag:hover{color:var(--text); border-color:var(--blue)}
  .tag.sel{background:var(--gold-soft); border-color:var(--gold-deep); color:var(--gold)}

  /* Stack fills the cell (block, not inline-block) so its centered content can't spill past
     the column and read as an overlap with the neighbour. Both lines are nowrap: the three
     HLTB figures stay on one row and "avg N h" stays on the next, never colliding even when
     the numbers are large (the wide free-game rows that used to overlap). */
  .hltb-stack{display:block; text-align:center}
  .hltb{display:flex; gap:10px; justify-content:center; white-space:nowrap}
  .hcol .v{font-family:var(--mono); font-size:15px}
  .hcol .l{font-family:var(--mono); font-size:12px; color:var(--muted-2); letter-spacing:.04em; text-transform:uppercase}
  .hcol.sel .v{color:var(--gold)} .hcol.sel .l{color:var(--gold)}
  /* estimated value (filled from the typical main/extras/completionist ratio, not from HLTB):
     distinct blue accent + a dotted underline as a second, color-independent cue.
     help-cursor signals the explanatory tooltip on hover. */
  .hcol.est{cursor:help}
  .hcol.est .v{color:var(--blue); border-bottom:1px dotted var(--blue); padding-bottom:1px}
  .hcol.est .l{color:var(--blue)}
  /* when an estimated column is ALSO the selected QTPD metric, gold wins for the
     number (emphasis), but keep the dotted underline so it still reads as estimated. */
  .hcol.est.sel .v{color:var(--gold); border-bottom-color:var(--gold)}
  .hcol.est.sel .l{color:var(--gold)}
  .havg{font-family:var(--mono); font-size:14px; color:var(--muted); text-align:center; margin-top:4px; white-space:nowrap}
  .havg b{color:var(--text); font-weight:700; font-size:15px}
  .havg.sel{color:var(--gold)} .havg.sel b{color:var(--gold)}

  /* Weighted (playtime-weighted rating) cell — one value next to Steam's %. */
  /* Weighted: dot + value on one line, delta badge beneath. Side-by-side needed ~104px and
     clipped the "%" whenever the column hit its floor; stacking fits the same information
     in the narrowest track the grid will ever hand this column. */
  .wrcell{display:flex; flex-direction:column; align-items:center; justify-content:center;
        gap:2px; cursor:help; line-height:1.15}
  .wrcell .wrtop{display:flex; align-items:center; gap:5px}
  .wrcell .dot{width:8px; height:8px; border-radius:50%; flex:none}

  .wrval.na{color:var(--muted-2); font-weight:400}
  .wrdelta{font-family:var(--mono); font-size:11px; padding:1px 4px; border-radius:4px; background:var(--panel-2, rgba(255,255,255,.05))}
  .wrdelta.pos{color:var(--teal)} .wrdelta.neg{color:var(--coral)}
  /* low-confidence weighted rating: grayed + dotted underline (color-independent cue) */
  .wrcell.lowconf .wrval{color:var(--muted-2); border-bottom:1px dotted var(--muted-2); padding-bottom:1px}

  /* Playtime cell — stacked recommend (▲) over not-recommend (▼) medians. */
  .ptcell{display:flex; flex-direction:column; gap:1px; align-items:flex-end; line-height:1.15}
  .ptrow{display:flex; align-items:baseline; gap:6px; cursor:help; white-space:nowrap; line-height:1.15}
  .ptrow .ptup{color:var(--teal); font-size:12px}
  .ptrow .ptdown{color:var(--coral); font-size:12px}
  .ptval{font-family:var(--mono); font-size:14px; color:var(--text); min-width:44px; text-align:right; line-height:1.15}
  .ptval.na{color:var(--muted-2)}
  .ptval .pth{font-size:11px; color:var(--muted-2); margin-left:1px}
  .ptn{font-family:var(--mono); font-size:11px; color:var(--muted-2); min-width:30px; text-align:right}
  /* Playtime header toggle (mirrors the HLTB metric buttons) */
  /* Playtime-sort toggle lives in the filter bar and is only a selector — it uses the
     neutral segmented-control styling like every other toggle (no red/green). */
  .ptup, .ptdown{font-weight:700}
  /* The column header echoes the SELECTED median (rec ▲ / not ▼) so you can see what
     clicking the header will sort by. Active side keeps its semantic color; other is dimmed. */
  th .ptup{color:var(--teal)} th .ptdown{color:var(--coral)}
  th .ptdim{color:var(--muted-2); opacity:.4}

  .qtop{display:flex; align-items:baseline; justify-content:flex-end; gap:8px}
  .qval{font-family:var(--mono); font-size:17px; font-weight:600; color:var(--text)}

  .qfill{position:absolute; left:0; top:0; bottom:0; border-radius:99px;
        background:linear-gradient(90deg,var(--gold-deep),var(--gold)); transition:width .3s ease}
  .qnull{font-family:var(--mono); font-size:13px; color:var(--muted-2); text-align:right}

  .empty{padding:54px 20px; text-align:center; color:var(--muted); font-size:15px}

  .foot{margin-top:18px; font-family:var(--mono); font-size:12px; color:var(--muted-2); line-height:1.9}

  /* ═════════════════════════════════════════════════════════════════════════════════════
     Lorenzo-list additions (ARCHITECTURE §3.4): accordion filter sections (L1), collapsed-bar
     filter summary (L2), view switcher + cool box-art grid (L3/L5), utility actions (L4).
     ═════════════════════════════════════════════════════════════════════════════════════ */

  /* L1 — accordion filter sections. The flat ~15-group filter wall is split into four
     independently collapsible sections (Value / Quality / Activity / Tags); each folds on
     its own so a user can e.g. collapse the big Tags rail and keep the main switches visible.
     Open/closed state persists in localStorage (qtpd.sections). */
  .filter-section{border-top:1px solid var(--line)}
  /* Open sections lay the header (title+caret+count) on the LEFT and the controls
     BESIDE it on the same row, reclaiming the empty gutter that used to sit next to
     the title. The header folds the section, and so does any DEAD space in the body —
     the wide empty strips beside the controls are the biggest fold targets on the row. */
  .filter-section.open{display:flex; align-items:flex-start; gap:18px}
  .filter-section.open > .section-head{cursor:pointer}
  .filter-section.open > .section-body{flex:1 1 auto; min-width:0; cursor:pointer}
  /* Fold-safe islands: every real control (and the inert labels sitting in the row) opts
     OUT of folding — see FOLD_SAFE in the .filter-section click handler, which this list
     mirrors. The padding grows each island's hit box by 6px and the equal negative margin
     cancels the layout shift, so the 12px .ctl-row gutters between controls are fully
     safe and only genuinely empty space folds. Guards against near-miss clicks. */
  .filter-section.open > .section-body .field,
  .filter-section.open > .section-body .taglegend,
  .filter-section.open > .section-body .tagsearch,
  .filter-section.open > .section-body .tagmode,
  .filter-section.open > .section-body .grouplabel{cursor:auto; padding:6px; margin:-6px}
  /* ...but the match-mode control is right-aligned, and the `margin:-6px` shorthand above
     silently overrode the `margin-left:auto` on .tagmode (specificity 0,4,0 vs 0,1,0) —
     which is why it used to sit mid-row instead of at the far right. Restore just the left
     margin here, after the shorthand, keeping the fold-safe negative margins on the other
     three sides. */
  .filter-section.open > .section-body .tagmode{margin-left:auto}
  /* The tag rail packs chips 7px apart, where padding+negative margins would make
     neighbouring hit boxes overlap. A ::after ring extends each chip's hit box by 4px
     (>7px gap once both sides count) with zero layout effect — the click still targets
     the chip itself, since a pseudo-element is never its own event target. */
  .filter-section.open > .section-body .chip,
  .filter-section.open > .section-body .tagmore{position:relative}
  .filter-section.open > .section-body .chip::after,
  .filter-section.open > .section-body .tagmore::after{content:""; position:absolute; inset:-4px}
  /* The rail sets its own cursor:default, which (as a specified value) would beat the
     inherited pointer and leave its dead space folding without looking foldable. */
  .filter-section.open > .section-body .tagrail-wrap{cursor:pointer}
  .filter-section.open > .section-head{flex:0 0 132px; align-self:stretch; padding-top:16px;
        flex-wrap:wrap; align-content:flex-start; row-gap:4px}
  .filter-section.open > .section-head .sec-count{margin-left:19px; flex-basis:100%}
  .filter-section.open > .section-body{flex:1 1 auto; min-width:0}
  .section-head{display:flex; align-items:center; gap:9px; width:100%; background:none; border:0;
        color:var(--muted); font-family:var(--mono); font-size:12px; letter-spacing:.06em;
        text-transform:uppercase; padding:11px 2px; cursor:pointer; text-align:left}
  .section-head:hover{color:var(--text)}
  .section-head:focus-visible{outline:2px solid var(--blue); outline-offset:-2px; border-radius:6px}
  .section-head .sec-caret{color:var(--muted-2); font-size:11px; transition:transform .15s ease; flex:none}
  .filter-section.open .section-head .sec-caret{transform:rotate(90deg)}
  .filter-section.open .section-head{color:var(--text)}
  .section-head .sec-count{margin-left:auto; color:var(--gold); font-size:11px; letter-spacing:.03em; opacity:.9}
  .section-body{padding:2px 0 14px}
  .filter-section.open > .section-body{padding-top:14px}
  .filter-section:not(.open) .section-body{display:none}
  /* Narrow viewports: stack header above controls again (side-by-side needs width). */
  @media (max-width:720px){
    .filter-section.open{display:block}
    .filter-section.open > .section-head{padding-top:11px}
  }

  /* Collapsed Tags header: show the currently-picked tags in the otherwise-empty middle band so
     they can be re-cycled without expanding. It overlays the header button; the container is
     pointer-events:none (so clicking the empty area still opens the section) while the chips are
     pointer-events:auto (clicking one cycles it via the normal [data-tag] handler). Hidden when
     the section is open (the full rail shows them) or when empty. */
  .section-head-wrap{position:relative}
  .tag-mini{position:absolute; inset:0; padding:0 96px 0 104px; display:flex; align-items:center; gap:6px;
        flex-wrap:nowrap; overflow:hidden; pointer-events:none}
  .filter-section.open .tag-mini,.tag-mini:empty{display:none}
  .tag-mini .chip{pointer-events:auto; flex:none; font-size:12px; padding:3px 9px}
  .tag-mini .chip .mk{margin-right:4px}

  /* Top-bar tools cluster: view switcher (right of the bar) + utility actions. */
  .bar-tools{display:flex; align-items:center; gap:10px; flex:none; flex-wrap:wrap}
  .seg.viewseg button[aria-pressed="true"]{background:var(--panel-2); color:var(--gold)}
  /* device-inappropriate detailed view (Table on mobile / Card on desktop): dimmed + a hint
     toast on click, so users see the view is supported but screen-specific. */
  .seg.viewseg button.disabled{opacity:.38; cursor:help}
  .seg.viewseg button.disabled[aria-pressed="true"]{background:transparent; color:var(--muted)}
  .util-btn{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:13px; padding:8px 11px; border-radius:8px; cursor:pointer;
        display:inline-flex; align-items:center; gap:6px; white-space:nowrap}
  .util-btn:hover{color:var(--text); border-color:var(--muted-2)}
  .util-btn:focus-visible{outline:2px solid var(--blue); outline-offset:2px}

  /* L2 — collapsed-bar filter summary. Rendered ONLY when the nav bar is fully collapsed:
     a one-line summary of the currently-picked filters where each highlighted term is
     clickable → opens a small popover to change just that filter (no full-bar expand). */
  .filter-summary{display:none}
  .topbar.compact .filter-summary{display:block; padding:11px 16px; border-top:1px solid var(--line);
        font-family:var(--mono); font-size:13px; color:var(--muted); line-height:2}
  .filter-summary .sumlbl{color:var(--muted-2)}
  .filter-summary .sumf{appearance:none; background:var(--gold-soft); border:1px solid var(--gold-deep);
        color:var(--gold); font-family:var(--mono); font-size:13px; padding:2px 8px; border-radius:7px;
        cursor:pointer; margin:0 1px}
  .filter-summary .sumf:hover{filter:brightness(1.15)}
  .filter-summary .sumf.plain{background:var(--panel); border-color:var(--line); color:var(--muted)}
  /* #8 — warning-styled Reset, floated to the line's top-right corner. */
  .filter-summary .sumreset{float:right; margin-left:10px; appearance:none; background:#3a2026;
        border:1px solid var(--coral); color:var(--coral); font-family:var(--mono); font-size:12px; font-weight:600;
        letter-spacing:.04em; text-transform:uppercase; padding:3px 12px; border-radius:7px; cursor:pointer}
  .filter-summary .sumreset:hover{background:var(--coral); color:#160c10}
  .filter-summary .sumreset:focus-visible{outline:2px solid var(--coral); outline-offset:2px}

  /* Popover host — shared by the L2 summary editors and the L4 CSV column-picker. */
  .pop-host{position:fixed; inset:0; z-index:150; display:none}
  .pop-host.on{display:block}
  .pop-backdrop{position:absolute; inset:0; background:transparent}
  .popover{position:absolute; background:var(--panel-2); border:1px solid var(--line); border-radius:11px;
        box-shadow:0 16px 44px #000b; padding:12px; min-width:200px; max-width:340px}
  .popover h4{margin:0 0 9px; font-family:var(--mono); font-size:11px; letter-spacing:.06em;
        text-transform:uppercase; color:var(--muted-2); font-weight:500}
  .pop-opts{display:flex; flex-wrap:wrap; gap:6px}
  .pop-opt{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted);
        font-family:var(--mono); font-size:13px; padding:7px 11px; border-radius:8px; cursor:pointer}
  .pop-opt:hover{color:var(--text); border-color:var(--muted-2)}
  .pop-opt.on{background:var(--gold-soft); border-color:var(--gold-deep); color:var(--gold)}
  .pop-actions{display:flex; gap:8px; margin-top:11px}
  .pop-go{flex:1; background:var(--gold-soft); border:1px solid var(--gold-deep); color:var(--gold);
        font-family:var(--mono); font-size:13px; padding:8px; border-radius:8px; cursor:pointer}
  .pop-go:hover{filter:brightness(1.12)}
  .pop-checks{display:flex; flex-direction:column; gap:2px; max-height:280px; overflow:auto}
  label.pop-check{display:flex; align-items:center; gap:9px; padding:5px 3px; cursor:pointer;
        color:var(--muted); font-family:var(--mono); font-size:13px}
  label.pop-check:hover{color:var(--text)}
  label.pop-check input{accent-color:var(--gold); width:15px; height:15px}

  /* L3 / L5 — cool grid (box-art) view. Box art on top at its true 460:215 ratio, then a solid
     dark info panel; coloured borders flag on-sale / high-value. Tap a card to expand details. */
  .gridview{display:none; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:14px; padding:14px}
  body.grid-view .tablescroll{display:none}
  body.grid-view .gridview{display:grid}
  /* The art frame is sized by aspect-ratio to EXACTLY the Steam header ratio (460:215), so
     object-fit:cover fills it with zero crop and zero letterbox matte. Below it sits a solid,
     darker info panel: a stats line (QTPD left · best-available rating right) over the title.
     Card height = art + panel — no fixed height, but every card in a row shares the column width
     so the row stays even. Tapping flips to a details overlay (price / length / Steam link). */
  .gcard{position:relative; border-radius:10px; overflow:hidden; border:1px solid var(--line);
        background:#0b0f18; cursor:pointer; display:flex; flex-direction:column}
  .gcard:hover{border-color:var(--muted-2)}
  .gcard.sale{border-color:var(--gold-deep)}
  .gcard.hi{box-shadow:0 0 0 1px var(--gold-deep)}
  .gart{position:relative; flex:none; width:100%; aspect-ratio:460/215; overflow:hidden; background:#0b0f18}
  .gcard .gcap{width:100%; height:100%; object-fit:cover; display:block}
  .gcard.adult .gcap{filter:blur(11px); transform:scale(1.06); transition:filter .18s ease}
  .gcard.adult .gart::after{position:absolute; inset:0; z-index:3;
        display:flex; align-items:center; justify-content:center;
        font:700 18px/1 system-ui,sans-serif; letter-spacing:.5px; color:#fff;
        text-shadow:0 1px 4px #000c; pointer-events:none;
        background:radial-gradient(circle at center, #0007, #0003)}
  .gcard.adult:not(.revealed) .gart::after{content:"18+"}
  .gcard.adult.confirm .gart::after{content:"18+?"; background:radial-gradient(circle at center, #000b, #0007)}
  .gcard.adult.revealed .gcap{filter:none; transform:none}
  .gcard.adult.revealed .gart::after{content:""; background:none}
  .gdisc{position:absolute; top:7px; right:7px; background:var(--coral); color:#0e1320;
        font-family:var(--mono); font-size:12px; font-weight:700; padding:2px 6px; border-radius:6px}
  /* Info panel — deliberately darker than --panel so the title reads clean off the art.
     Scoped to .gcard: bare .gmeta is also the table's title cell (see ~L293), and the dark
     background was bleeding behind table titles as a black block. */
  .gcard .gmeta{flex:none; background:#080b12; border-top:1px solid var(--line); padding:7px 10px 8px;
        display:flex; flex-direction:column; gap:3px}
  .gmeta-top{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
  .gq{font-family:var(--mono); font-size:13px; font-weight:600; color:var(--gold); white-space:nowrap}
  .gq.na{color:var(--muted-2); font-weight:400}
  .grate{font-family:var(--mono); font-size:13px; font-weight:600; white-space:nowrap}
  .grate.na{color:var(--muted-2); font-weight:400}
  .gname{flex:1; min-width:0; font-family:var(--sans); font-weight:600; font-size:13.5px; color:#fff; line-height:1.25;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .gmeta-top .grate{flex:none}   /* rating stays put on the right as the title truncates */
  /* Details overlay — covers the whole card; overflow-y:auto keeps actions reachable on short cards. */
  .ginfo{position:absolute; inset:0; background:#0e1320f2; display:none; flex-direction:column; padding:11px;
        gap:5px; font-family:var(--mono); overflow-y:auto}
  .gcard.open{cursor:default}
  .gcard.open .gart,.gcard.open .gmeta{display:none}
  .gcard.open .ginfo{display:flex}
  .gi-title{font-family:var(--sans); font-weight:600; font-size:13.5px; color:var(--title); line-height:1.2;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .gi-row{display:flex; justify-content:space-between; font-size:12.5px; color:var(--muted)}
  .gi-row b{color:var(--text); font-weight:600}
  .gi-row .gi-q{color:var(--gold); font-weight:700}
  .gi-actions{margin-top:auto; display:flex; gap:7px; padding-top:2px}
  .gi-actions a,.gi-actions button{flex:1; text-align:center; font-family:var(--mono); font-size:12px;
        padding:8px 6px; border-radius:7px; border:1px solid var(--line); cursor:pointer; background:var(--panel);
        color:var(--text); text-decoration:none}
  .gi-steam{background:var(--gold-soft) !important; border-color:var(--gold-deep) !important; color:var(--gold) !important}
  .gi-actions a:hover,.gi-actions button:hover{border-color:var(--muted-2)}

  /* Grid-only sort control (desktop grid): the sort fields are laid out as a single row of
     buttons — one click to switch, no dropdown to open — with overflow collapsing into "More ▾".
     JS (layoutGridSort) decides the split per screen width so the row never wraps. */
  .gridsort{display:none; align-items:center; gap:8px; padding:14px 14px 0}
  body.grid-view:not(.narrow) .gridsort{display:flex}
  .gsort-btns{display:flex; flex-wrap:nowrap; gap:6px; min-width:0; overflow:hidden}
  /* A sort field: neutral panel chip; the active one lights gold (app's "this is the live pick"). */
  .gsort-b{appearance:none; white-space:nowrap; background:var(--panel); border:1px solid var(--line);
        color:var(--muted); font-family:var(--mono); font-size:13px; line-height:1;
        padding:8px 11px; border-radius:8px; cursor:pointer}
  .gsort-b:hover{border-color:var(--gold-deep); color:var(--text)}
  .gsort-b:focus-visible{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33; outline:none}
  .gsort-b.on{border-color:var(--gold-deep); color:var(--gold); background:var(--gold-soft)}
  /* Overflow "More ▾" button + its drop menu; the menu re-parents the leftover .gsort-b buttons. */
  .gsort-more{position:relative; flex:none}
  .gsort-morebtn.sel{border-color:var(--gold-deep); color:var(--gold); background:var(--gold-soft)}
  .gsort-menu{position:absolute; top:calc(100% + 6px); left:0; z-index:60; display:none;
        min-width:170px; flex-direction:column; gap:2px; padding:6px;
        background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
        box-shadow:0 12px 30px #0009}
  .gsort-more.open .gsort-menu{display:flex}
  .gsort-more.open .gsort-morebtn{border-color:var(--blue)}
  /* Buttons moved into the menu stack full-width as list rows. */
  .gsort-menu .gsort-b{width:100%; text-align:left; border-color:transparent; background:transparent}
  .gsort-menu .gsort-b:hover{background:var(--panel); border-color:var(--line)}
  .gsort-menu .gsort-b.on{background:var(--gold-soft); border-color:var(--gold-deep)}
  .gridsort #gsortdir{appearance:none; flex:none; background:var(--panel); border:1px solid var(--line); color:var(--gold);
        font-family:var(--mono); font-size:14px; line-height:1; padding:8px 11px; border-radius:8px; cursor:pointer}
  .gridsort #gsortdir:hover{border-color:var(--gold-deep)}

  /* Tag match-mode toggle (ALL / ANY for required tags) — sits on ONE line with the click-cycle
     legend, above the tag rail. The legend's base rule sets flex-basis:100% (from when it was a
     standalone row); override it here so the legend sizes to content and the toggle sits beside it
     (pushed right by margin-left:auto), instead of wrapping to a second, mostly-empty row. */
  .tagmode-bar{display:flex; align-items:center; gap:10px 20px; flex-wrap:wrap; flex-basis:100%; margin-bottom:4px}
  .tagmode-bar .taglegend{flex-basis:auto; margin-bottom:0}
  .tagmode{display:flex; align-items:center; gap:9px; margin-left:auto}
  .tagmode-lbl{font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.05em; text-transform:uppercase}
  /* Tag search — narrows WHICH TAGS ARE OFFERED in the rail, not which games are listed.
     Sits in the space the match-mode control vacated when it moved right.
     Same input language as the header game-search and the wishlist box: var(--panel) fill,
     1px var(--line) border, 9px radius, and the SAME magnifier SVG as the header (.search).
     Mono 13px matches the wishlist input and the surrounding filter controls.
     Vertical padding is deliberately tighter than those two so the control lands at the tag
     row's EXISTING height — the row is 34px (set by the match-mode control) and must not grow. */
  .tagsearch{position:relative; display:flex; align-items:center; flex:0 1 250px; min-width:150px}
  .tagsearch input{width:100%; appearance:none; background:var(--panel); border:1px solid var(--line);
        border-radius:9px; color:var(--text); font-family:var(--mono); font-size:13px;
        padding:8px 26px 8px 32px; outline:none}
  .tagsearch input::placeholder{color:var(--muted-2)}
  .tagsearch input:focus-visible{border-color:var(--blue); box-shadow:0 0 0 3px #6f9bff33}
  .tagsearch svg{position:absolute; left:11px; top:50%; transform:translateY(-50%);
        color:var(--muted-2); pointer-events:none}
  /* Clear (✕) appears only once there's something to clear, so the empty state stays quiet.
     Red (coral) like the Reset button and the header/wishlist clears — a shared "this removes
     what you typed" cue. Not gold: gold means "a filter changed from default", and this control
     only clears the field, it doesn't filter the results (§11). */
  .tagsearch .ts-x{position:absolute; right:6px; display:none; appearance:none; background:transparent;
        border:0; padding:3px; cursor:pointer; color:var(--coral); font-size:11px; line-height:1}
  .tagsearch .ts-x:hover{color:#ffb0b0}
  .tagsearch.has-q .ts-x{display:block}
  .tagempty{font-family:var(--mono); font-size:12px; color:var(--muted-2); padding:6px 2px}
  .tagmode .seg button{padding:8px 16px; font-weight:600}
  .tagmode .seg button[aria-pressed="true"]{background:var(--gold-soft); color:var(--gold)}

  /* L4 — random-pick highlight flash (works on both a table row and a grid card) */
  @keyframes qflash{0%{background:var(--gold-soft)} 100%{background:transparent}}
  tbody tr.flash{animation:qflash 2.2s ease}
  .gcard.flash{border-color:var(--gold); box-shadow:0 0 0 2px var(--gold)}

  /* ── Narrow screens: table → compact spec-sheet card ──────────────────────────────────
     Redesign (2026 responsive-table best practice). Below the table's real floor the 12
     columns can't be compared row-to-row on a phone, so each row becomes a self-contained
     card. Two earlier passes (12 stacked label:value rows, then a 2-column grid) both read as
     "spread out": the grid left ragged heights and the label-above-value form doubled the line
     count. This version is a single-column SPEC SHEET — one metric per line, a fixed muted
     label gutter on the left and its value flush beside it, so labels and values form two clean
     aligned columns the eye scans straight down. Fields run in a logical top-to-bottom order:
     name → QTPD verdict → price → ratings (score/weighted/trend) → length (HLTB/playtime) →
     release → updates → tags, with `order` decoupling this from the table's column order.
     Long/technical column names are relabeled to plain words (Reviews→Rating, HLTB→Length,
     Price / Sale→Price). Cells whose value is just "no data" (no active sale, no weighted
     rating, no trend) are dropped via :has() so the card carries no dead "—" lines. Sorting —
     which on desktop lives only in the now-hidden <thead> — is exposed through the .mobile-sort
     control in the bar (see #mobileSort). */
  /* Layout is now driven by a body class (`layout-card`), set by JS when EITHER the viewport
     is below the table's real floor OR the user explicitly picks the "Card" view from the
     switcher (L3). Single source of truth — the rules below were previously an
     `@media (max-width:1374px)` block; a tiny inline script + a matchMedia listener toggle the
     class so mobile still gets the card layout with no flash. The genuinely-small-screen tweaks
     stay in a real `@media (max-width:560px)` below (they only ever matter on real phones, which
     always have layout-card active). Grid view (`body.grid-view`) hides the table entirely. */
  body.layout-card table{min-width:0; max-width:none; margin:0}
  body.layout-card colgroup{display:none}
  body.layout-card thead{display:none}
  body.layout-card table,body.layout-card tbody{display:block; width:100%}
  body.layout-card thead tr{display:none}
  /* Mobile no longer shows a dedicated top-bar Sort control — sorting lives on the collapsed
     summary line's "sorted by …" chip (which opens the sort popover). Desktop table sorts via its
     headers; desktop grid uses its own #gridSort bar. So #mobileSort stays hidden everywhere. */

  /* row → card: single-column stack, no zebra/hover fills */
  body.layout-card tbody tr{display:flex; flex-direction:column; padding:14px 15px 15px; border-bottom:1px solid var(--line)}
  body.layout-card tbody tr:nth-child(even){background:transparent}
  body.layout-card tbody tr:hover{background:transparent}

  /* metric cell: [ LABEL gutter ][ value ] on one baseline row; multi-part values (release
     date+age, updated recency+cadence) sit inline and wrap under the value column if needed. */
  body.layout-card tbody td,body.layout-card tbody td.num,body.layout-card tbody td.center{padding:4px 0; border:0; display:flex; flex-flow:row wrap;
      align-items:baseline; justify-content:flex-start; gap:2px 9px; min-width:0; min-height:0; overflow:hidden}
  body.layout-card td.pad{padding:4px 0}
  body.layout-card tbody td::before{content:attr(data-label); font-family:var(--mono); font-size:10px; letter-spacing:.03em;
      text-transform:uppercase; color:var(--muted-2); flex:none; width:72px; line-height:1.5}
  body.layout-card tbody td:empty{display:none}
  /* plain-language relabels for the mobile card */
  body.layout-card td[data-label="Reviews"]::before{content:"Rating"}
  body.layout-card td[data-label="HLTB M/E/100%"]::before{content:"Length"}
  body.layout-card td[data-label="Price / Sale"]::before{content:"Price"}
  /* drop cells whose only value is "no data" so no dead "—" lines clutter the card */
  body.layout-card td[data-label="Sale ends"]:has(.nosale){display:none}
  body.layout-card td[data-label="Weighted"]:has(.wrval.na){display:none}
  body.layout-card td[data-label="Trend"]:has(.trend.none){display:none}
  /* every value block left-aligned (override the desktop right/center rules) */
  body.layout-card .num,body.layout-card .qtop,body.layout-card .hltb,body.layout-card .hltb-stack,body.layout-card .havg,body.layout-card .center,body.layout-card .ratecell,body.layout-card .pricebox,body.layout-card .ptcell{justify-content:flex-start;
      align-items:flex-start; text-align:left}
  body.layout-card .center{justify-content:flex-start !important}
  body.layout-card .ratecell,body.layout-card .ptcell,body.layout-card .hltb-stack,body.layout-card .pricebox{flex:1 1 auto}
  body.layout-card .age,body.layout-card .updated,body.layout-card .updcad{text-align:left}
  body.layout-card .grouplabel{width:auto; text-align:left}

  /* logical field order: verdict → price → ratings → length → dates → tags */
  body.layout-card td[data-label="Game"]{order:1}
  body.layout-card td[data-label="QTPD"]{order:2}
  body.layout-card td[data-label="Price / Sale"]{order:3}
  body.layout-card td[data-label="Sale ends"]{order:4}
  body.layout-card td[data-label="Reviews"]{order:5}
  body.layout-card td[data-label="Weighted"]{order:6}
  body.layout-card td[data-label="Trend"]{order:7}
  body.layout-card td[data-label="HLTB M/E/100%"]{order:8}
  body.layout-card td[data-label="Playtime"]{order:9}
  body.layout-card td[data-label="Released"]{order:10}
  body.layout-card td[data-label="Updated"]{order:11}
  body.layout-card td[data-label="Tags"]{order:12}

  /* Game: full-width headline (thumb + title), no redundant "GAME" label */
  body.layout-card td[data-label="Game"]{order:1; padding-bottom:9px}
  body.layout-card td[data-label="Game"]::before{display:none}
  body.layout-card .gamecell{width:100%}
  body.layout-card .gtitle{-webkit-line-clamp:2; font-size:16px}
  body.layout-card .thumb{width:120px; height:46px}

  /* QTPD: headline card row — big number + full-width bar; the app's whole point. Selector is
     `tbody td.tdqtpd` (not the data-label form) so it out-specifies the grouped
     `tbody td.num{...}` rule — the QTPD cell carries the .num class. */
  body.layout-card tbody td.tdqtpd{flex-flow:row nowrap; align-items:center; gap:10px; margin:3px 0 9px;
      padding:9px 12px; background:var(--panel); border:1px solid var(--line); border-radius:10px}
  body.layout-card tbody td.tdqtpd::before{color:var(--gold); align-self:center; width:auto; font-size:11px}
  body.layout-card td.tdqtpd .qtop{flex:none}
  body.layout-card td.tdqtpd .qval{font-size:20px}
  body.layout-card .qbar{flex:1; max-width:none; margin-top:0; min-width:56px}

  /* Tags: full-width, label on its own line above the wrapping chips */
  body.layout-card td[data-label="Tags"]{flex-direction:column; align-items:stretch; padding-top:9px}
  body.layout-card td[data-label="Tags"]::before{width:auto}
  body.layout-card td[data-label="Tags"] .tags{justify-content:flex-start; margin-top:5px}

  /* filter controls that carried fixed pixel widths: let them fill the row on narrow screens */
  body.layout-card .rangefield{min-width:0; flex-basis:100%; max-width:none}
  body.layout-card .wishbox{flex:1 1 240px}
  body.layout-card .wishbox input{width:auto; flex:1; min-width:0}
  /* price min/max steppers: desktop's 22×17px arrows are too small to tap on a phone —
     give them a roomier target (and a little gap) without changing the desktop look. */
  body.layout-card .steppers{gap:3px}
  body.layout-card .steppers button{width:30px; height:23px; font-size:13px}

  /* ── Mobile-polish (2026-07): readability groups, leaner bar, demoted wishlist ──────────── */
  /* #2: per-page is meaningless on an infinite-scroll phone list — hide it for a leaner bar. */
  body.layout-card #pagesize,body.grid-view.narrow #pagesize{display:none}   /* #3: also hide on mobile grid; infinite scroll loads 100/page by default */
  /* #1: group separator lines chunk the tall card into scannable blocks —
     price · ratings · length/playtime · dates · tags — so ratings read apart from length. */
  body.layout-card tbody td{padding:5px 0}
  /* Selectors carry the cells' own .num/.center class so they out-specify the base
     `body.layout-card tbody td.num{border:0}` reset (which would otherwise cancel the divider). */
  body.layout-card tbody td[data-label="Reviews"],
  body.layout-card tbody td[data-label="HLTB M/E/100%"].num,
  body.layout-card tbody td[data-label="Released"].center{
      border-top:1px solid var(--line); margin-top:8px; padding-top:11px}
  body.layout-card tbody td[data-label="Tags"]{border-top:1px solid var(--line); margin-top:8px; padding-top:12px}
  /* #5: on mobile the filter panel leads with the quick filter sections; the wishlist import
     (rarely the first thing wanted) sinks to the bottom, still available when the nav is open. */
  body.layout-card .bar-filters{display:flex; flex-direction:column}   /* class, not #id, so .topbar.compact's display:none still wins */
  body.layout-card .bar-filters > .ctl-row{order:20; border-top:1px solid var(--line); margin-top:8px; padding-top:12px}

  /* ── Mobile top-bar: fit + sticky (all narrow screens) ────────────────────────────────────
     #1 leaner bar so nothing runs off the right edge; #5 the compact nav sticks to the top while
     browsing (always one tap from reopening filters), and when the filter panel is OPEN the
     "Hide filters" bar sticks to the bottom of the viewport so the close control is never
     scrolled off-screen — it releases and scrolls up once you reach the panel's end. The sticky
     bottom needs a non-clipping ancestor, so barwrap drops overflow:hidden on mobile (its rounded
     corners are re-applied to the first/last child instead). */
  body.narrow .bar-main{gap:9px 12px; padding:10px 12px}
  body.narrow .barwrap{overflow:visible}
  body.narrow .bar-main{border-radius:14px 14px 0 0}
  body.narrow .collapse-handle{border-radius:0 0 14px 14px}
  body.narrow .topbar.compact{position:sticky; top:0}
  body.narrow .topbar.compact .meta{display:none}   /* count/updated dupes the summary line — drop it to slim the sticky browsing nav */
  body.narrow .topbar:not(.compact) .collapse-handle{position:sticky; bottom:0; z-index:41; box-shadow:0 -7px 18px #0008}
  /* Once scrolled, the sticky compact nav shrinks to just the filter-summary + the Show-filters
     bar — the logo/search/view/tools row (bar-main) hides until you scroll back to the top or open
     the filters. Keyed on body.narrow so Card and Grid behave identically. */
  body.narrow.nav-scrolled .topbar.compact .bar-main{display:none}

  /* ── Phones (~≤560px): tighter spacing and type (only reached when layout-card is active) ── */
  @media (max-width:560px){
    body.layout-card .tablecard{border-radius:10px; margin-top:8px}
    body.layout-card tbody tr{padding:13px 12px 13px}
    body.layout-card .thumb{width:104px; height:40px}
    body.layout-card .gamecell{gap:8px}
    body.layout-card .gtitle{font-size:15px}
    body.layout-card td.tdqtpd .qval{font-size:19px}
    body.layout-card tbody td::before{width:66px}
    body.layout-card .hltb{gap:10px}
    .gridview{grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:10px; padding:10px}
  }
  @media (prefers-reduced-motion:reduce){ .qfill{transition:none} .section-head .sec-caret{transition:none} }
</style>

<script>
/* Set the layout class before first paint so mobile gets the card layout with no flash and a
   saved Grid/Card view applies immediately. The main script re-derives this on load + resize. */
try{
  var _narrow = matchMedia("(max-width:1374px)").matches;
  var _view = localStorage.getItem("qtpd.view");
  // Detailed view is a table on desktop, cards on mobile — so layout-card is purely
  // viewport-driven (the Table/Card buttons just relabel the same detailed view per device).
  if(_narrow) document.body.classList.add("narrow");
  if(localStorage.getItem("qtpd.tagsCollapsed") === "1") document.body.classList.add("tags-collapsed");
  if(_view === "grid") document.body.classList.add("grid-view");
  else if(_narrow) document.body.classList.add("layout-card");
}catch(e){}
</script>

        <div class="field" title="Early Access — still in development, sold before its 1.0 release. Uses Valve's official flag, not the user 'Early Access' tag (which often lingers for years after launch).">
