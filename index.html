}
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// In "real" data-quality mode, an estimated value is treated as absent. A per-metric
// value is real when its field isn't in hltb_est; avg is real only when NOTHING is
// estimated (empty hltb_est), since avg is computed over the whole triple.
function realHours(g, metric){
  const est = g.hltb_est || [];
  if(metric === "avg") return est.length === 0 ? g.hltb_avg : null;
  const v = metric==="main" ? g.hltb_main : metric==="extra" ? g.hltb_extra : g.hltb_complete;
  return est.indexOf(metric) === -1 ? v : null;
}
function hoursFor(g){
  const m = state.hltbMetric;
  if(state.hltbQuality === "real") return realHours(g, m);   // estimates not used -> no value
  return m==="main" ? g.hltb_main : m==="extra" ? g.hltb_extra : m==="complete" ? g.hltb_complete : g.hltb_avg;
}
function priceFor(g, basis){ if(g.is_free) return null; return basis==="after" ? g.price_final : g.price_initial; }
function computeQ(g, basis){
  const h = hoursFor(g), r = g.rating_pct, p = priceFor(g, basis);
  return (h && r && p && p > 0) ? (h * (r/100)) / p : null;
}
const activeQ = g => computeQ(g, state.qBasis);
const altQ    = g => computeQ(g, state.qBasis === "after" ? "before" : "after");

// Free-value score: QTPD's numerator with no price division (quality-weighted hours).
// Free games have no price, so a $-based QTPD is undefined; this ranks them among
// themselves by playtime × rating instead.
function freeScore(g){
  const h = hoursFor(g), r = g.rating_pct;
  return (h && r) ? h * (r/100) : null;
}
// True only when the price-class filter is narrowed to Free alone — the one state
// where free games are the whole list and the QTPD column switches to freeScore.
function freeMode(){ return state.priceClass.size === 1 && state.priceClass.has("free"); }
// The value used for the QTPD column (sort + bar + range): freeScore in free-only mode,
// otherwise the normal price-based QTPD.
const colValue = g => freeMode() ? freeScore(g) : activeQ(g);

function ratingColor(p){
  if(p == null) return "var(--muted-2)";
  if(p >= 85) return "var(--teal)";
  if(p >= 70) return "var(--gold)";
  if(p >= 40) return "#e89a52";
  return "var(--coral)";
}
function fmtCountdown(end){
  if(!end) return null;
  let s = end - NOW();
  if(s <= 0) return {text:"ended", soon:true};
  const d = Math.floor(s/86400); s -= d*86400;
  const h = Math.floor(s/3600);  s -= h*3600;
  const m = Math.floor(s/60);    const sec = s - m*60;
  const pad = n => String(n).padStart(2,"0");
  const text = d > 0 ? `${d}d ${pad(h)}h ${pad(m)}m` : `${pad(h)}h ${pad(m)}m ${pad(sec)}s`;
  return {text, soon: d < 1};
}
function fmtRelease(g){
  if(g.release_ts){ const d = new Date(g.release_ts*1000); return `${MONTHS[d.getUTCMonth()]} ${d.getUTCFullYear()}`; }
  return g.release_date || "—";
}
// Hover text for the Released column. The cell shows "Mon YYYY" (fmtRelease) to fit the
// column floor, so the exact day is only reachable here. Format is YYYY-MON-DD — unambiguous
// and locale-proof, unlike the American M/D/Y in Steam's own release_date string.
// Unreleased games have no release_ts (~450 of them); fall back to whatever vague string
// Steam gave us ("Q3 2026", "July 2026"), then to a plain statement if even that is missing.
function releaseTip(g){
  if(g.release_ts){
    const d = new Date(g.release_ts*1000);
    const day = String(d.getUTCDate()).padStart(2,"0");
    const exact = `${d.getUTCFullYear()}-${MONTHS[d.getUTCMonth()].toUpperCase()}-${day}`;
    const age = ageStr(g.release_ts);
    return age ? `${exact} (${age})` : exact;
  }
  return g.release_date || "Release date not confirmed";
}
// Trim a trailing ".0" so exact values read as whole units ("2 weeks old", not "2.0 weeks old")
// while partial ones keep their decimal. Guards against "2.0" surviving toFixed(1).
const dec1 = n => n.toFixed(1).replace(/\.0$/, "");
// Calendar-accurate month age. Counts whole calendar months elapsed, then expresses the
// leftover days as a fraction of the *containing* month — so the fraction is measured against
// the real 28/29/30/31-day month rather than a flat 30, and "1.5 mo" genuinely means halfway
// through the second month. Deliberately diverges from updatedStr's flat d/30, which only
// needs coarse whole units.
function monthsBetween(from, to){
  let mo = (to.getUTCFullYear() - from.getUTCFullYear())*12 + (to.getUTCMonth() - from.getUTCMonth());
  const anchor = new Date(Date.UTC(from.getUTCFullYear(), from.getUTCMonth() + mo, from.getUTCDate()));
  if(anchor > to){ mo -= 1; anchor.setUTCMonth(anchor.getUTCMonth() - 1); }
  // length of the month this partial remainder falls inside
  const next = new Date(Date.UTC(anchor.getUTCFullYear(), anchor.getUTCMonth() + 1, anchor.getUTCDate()));
  const frac = (to - anchor) / (next - anchor);
  return mo + frac;
}
// Age line under the Released date. Mirrors updatedStr's stepped resolution: exact days
// while that's meaningful, then coarser units as precision stops mattering. Ladder is
// today → Nd (to 14) → N.Nwk (to 30) → N.Nmo (to 1yr) → N.Nyrs. Future-dated (unreleased)
// games return "" so no age line renders — the tooltip carries their date instead.
function ageStr(ts){
  if(!ts) return "";
  const s = NOW() - ts;
  if(s < 0) return "";
  if(s < 86400) return "today";
  const d = Math.floor(s/86400);
  if(d === 1) return "1 day old";
  if(d < 14) return `${d} days old`;
  if(d < 30) return dec1(d/7) + " wk old";
  if(d < 365) return dec1(monthsBetween(new Date(ts*1000), new Date(NOW()*1000))) + " mo old";
  const y = dec1(d/365.25);
  return `${y} ${y === "1" ? "yr" : "yrs"} old`;
}
function compactNum(n){
  if(n == null) return "—";
  if(n >= 1e6) return (n/1e6).toFixed(n >= 1e7 ? 0 : 1) + "M";
  if(n >= 1e4) return Math.round(n/1e3) + "k";
  return n.toLocaleString();
}
// recent vs all-time trend (recent − all-time), staleness gate, update recency
const RECENT_STALE_DAYS = 14;
function gTrend(g){
  return (g.recent_pct != null && g.rating_pct != null) ? g.recent_pct - g.rating_pct : null;
}
function recentStale(g){
  return !g.recent_scraped_at || (NOW() - g.recent_scraped_at) > RECENT_STALE_DAYS*86400;
}
function trendClass(g){
  const t = gTrend(g);
  if(t == null) return "none";
  if(t > 3) return "up";
  if(t < -3) return "down";
  return "flat";
}
function updatedStr(ts){
  if(!ts) return "no upd";
  const s = NOW() - ts;
  if(s < 86400) return "upd today";
  const d = Math.floor(s/86400);
  if(d < 30) return `upd ${d}d`;
  if(d < 365) return `upd ${Math.floor(d/30)}mo`;
  return `upd ${(d/365).toFixed(1)}yr`;
}
function relTime(ts){
  const s = NOW() - ts;
  if(s < 3600) return Math.max(1,Math.floor(s/60)) + "m ago";
  if(s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}
// Patch-cadence badge for the Updated column: how many updates (any size) landed in the
// last 90 days, from updates.json counts. Recent activity is highlighted; a game with
// updates only in the older part of the year shows the softer yearly count. Nothing when
// updates.json has no data for the game (coverage is still filling — see ARCHITECTURE §9.5).
function updCad(g){
  const c90 = g.upd_c90, c365 = g.upd_c365;
  if(c90 == null && c365 == null) return "";
  if(c90 > 0)  return `<div class="updcad hot" title="${c90} update${c90===1?'':'s'} in the last 90 days · ${c365} in the last year">${c90} · 90d</div>`;
  if(c365 > 0) return `<div class="updcad" title="${c365} update${c365===1?'':'s'} in the last year · none in the last 90 days">${c365} · 1y</div>`;
  return "";
}

// ----- filters (all except QTPD range) -----
function passNonRange(x){
  if(state.hidden.has(x.appid)) return false;     // session-hidden by the user
  if(state.q){ if(!x.title.toLowerCase().includes(state.q.trim().toLowerCase())) return false; }
  // Price-class facets (multi-toggle, OR'd). Non-overlapping primitives:
  //   full = paid & not discounted, sale = paid & discounted, free = is_free.
  // Empty set never occurs (the last lit facet can't be un-pressed); all three = no filter.
  if(state.priceClass.size < 3){
    const cls = x.is_free ? "free" : (x.discount_pct > 0 ? "sale" : "full");
    if(!state.priceClass.has(cls)) return false;
  }
  if(state.minScore > 0 && !(x.rating_pct != null && x.rating_pct >= state.minScore)) return false;
  // Review-count band toggles. A game passes if its band is enabled. Empty set = no filter.
  // Default {1,2,3,4} excludes only the 0-9 band (i.e. "10+"). Games with null review_count
  // fall in band 0, so they only show when the 0-9 band is enabled.
  if(state.revBands.size > 0 && !state.revBands.has(bandOf(x.review_count))) return false;
  const p = x.is_free ? 0 : x.price_final;
  if(state.minPrice != null){ if(p == null || p < state.minPrice) return false; }
  if(state.maxPrice != null){ if(p == null || p > state.maxPrice) return false; }
  if(state.wishOnly && state.wishlist && !state.wishlist.has(x.appid)) return false;
  // Trend is a multi-toggle: a game passes if its trend class is enabled. All-on (size 3)
  // or none-on (size 0) both mean "no trend filter" — everything passes.
  if(state.trendSet.size > 0 && state.trendSet.size < 3 && !state.trendSet.has(trendClass(x))) return false;
  if(state.updatedWithin !== "any"){
    const age = x.last_update_ts ? (NOW() - x.last_update_ts) : Infinity;
    if(state.updatedWithin === "1yr+"){ if(!(age > 365*86400)) return false; }
    else {
      const d = {"1mo":30,"3mo":90,"6mo":180,"1yr":365}[state.updatedWithin];
      if(!(age <= d*86400)) return false;
    }
  }
  // --- PICS "Flags" cluster (all independent; ONLY applied when PICS data is loaded).
  // Without pics.json the pics_* fields are undefined, so an active flag would wrongly
  // reject every game — guard on HAS_PICS so the filters are inert until data ships. ---
  if(window.HAS_PICS){
    const F = state.flags;
    // Tri-state presence flags: "only" requires the flag, "hide" requires its absence.
    const triFail = (mode, has) => (mode === "only" && !has) || (mode === "hide" && !!has);
    if(triFail(F.ea, x.pics_ea)) return false;
    if(triFail(F.eula, x.pics_eula)) return false;
    if(triFail(F.fse, x.pics_fse)) return false;
    if(triFail(F.vrOnly, x.pics_vr_only)) return false;
    if(F.ai === "hide" && (x.pics_ai||0) > 0) return false;
    if(F.ai === "only" && !((x.pics_ai||0) > 0)) return false;
    if(F.ctrl === "full"    && x.pics_controller !== "full") return false;
    if(F.ctrl === "partial" && !(x.pics_controller === "full" || x.pics_controller === "partial")) return false;
    if(F.deck === "verified"    && x.deck_cat !== 3) return false;
    if(F.deck === "playable"    && !(x.deck_cat === 3 || x.deck_cat === 2)) return false;
    if(F.deck === "unsupported" && x.deck_cat !== 1) return false;
    if(F.adultF === "hide" && isAdult(x)) return false;
    if(F.adultF === "only" && !isAdult(x)) return false;
  }
  if(state.tagsInc.size || state.tagsExc.size){
    const cs = canonSet(x);
    if(state.tagsInc.size){
      if(state.tagMode === "or"){
        // ANY: keep the game if it has at least one required tag
        let hit = false;
        for(const w of state.tagsInc){ if(cs.has(w)){ hit = true; break; } }
        if(!hit) return false;
      } else {
        // ALL (default): the game must have every required tag
        for(const w of state.tagsInc) if(!cs.has(w)) return false;
      }
    }
    for(const b of state.tagsExc) if(cs.has(b)) return false;   // exclude is always AND-NOT
  }
  return true;
}
function rangeActive(){ return state.qMinVal > 0.001 || !state.qMaxUnbounded; }

function visibleGames(){
  let g = state.data.games.filter(passNonRange);
  if(rangeActive()) g = g.filter(x => {
    const q = colValue(x);
    return q != null && q >= state.qMinVal && (state.qMaxUnbounded || q <= state.qMaxVal);
  });
  const k = state.sortKey, dir = state.sortDir;
  // The Reviews column (data-sort="rating_pct") sorts by all-time or 30-day depending on
  // the rating-source toggle (#3). "recent" is the default; fall back to all-time when a
  // game has no recent score so it still sorts sensibly.
  const ratingVal = x => (state.ratingSource === "recent")
    ? (x.recent_pct != null ? x.recent_pct : x.rating_pct)
    : x.rating_pct;
  // Count half of the Reviews split header. Same period toggle as the Score half: 30-day
  // uses recent_count, all-time uses review_count. Unlike the score fall-back above, a 0/absent
  // recent_count is a real value (no recent reviews), so we don't borrow the all-time total.
  const countVal = x => (state.ratingSource === "recent")
    ? (x.recent_count != null ? x.recent_count : 0)
    : x.review_count;
  const val = x => k === "qtpd" ? colValue(x) : k === "trend" ? gTrend(x) : k === "hltb" ? hoursFor(x)
                 : k === "rating_pct" ? ratingVal(x)
                 : k === "review_count" ? countVal(x)
                 : k === "wr" ? x.wr
                 : k === "playtime" ? (state.ptMetric === "down" ? x.pt_down : x.pt_up)
                 : k === "updated" ? x.last_update_ts
                 : x[k];
  g.sort((a,b)=>{
    if(k === "title") return dir * a.title.localeCompare(b.title);
    let av = val(a), bv = val(b);
    const an = av == null, bn = bv == null;
    if(an && bn) return 0;
    if(an) return 1;
    if(bn) return -1;
    return dir * (av - bv);
  });
  return g;
}

// ----- QTPD log range; resets to fit on any non-range filter change -----
const posToVal = (pos, dmax) => Math.pow(dmax + 1, pos/1000) - 1;
const valToPos = (v, dmax) => 1000 * Math.log(v + 1) / Math.log(dmax + 1);

function recomputeDomain(){
  let mx = 0;
  for(const x of state.data.games){
    if(passNonRange(x)){ const q = colValue(x); if(q != null && q > mx) mx = q; }
  }
  state.qDomain = Math.max(1, Math.ceil(mx * 10) / 10);
  if(state.qRangeTouched){
    // user set the range explicitly (incl. via URL) — keep it, just clamp to new domain
    state.qMinVal = Math.min(state.qMinVal, state.qDomain);
    if(!state.qMaxUnbounded) state.qMaxVal = Math.min(state.qMaxVal, state.qDomain);
  } else {
    // auto-fit: slider always spans current results
    state.qMinVal = 0; state.qMaxVal = state.qDomain; state.qMaxUnbounded = true;
  }
  syncRangeUI();
}
function syncRangeUI(){
  const d = state.qDomain;
  $("#qmin").value = Math.round(valToPos(state.qMinVal, d));
  $("#qmax").value = state.qMaxUnbounded ? 1000 : Math.round(valToPos(state.qMaxVal, d));
  paintRange();
}
function paintRange(){
  const aPos = parseFloat($("#qmin").value), bPos = parseFloat($("#qmax").value);
  $("#qrangefill").style.left  = (aPos/1000*100) + "%";
  $("#qrangefill").style.width = ((bPos - aPos)/1000*100) + "%";
  const fmt = v => v >= 100 ? v.toFixed(0) : v >= 10 ? v.toFixed(1) : v.toFixed(2);
  $("#qminv").textContent = state.qMinVal <= 0.001 ? "0" : fmt(state.qMinVal);
  $("#qmaxv").textContent = state.qMaxUnbounded ? "∞" : fmt(state.qMaxVal);
}
function onRangeInput(which){
  const d = state.qDomain;
  let aPos = parseFloat($("#qmin").value), bPos = parseFloat($("#qmax").value);
  if(aPos > bPos){ if(which === "min") aPos = bPos; else bPos = aPos; $("#qmin").value = aPos; $("#qmax").value = bPos; }
  state.qMinVal = posToVal(aPos, d);
  state.qMaxUnbounded = bPos >= 999.5;
  state.qMaxVal = posToVal(bPos, d);
  state.qRangeTouched = !(state.qMinVal <= 0 && state.qMaxUnbounded);  // back to full span = untouched
  paintRange(); render(); syncURL();
}

// ----- rendering -----
function render(){
  const allGames = visibleGames();
  const tbody = $("#rows"), empty = $("#empty");
  // Pagination: only render the first (pageSize × pagesShown) games; more load on scroll.
  const limit = state.pageSize * state.pagesShown;
  const games = allGames.slice(0, limit);
  state._totalFiltered = allGames.length;   // for the meta line + sentinel logic
  // Bar scale is computed from the ENTIRE filtered set (allGames), NOT the paged subset,
  // so loading more rows per page never shifts the bars. The scale only changes when the
  // filters change the result set — which is the intended behavior. (Previously this used
  // the paged `games`, so changing per-page silently rescaled every bar. T7 follow-up.)
  const qs = allGames.map(colValue).filter(v => v != null);
  const qLo = Math.min(...qs), qHi = Math.max(...qs);
  // log-scaled fill: matches the slider's log domain so a single huge-QTPD outlier
  // doesn't squash every other bar to near-zero. Floor of 6% keeps tiny values visible.
  const lLo = Math.log(qLo + 1), lHi = Math.log(qHi + 1);
  const fillPct = v => {
    if(v == null || !qs.length) return 0;
    if(qHi === qLo) return 100;
    return 6 + 94 * (Math.log(v + 1) - lLo) / (lHi - lLo);
  };

  if(!allGames.length){
    tbody.innerHTML = "";
    $("#gridview").innerHTML = "";
    empty.style.display = "block";
    empty.innerHTML = "<b>No games match these filters.</b><br>Loosen the QTPD range, clear tags, or reset.";
    renderMeta();
    return;
  }
  empty.style.display = "none";

  // L3/L5: grid view renders box-art cards from the same paged `games`; table view builds rows.
  if(state.view === "grid"){
    $("#gridview").innerHTML = games.map(gridCardHTML).join("");
    tbody.innerHTML = "";
  } else {
  $("#gridview").innerHTML = "";
  const sel = state.hltbMetric;
  const inc = state.tagsInc;
  tbody.innerHTML = games.map(g => {
    // Merged Price/Sale cell: struck full price on top, sale price + discount badge below.
    let price;
    if(g.is_free) price = `<span class="free">Free</span>`;
    else if(g.price_final == null) price = `<span class="nosale">—</span>`;
    else if(g.discount_pct > 0)
      price = `<div class="pricebox"><span class="price-init">$${g.price_initial.toFixed(2)}</span>`
            + `<span class="price-line"><span class="price-final">$${g.price_final.toFixed(2)}</span>`
            + `<span class="disc">-${g.discount_pct}%</span></span></div>`;
    else price = `<span class="price-final">$${g.price_final.toFixed(2)}</span>`;

    let sale;
    if(g.discount_pct > 0 && g.discount_end){
      const c = fmtCountdown(g.discount_end);
      sale = `<span class="countdown${c.soon?" soon":""}" data-end="${g.discount_end}">${c.text}</span>`;
    } else if(g.discount_pct > 0){
      sale = `<span class="countdown">on sale</span>`;
    } else sale = `<span class="nosale">—</span>`;

    // all tags, in original order (no reorder), light up if selected
    const tagHtml = (g.tags||[]).map(t => {
      const isSel = inc.has(canon(t.toLowerCase()));
      return `<button class="tag${isSel?' sel':''}" data-tag="${esc(t.toLowerCase())}">${esc(t)}</button>`;
    }).join("");

    const estSet = g.hltb_est || [];
    const realMode = state.hltbQuality === "real";
    const ESTTIP = "Estimated — filled from the typical main / extras / 100% ratio, not a real HowLongToBeat time. Replaced automatically if real data turns up.";
    // HLTB display: 2+ digit hours read fine as whole numbers (the decimal is just noise);
    // only sub-10h values keep one decimal, where the fraction actually matters.
    const fmtHLTB = h => h==null ? '—' : (h >= 10 ? String(Math.round(h)) : (Math.round(h*10)/10).toFixed(1));
    const hc = (v,l,key) => {
      const isEst = v!=null && estSet.indexOf(key)!==-1;
      // In real-only mode, estimated cells are blanked (we don't show computed values).
      const show = (realMode && isEst) ? null : v;
      return `<div class="hcol${sel===key?' sel':''}${(isEst && !realMode)?' est':''}"`
           + ((isEst && !realMode)?` title="${ESTTIP}"`:``)
           + `><div class="v">${fmtHLTB(show)}</div><div class="l">${l}</div></div>`;
    };
    // avg is only a "real" number when nothing in the triple was estimated.
    const avgShown = (realMode && estSet.length>0) ? null : g.hltb_avg;
    const hltb = `<div class="hltb-stack"><div class="hltb">${hc(g.hltb_main,'main','main')}${hc(g.hltb_extra,'+ext','extra')}${hc(g.hltb_complete,'100%','complete')}</div>`
               + `<div class="havg${sel==='avg'?' sel':''}">avg <b>${fmtHLTB(avgShown)}</b> h</div></div>`;

    // QTPD cell: positions are FIXED — after-discount (sale) always left/primary,
    // full-price always right/secondary — they never swap. The active price-basis
    // toggle just highlights which one drives sort+filter. When not on sale the two
    // are equal, so show a single value. The bar (fillPct) is log-scaled.
    const qAfter = computeQ(g, "after");     // sale-price QTPD
    const qFull  = computeQ(g, "before");    // full-price QTPD
    const onSale = g.discount_pct > 0 && qAfter != null && qFull != null && qAfter !== qFull;
    // QTPD display precision: 3-digit values → 0 decimals, 2-digit → 1, 1-digit → 2.
    const fmtQ = v => v >= 100 ? v.toFixed(0) : v >= 10 ? v.toFixed(1) : v.toFixed(2);
    let qtpd;
    if(freeMode()){
      // Free-only view: rank by quality-weighted hours (no price). No sale/full split,
      // no dollar bar — the value isn't a per-dollar figure.
      const fs = freeScore(g);
      if(fs == null){
        qtpd = `<div class="qnull">—</div>`;
      } else {
        qtpd = `<div class="qtop"><span class="qval qfull" title="Free-value score — quality-weighted hours (playtime × rating), no price">${fmtQ(fs)}</span><span class="qtag full" title="Free game: ranked by playtime × rating instead of price">free</span></div>`
             + `<div class="qbar"><div class="qfill" style="width:${fillPct(fs).toFixed(1)}%"></div></div>`;
      }
    } else if(qAfter == null && qFull == null){
      qtpd = `<div class="qnull">—</div>`;
    } else if(!onSale){
      // single number (not discounted, or one side missing); highlight if its basis is active
      const v = qAfter != null ? qAfter : qFull;
      const barV = activeQ(g);
      qtpd = `<div class="qtop"><span class="qval qfull" title="Not on sale — quality time per dollar at the full price">${fmtQ(v)}</span><span class="qtag full" title="This game isn't discounted, so its QTPD is based on the full price">full</span></div>`
           + `<div class="qbar"><div class="qfill" style="width:${fillPct(barV).toFixed(1)}%"></div></div>`;
    } else {
      const aSel = state.qBasis === "after", bSel = state.qBasis === "before";
      const left  = `<span class="qval${aSel?' qsel':' qdim'}" title="QTPD at the discounted (sale) price — quality time per dollar right now">${fmtQ(qAfter)}</span>`;
      const right = `<span class="qalt${bSel?' qsel':''}" title="QTPD at the full (non-sale) price — what the value is once the discount ends">${fmtQ(qFull)} full</span>`;
      const barV = activeQ(g);
      qtpd = `<div class="qtop">${left}${right}</div>`
           + `<div class="qbar"><div class="qfill" style="width:${fillPct(barV).toFixed(1)}%"></div></div>`;
    }

    const wished = state.wishlist && state.wishlist.has(g.appid) ? '<span class="wish-dot" title="On your wishlist"></span>' : '';
    const age = ageStr(g.release_ts);

    // stacked reviews: all-time over recent (recent greyed when stale / absent)
    const allRow = `<div class="rrow" title="All-time: ${g.rating_pct==null?'no':g.rating_pct+'% of '+(g.review_count||0).toLocaleString()} reviews positive">`
      + `<span class="rlbl">all</span><span class="dot" style="background:${ratingColor(g.rating_pct)}"></span>`
      + `<span class="rval" style="color:${ratingColor(g.rating_pct)}">${g.rating_pct==null?'—':g.rating_pct+'%'}</span>`
      + `<span class="rcount">${compactNum(g.review_count)}</span></div>`;
    const stale = recentStale(g);
    let recRow;
    if(g.recent_pct == null){
      recRow = `<div class="rrow recent muted" title="No recent review score (Steam shows one only for games 45+ days old with enough recent reviews)"><span class="rlbl">30d</span>`
        + `<span class="dot" style="background:var(--muted-2)"></span><span class="rval">—</span></div>`;
    } else {
      recRow = `<div class="rrow recent${stale?' stale':''}" title="Recent Reviews (past 30 days): ${g.recent_pct}% of ${(g.recent_count||0).toLocaleString()} reviews${stale?' · score is over '+RECENT_STALE_DAYS+' days old':''}">`
        + `<span class="rlbl">30d</span><span class="dot" style="background:${stale?'var(--muted-2)':ratingColor(g.recent_pct)}"></span>`
        + `<span class="rval"${stale?'':` style="color:${ratingColor(g.recent_pct)}"`}>${g.recent_pct}%</span>`
        + `<span class="rcount">${compactNum(g.recent_count)}</span></div>`;
    }
    const reviews = `<div class="ratecell">${allRow}${recRow}</div>`;

    // trend column: recent − all-time, with dead-band; greyed if stale
    const tcls = trendClass(g), tval = gTrend(g);
    let trend;
    if(tcls === "none") trend = `<span class="trend none">—</span>`;
    else if(tcls === "flat") trend = `<span class="trend flat${stale?' stale':''}" title="Stable: recent within 3 pts of all-time">≈</span>`;
    else if(tcls === "up") trend = `<span class="trend up${stale?' stale':''}" title="Improving: recent ${tval} pts above all-time">▲ ${tval}</span>`;
    else trend = `<span class="trend down${stale?' stale':''}" title="Declining: recent ${Math.abs(tval)} pts below all-time">▼ ${Math.abs(tval)}</span>`;

    // Weighted rating cell: playtime-weighted % (capped variant), shown next to
    // Steam's flat %. Grayed (low-confidence) when fewer than PT_CONFIDENT reviews.
    let wrCell;
    if(g.wr == null){
      wrCell = `<div class="wrcell"><span class="wrval na">—</span></div>`;
    } else {
      const lowConf = (g.wr_n != null && g.wr_n < window.PT_CONFIDENT);
      const delta = (g.wr_steam != null) ? Math.round(g.wr - g.wr_steam) : null;
      const deltaStr = delta == null ? "" : (delta > 0 ? `+${delta}` : `${delta}`);
      // Review count is per-game and read straight from the data (g.wr_n), so as the scraper
      // deepens a game's sample the tip tracks it automatically — 1k today, 2k or 3k later.
      // Formatted with a thousands separator for readability.
      const nStr = g.wr_n != null ? g.wr_n.toLocaleString() : "?";
      const tip = `Playtime-weighted: ${g.wr}% — from ${nStr} reviews, each counted by hours played. `
        + `Steam's flat %: ${g.wr_steam==null?'—':g.wr_steam+'%'}`
        + (delta!=null?` (${deltaStr} pts vs Steam)`:``)
        + `. Uncapped: ${g.wr_raw==null?'—':g.wr_raw+'%'}.`
        + (lowConf?` ⚠ Only ${nStr} reviews — low confidence; needs ${window.PT_CONFIDENT.toLocaleString()}+ to be reliable.`:``);
      wrCell = `<div class="wrcell${lowConf?' lowconf':''}" title="${tip}">`
        + `<span class="wrtop">`
        + `<span class="dot" style="background:${lowConf?'var(--muted-2)':ratingColor(g.wr)}"></span>`
        + `<span class="wrval" style="${lowConf?'':`color:${ratingColor(g.wr)}`}">${g.wr}%</span>`
        + `</span>`
        + (delta!=null&&!lowConf?`<span class="wrdelta ${delta>0?'pos':delta<0?'neg':''}">${deltaStr}</span>`:``)
        + `</div>`;
    }

    // Playtime cell: stacked medians, green ▲ (recommend) over red ▼ (not-recommend).
    // Clean median shown; mean + sample + p25-p75 spread on hover (computed frontend-side
    // is impossible here since we only ship medians — so the hover shows median + n + the
    // opposite-side comparison, which is the useful at-a-glance info from the summary).
    const ptRow = (mins, n, up) => {
      const arrow = up ? '▲' : '▼';
      const cls = up ? 'ptup' : 'ptdown';
      if(mins == null){
        return `<div class="ptrow" title="${up?'Recommend':'Not recommend'}: too few reviews (need 3+) for a median">`
             + `<span class="${cls}">${arrow}</span><span class="ptval na">—</span></div>`;
      }
      const h = (mins/60);
      // 2-digit+ hours drop the decimal (it's just noise); only sub-10h keep one decimal.
      const hStr = h >= 10 ? Math.round(h) : h.toFixed(1);
      // Sample size (n) stays in the data + tooltip, but is no longer shown inline — the
      // column reads as playtime only, far less clutter.
      const tip = `${up?'Recommenders':'Non-recommenders'}: median ${hStr}h across ${n} review${n===1?'':'s'}`;
      return `<div class="ptrow" title="${tip}">`
           + `<span class="${cls}">${arrow}</span>`
           + `<span class="ptval">${hStr}<span class="pth">h</span></span></div>`;
    };
    let ptCell;
    if(g.pt_up == null && g.pt_down == null){
      ptCell = ``;   // no data → render nothing so the cell adds zero height to the row
    } else {
      ptCell = `<div class="ptcell">${ptRow(g.pt_up, g.pt_nup, true)}${ptRow(g.pt_down, g.pt_ndown, false)}</div>`;
    }

    return `<tr>
      <td data-label="Game"><div class="gamecell">
          <button class="hidebtn" data-hide="${g.appid}" title="Hide this game for this session" aria-label="Hide ${esc(g.title)}">×</button>
          <span class="thumb${isAdult(g) ? ' adult' : ''}" data-appid="${g.appid}" data-art="${esc(g.art || "")}">
            <img loading="lazy" src="${imgChain(g.appid, g.art)[0]}" alt="" referrerpolicy="no-referrer"
                 data-appid="${g.appid}" data-art="${esc(g.art || "")}" data-step="0"
                 onerror="stepThumb(this,true)" onload="stepThumb(this,false)" />
            <span class="pop"><img alt="" referrerpolicy="no-referrer" /></span>
          </span>
          <span class="gmeta">
            <a class="gtitle" href="${esc(g.url)}" target="_blank" rel="noopener">${esc(g.title)}</a>${wished}
            <div class="gsub">${g.review_count? g.review_count.toLocaleString()+" reviews" : "app "+g.appid}</div>
          </span></div></td>
      <td data-label="Reviews">${reviews}</td>
      <td data-label="Trend" class="center">${trend}</td>
      <td data-label="Weighted" class="num">${wrCell}</td>
      <td data-label="Price / Sale">${price}</td>
      <td data-label="Sale ends" class="center">${sale}</td>
      <td data-label="Released" class="center" title="${esc(releaseTip(g))}"><span class="rel">${fmtRelease(g)}</span>${age?`<div class="age">${age}</div>`:""}</td>
      <td data-label="Updated" class="center"><div class="updated${!g.last_update_ts?' none':''}" title="${g.last_update_ts?'Last content update: '+new Date(g.last_update_ts*1000).toISOString().slice(0,10):'No update posts found on Steam'}">${updatedStr(g.last_update_ts)}</div>${updCad(g)}</td>
      <td data-label="Tags"><div class="tags">${tagHtml}</div></td>
      <td data-label="Playtime" class="num pad">${ptCell}</td>
      <td data-label="HLTB M/E/100%" class="num pad">${hltb}</td>
      <td data-label="QTPD" class="num pad tdqtpd">${qtpd}</td>
    </tr>`;
  }).join("");
  }

  // Infinite scroll: if more filtered games remain beyond the current page, show a
  // sentinel row at the bottom; an IntersectionObserver loads the next page when it
  // scrolls into view. Otherwise show nothing (we've rendered everything).
  const remaining = state._totalFiltered - games.length;
  const foot = $("#loadmore");
  if(remaining > 0){
    foot.style.display = "";
    foot.textContent = `Showing ${games.length} of ${state._totalFiltered} — scroll for more…`;
    ensurePageObserver();
  } else {
    foot.style.display = "none";
  }
  renderMeta();
}

// Lazily create one IntersectionObserver that watches the loadmore sentinel. When it
// becomes visible, bump pagesShown and re-render (which appends the next slice).
let _pageObserver = null;
function ensurePageObserver(){
  if(_pageObserver) return;
  const foot = $("#loadmore");
  _pageObserver = new IntersectionObserver(entries => {
    if(entries.some(e => e.isIntersecting)){
      // Only grow if there's actually more to show.
      if(state.pageSize * state.pagesShown < state._totalFiltered){
        state.pagesShown += 1;
        render();
      }
    }
  }, {rootMargin: "400px"});   // start loading a bit before the user hits the very bottom
  _pageObserver.observe(foot);
}

// Reset to page 1 whenever the filtered set changes (filter/sort/search/page-size change),
// so the user starts at the top of the new result set rather than deep in a stale page.
function resetPaging(){ state.pagesShown = 1; }

setInterval(() => {
  document.querySelectorAll(".countdown[data-end]").forEach(el => {
    const end = parseInt(el.dataset.end, 10);
    if(end - NOW() <= 0){
      // Sale ended while the tab was open. Per design: show "sale ended" here and leave
      // the price/QTPD columns as-is; a reload re-normalizes to the clean base-price look.
      el.textContent = "sale ended";
      el.classList.add("soon", "ended");
      el.removeAttribute("data-end");     // stop ticking this one
    } else {
      const c = fmtCountdown(end);
      if(c){ el.textContent = c.text; el.classList.toggle("soon", c.soon); }
    }
  });
}, 1000);

// thumbnail hover-enlarge
document.body.addEventListener("mouseover", e => {
  const thumb = e.target.closest(".thumb");
  if(!thumb) return;
  // Don't enlarge an un-revealed adult thumb — showing bigger blurred art is pointless
  // and the user hasn't passed the 18+ gate yet.
  if(thumb.classList.contains("adult") && !thumb.classList.contains("revealed")) return;
  const pop = thumb.querySelector(".pop"), img = pop.querySelector("img");
  if(!img.src){
    // Same content-verified chain as the table thumb. Prefer the PICS `art` URL (real
    // header art, correct even for alt-asset games); otherwise start at the derived
    // header, which is larger than the capsule and better suited to the 380px popup.
    // Step index is looked up rather than hardcoded — the chain length now varies with
    // whether `art` is present and whether it dedupes against the derived header.
    const a = thumb.dataset.appid;
    const art = thumb.dataset.art || "";
    const chain = imgChain(a, art);
    const start = artUrl(a, art) || headerUrl(a);
    img.setAttribute("data-appid", a);
    img.setAttribute("data-art", art);
    img.setAttribute("data-step", String(Math.max(0, chain.indexOf(start))));
    img.onerror = () => stepThumb(img, true);
    img.onload  = () => stepThumb(img, false);
    img.src = start;
  }
  const r = thumb.getBoundingClientRect();
  let top = r.bottom + 8; if(top + 178 > window.innerHeight) top = r.top - 178 - 8;
  let left = r.left;      if(left + 380 > window.innerWidth) left = window.innerWidth - 380 - 10;
  pop.style.left = Math.max(8,left) + "px"; pop.style.top = Math.max(8,top) + "px"; pop.style.display = "block";
});
document.body.addEventListener("mouseout", e => {
  const thumb = e.target.closest(".thumb");
  if(thumb && !thumb.contains(e.relatedTarget)) thumb.querySelector(".pop").style.display = "none";
});

// ── Three-stage 18+ gate for adult art (PICS content_desc 3/4) ────────────────────────
// Shared by the table thumbnail and the grid card, so both gates behave identically.
//   stage 1  blurred + "18+"       (default)
//   stage 2  .confirm  -> "18+?"   (left click asks)
//   stage 3  .revealed -> unblurred (left click confirms)
// REVEALING NEVER NAVIGATES. Stage 3 used to also window.open() the store page, so the
// confirming click both unblurred the art and threw you out to Steam — you could never
// actually look at the picture you had just agreed to see. Opening the store is a separate
// intent and already has its own control: the TITLE beside the art is the `<a>` link (and
// in the grid, the expanded card's "Steam ↗" action). Art reveals; links navigate.
//
// Right-click UNDOES, mirroring the tag chips' forward/backward cycle:
//   stage 1 -> nothing to undo, so the browser's own context menu opens as usual
//   stage 2 -> stage 1  ("no, I'm not 18")
//   stage 3 -> stage 1  (re-hide art that's already been revealed)
const adultStage = el => el.classList.contains("revealed") ? 3
                       : el.classList.contains("confirm")  ? 2 : 1;
function adultSetStage(el, stage){
  el.classList.toggle("confirm",  stage === 2);
  el.classList.toggle("revealed", stage === 3);
  // Re-hiding while the hover-popover is open would leave a big un-blurred still on screen
  // (the popover only re-checks `revealed` on mouseenter), so close it on the way down.
  if(stage === 1){ const pop = el.querySelector(".pop"); if(pop) pop.style.display = "none"; }
}
document.body.addEventListener("click", e => {
  const thumb = e.target.closest(".thumb.adult");
  if(!thumb || thumb.classList.contains("revealed")) return;   // revealed -> normal behaviour
  e.preventDefault(); e.stopPropagation();
  adultSetStage(thumb, adultStage(thumb) === 1 ? 2 : 3);
});
// Undo for BOTH surfaces. Registered here rather than next to the grid's click handler so
// the two gates can never drift apart.
document.body.addEventListener("contextmenu", e => {
  const el = e.target.closest(".thumb.adult, .gcard.adult");
  if(!el || adultStage(el) === 1) return;      // stage 1: leave the native menu alone
  e.preventDefault(); e.stopPropagation();
  adultSetStage(el, 1);
});

// ----- tag rail: stable membership (full counts), contextual badges -----
function computeFullCounts(){
  const counts = {};
  state.data.games.forEach(g => canonSet(g).forEach(t => counts[t] = (counts[t]||0)+1));
  state.fullCounts = counts;
}
function buildTagRail(){
  const full = state.fullCounts;
  // Tag-name search (#tagSearch). Purely a DISPLAY filter over the rail — it never touches
  // which games are listed, so it is not serialized to the URL and not counted as an
  // "active" filter. Tag names are stored canonical-lowercase, so a lowercased substring
  // test is the whole match: "strategy" -> strategy / grand strategy / turn-based strategy.
  const q = (state.tagQuery || "").trim().toLowerCase();
  // contextual counts over the current (non-range) filtered set
  const ctx = {};
  state.data.games.filter(passNonRange).forEach(g => canonSet(g).forEach(t => ctx[t] = (ctx[t]||0)+1));
  const active = new Set([...state.tagsInc, ...state.tagsExc]);
  const buckets = {}; GROUP_ORDER.forEach(g => buckets[g] = []);
  Object.keys(full).forEach(t => {
    if(full[t] < MIN_TAG_COUNT && !active.has(t)) return;     // stable membership: hide rare tags
    buckets[TAG_CAT[t] || "Other"].push(t);
  });
  const label = t => t.replace(/\b\w/g, c=>c.toUpperCase());
  const chipHtml = (t, extra) => {
    const c = ctx[t] || 0;
    const f = full[t] || 0;
    // Show one number when the filtered count equals the full-corpus count (e.g. on first
    // load with no filters). Once filtering diverges them, show "filtered / total".
    const countStr = (c === f) ? `${f}` : `${c} / ${f}`;
    // Reserve width for the WIDEST form this chip can ever show ("full / full", e.g.
    // "211 / 211") so that when a filter introduces the second number the chip doesn't
    // grow — no reflow/flicker across the whole rail. In a mono font, ch units map to
    // character widths exactly: 2×digits + 3 (the " / " separator) + ~1ch headroom.
    const digits = String(f).length;
    const reserveCh = 2 * digits + 3 + 1;
    let cls = "chip", mk = "";
    if(extra) cls += " tag-extra";
    if(state.tagsInc.has(t)){ cls += " inc"; mk = '<span class="mk">✓</span>'; }
    else if(state.tagsExc.has(t)){ cls += " exc"; mk = '<span class="mk">✕</span>'; }
    else if(c === 0){ cls += " dim"; }
    return `<button class="${cls}" data-tag="${esc(t)}" title="${esc(label(t))} — ${c.toLocaleString()} of the current results carry this tag, out of ${f.toLocaleString()} across the whole catalogue. Click to require it, again to exclude, again to clear.">${mk}${esc(label(t))}<span class="ct" style="min-width:${reserveCh}ch">${countStr}</span></button>`;
  };
  const byName = (a,b) => a.localeCompare(b);
  // Groups small enough to always show in full (no top-10 split). Players & Mode is short.
  const NO_SPLIT = new Set(["Players & Mode"]);
  const TOP_N = 10;

  let html = "";
  GROUP_ORDER.forEach(g => {
    let tags = buckets[g];
    if(q) tags = tags.filter(t => t.includes(q));
    if(!tags.length) return;

    let foundation, overflow;
    // While searching, every match is shown outright — a shortlist you can pick from is the
    // whole point, so the top-10 / "+N more" split is bypassed rather than burying matches.
    if(q || NO_SPLIT.has(g) || tags.length <= TOP_N){
      // Show everything, alphabetical. No overflow tier.
      foundation = tags.slice().sort(byName);
      overflow = [];
    } else {
      // Foundation = the TOP_N most-USED tags (membership by full-corpus count desc,
      // name asc as a stable tiebreak). Overflow = the rest. Each tier is then sorted
      // ALPHABETICALLY on its own, so chips never reshuffle by count — two independent
      // A-Z lists (foundation row, then overflow row). Any active (include/exclude) tag
      // is forced into the foundation so a selected chip is never hidden behind "+ more".
      const forced = tags.filter(t => active.has(t));
      const rest = tags.filter(t => !active.has(t));
      rest.sort((a,b) => (full[b]-full[a]) || byName(a,b));   // rank by usage for membership
      const topSet = new Set([...forced, ...rest.slice(0, Math.max(0, TOP_N - forced.length))]);
      foundation = tags.filter(t => topSet.has(t)).sort(byName);
      overflow   = tags.filter(t => !topSet.has(t)).sort(byName);
    }

    const chips = foundation.map(t => chipHtml(t, false)).join("")
                + overflow.map(t => chipHtml(t, true)).join("");
    const moreBtn = overflow.length
      ? `<button class="tagmore" data-more="${esc(g)}" title="Show ${overflow.length} more ${esc(g)} tag${overflow.length===1?'':'s'} — only the most common are shown by default.">+${overflow.length} more</button>`
      : "";
    html += `<div class="taggroup" data-group="${esc(g)}"><span class="grouplabel" title="${esc(g)} — a group of related Steam tags. The tags below all describe this aspect of a game.">${g}</span>`
          + `<span class="grouptags">${chips}${moreBtn}</span></div>`;
  });
  $("#tagrail").innerHTML = html
    || (q ? `<div class="tagempty">No tags match “${esc(q)}” — clear the filter (✕) to see them all.</div>` : "");
  buildTagMini();
}
// Chips for the currently-interacted tags — required (✓), excluded (✕), plus any just CLEARED and
// still LINGERING (dashed, fading). Shared by the collapsed Tags header mini-rail AND the compact
// filter-summary line so both behave identically. Clicking one cycles it via the normal body
// [data-tag] handler (require → exclude → clear); right-click cycles back; clicking a lingering
// chip re-applies it before it fades.
const TAG_LINGER_HOLD = 3000, TAG_LINGER_FADE = 3000, TAG_LINGER_TOTAL = TAG_LINGER_HOLD + TAG_LINGER_FADE;
const tagLabel = t => t.replace(/\b\w/g, c => c.toUpperCase());
function tagChipHTML(t, kind){   // kind: "inc" | "exc" | "linger"
  const mk = kind === "exc" ? "✕" : kind === "inc" ? "✓" : "·";
  const title = kind === "linger"
      ? "Cleared — click to re-apply before it fades away"
      : (kind === "inc" ? "Required" : "Excluded") + " tag — click to cycle (require → exclude → clear)";
  return `<button class="chip ${kind}" data-tag="${esc(t)}" title="${title}"><span class="mk">${mk}</span>${esc(tagLabel(t))}</button>`;
}
function interactedTagChipsHTML(){
  let html = [...state.tagsInc].map(t => tagChipHTML(t, "inc")).join("")
           + [...state.tagsExc].map(t => tagChipHTML(t, "exc")).join("");
  for(const t of state.tagLinger.keys()){
    if(state.tagsInc.has(t) || state.tagsExc.has(t)) continue;   // re-applied since — not lingering
    html += tagChipHTML(t, "linger");
  }
  return html;
}
function buildTagMini(){
  const host = document.getElementById("tagMini"); if(!host) return;
  host.innerHTML = interactedTagChipsHTML();
  applyLingerOpacities();
}
// Opacity for a lingering chip: full for HOLD ms, then linear fade to 0 over FADE ms.
function lingerOpacity(ts){
  const e = performance.now() - ts;
  if(e <= TAG_LINGER_HOLD) return 1;
  if(e >= TAG_LINGER_TOTAL) return 0;
  return 1 - (e - TAG_LINGER_HOLD) / TAG_LINGER_FADE;
}
function applyLingerOpacities(){
  ["tagMini", "filterSummary"].forEach(id => {
    const host = document.getElementById(id); if(!host) return;
    host.querySelectorAll(".chip.linger[data-tag]").forEach(el => {
      const ts = state.tagLinger.get(el.dataset.tag);
      el.style.opacity = ts == null ? "" : String(lingerOpacity(ts));
    });
  });
}
let _lingerTimer = null;
function startLingerTicker(){
  if(_lingerTimer) return;
  _lingerTimer = setInterval(() => {
    const now = performance.now();
    let expired = false;
    for(const [t, ts] of state.tagLinger){ if(now - ts >= TAG_LINGER_TOTAL){ state.tagLinger.delete(t); expired = true; } }
    if(expired){ buildTagMini(); renderSummary(); updateSectionCounts(); }   // fully faded — allow the line to collapse
    else applyLingerOpacities();
    if(state.tagLinger.size === 0){ clearInterval(_lingerTimer); _lingerTimer = null; }
  }, 100);
}
function hideGame(appid){
  state.hidden.add(Number(appid));
  update();                        // re-render without it; refreshes counts + hidden control
}
function unhideAll(){
  state.hidden.clear();
  update();
}

function cycleTag(t, dir){
  // 3-state cycle: none -> include -> exclude -> none.
  // dir=+1 (left-click) walks forward, dir=-1 (right-click) walks backward.
  t = canon(t.toLowerCase());
  const inc = state.tagsInc.has(t), exc = state.tagsExc.has(t);
  const cur = inc ? 1 : exc ? 2 : 0;          // 0 none, 1 include, 2 exclude
  const next = (cur + (dir < 0 ? 2 : 1)) % 3; // +1 forward, +2 ≡ -1 backward (mod 3)
  state.tagsInc.delete(t); state.tagsExc.delete(t);
  if(next === 1){ state.tagsInc.add(t); state.tagLinger.delete(t); }
  else if(next === 2){ state.tagsExc.add(t); state.tagLinger.delete(t); }
  else if(cur !== 0){ state.tagLinger.set(t, performance.now()); startLingerTicker(); }   // cleared → linger, then fade
  syncURL();
  update();
}

// central update for any non-range filter change (refits range + faceted counts).
// Any filter/sort/search/page-size change resets to page 1 of the new result set.
// Reflect state.priceClass onto the band's aria-pressed. "All" is lit only when all three
// facets are on; each facet button reflects its own membership.
function syncPriceClassUI(){
  const allOn = state.priceClass.size === 3;
  $$("#priceClass button").forEach(b => {
    const pc = b.dataset.pc;
    b.setAttribute("aria-pressed", pc === "all" ? allOn : state.priceClass.has(pc));
  });
}
function update(){ resetPaging(); recomputeDomain(); buildTagRail(); render(); syncURL(); }

/* ═══════════════════════════════════════════════════════════════════════════════════════
   Lorenzo-list features (ARCHITECTURE §3.4)
   ═══════════════════════════════════════════════════════════════════════════════════════ */
const sameSet = (s, arr) => s.size === arr.length && arr.every(x => s.has(x));
const fmtQval = v => v == null ? "—" : v >= 100 ? v.toFixed(0) : v >= 10 ? v.toFixed(1) : v.toFixed(2);

// ── L3 / L5 — view switcher + cool box-art grid ─────────────────────────────────────────
const VIEWS = ["table", "card", "grid"];
const isNarrow = () => window.matchMedia("(max-width:1374px)").matches;
// The "detailed" view is a real table on desktop and stacked cards on mobile — the same view,
// relabelled per device. So `layout-card` is purely viewport-driven (any non-grid view on a
// narrow screen), and the Table/Card buttons only differ in which one is enabled/pressed for the
// current device (Table = desktop-only, Card = mobile-only). `grid-view` is the box-art grid.
function applyLayout(){
  const narrow = isNarrow();
  document.body.classList.toggle("narrow", narrow);   // used to split mobile-sort vs desktop #gridSort
  document.body.classList.toggle("grid-view", state.view === "grid");
  document.body.classList.toggle("layout-card", state.view !== "grid" && narrow);
  updateViewButtons(narrow);
  layoutGridSort();   // (re)fit the grid-sort field buttons for the current width/visibility
}
// Enable only the device-appropriate detailed button; disable the other with a hint. Pressed
// state follows the device: Grid when gridding, else Table (desktop) / Card (mobile).
function updateViewButtons(narrow){
  const sw = document.querySelector("#viewSwitch"); if(!sw) return;
  const btn = v => sw.querySelector(`[data-view="${v}"]`);
  const isGrid = state.view === "grid";
  btn("table").classList.toggle("disabled", narrow);
  btn("card").classList.toggle("disabled", !narrow);
  btn("table").setAttribute("aria-disabled", String(narrow));
  btn("card").setAttribute("aria-disabled", String(!narrow));
  btn("grid").setAttribute("aria-pressed", String(isGrid));
  btn("table").setAttribute("aria-pressed", String(!isGrid && !narrow));
  btn("card").setAttribute("aria-pressed", String(!isGrid && narrow));
}
function setView(v){
  if(!VIEWS.includes(v)) v = "table";
  const narrow = isNarrow();
  // Coerce the detailed view to whichever is valid for this device (they render identically).
  if(v === "table" && narrow) v = "card";
  else if(v === "card" && !narrow) v = "table";
  state.view = v;
  try{ localStorage.setItem("qtpd.view", v); }catch(e){}
  applyLayout();
  render();
}
// One box-art card: Steam header art on top at its true ratio, a solid info panel (QTPD left ·
// rating right, over the title), and a tap-to-expand details overlay (price / length / Steam).
function gridCardHTML(g){
  const q = colValue(g);
  const onSale = g.discount_pct > 0;
  const cls = "gcard" + (isAdult(g) ? " adult" : "") + (onSale ? " sale" : "") + ((q != null && q >= state.qDomain * 0.66) ? " hi" : "");
  const disc = onSale ? `<span class="gdisc">-${g.discount_pct}%</span>` : "";
  const qLbl = freeMode() ? "FREE" : "QTPD";
  const qHtml = q != null ? `<span class="gq">${qLbl} ${fmtQval(q)}</span>` : `<span class="gq na">${qLbl} —</span>`;
  // Rating = Steam all-time review score, plain number + % (no weighted/recent source letters).
  const rateHtml = g.rating_pct != null
    ? `<span class="grate" style="color:${ratingColor(g.rating_pct)}" title="Steam review score ${g.rating_pct}%${g.review_count ? " · " + g.review_count.toLocaleString() + " reviews" : ""}">${g.rating_pct}%</span>`
    : `<span class="grate na" title="No reviews yet">—</span>`;
  let priceTxt;
  if(g.is_free) priceTxt = "Free";
  else if(g.price_final == null) priceTxt = "—";
  else if(onSale) priceTxt = `$${g.price_final.toFixed(2)} (-${g.discount_pct}%)`;
  else priceTxt = `$${g.price_final.toFixed(2)}`;
  const h = hoursFor(g);
  const hStr = h != null ? (h >= 10 ? Math.round(h) : (Math.round(h * 10) / 10).toFixed(1)) + "h" : "—";
  return `<div class="${cls}" data-gappid="${g.appid}" tabindex="0" role="button" aria-label="${esc(g.title)}">
    <div class="gart">
      <img class="gcap" loading="lazy" src="${headerUrl(g.appid)}" alt="" referrerpolicy="no-referrer"
           onerror="this.onerror=null;this.src='${capsuleUrl(g.appid)}'" />
      ${disc}
    </div>
    <div class="gmeta">
      <div class="gmeta-top"><div class="gname">${esc(g.title)}</div>${rateHtml}</div>
      ${qHtml}
    </div>
    <div class="ginfo">
      <div class="gi-title">${esc(g.title)}</div>
      <div class="gi-row"><span>Price</span><b>${priceTxt}</b></div>
      <div class="gi-row"><span>Length</span><b>${hStr}</b></div>
      <div class="gi-actions">
        <a class="gi-steam" href="${esc(g.url)}" target="_blank" rel="noopener">Steam ↗</a>
        <button type="button" data-gclose="1">Close ✕</button>
      </div>
    </div>
  </div>`;
}

// ── L1 — accordion filter sections ──────────────────────────────────────────────────────
const SECTION_DEFAULT = {value:true, quality:true, flags:false, tags:false};   // Tags + Flags folded by default
function loadSectionState(){
  let saved = {};
  try{ saved = JSON.parse(localStorage.getItem("qtpd.sections") || "{}") || {}; }catch(e){}
  return Object.assign({}, SECTION_DEFAULT, saved);
}
function applySections(){
  const st = loadSectionState();
  document.querySelectorAll(".filter-section").forEach(sec => {
    const open = !!st[sec.dataset.section];
    sec.classList.toggle("open", open);
    const head = sec.querySelector(".section-head");
    if(head) head.setAttribute("aria-expanded", String(open));
  });
}
function toggleSection(name){
  const st = loadSectionState();
  st[name] = !st[name];
  try{ localStorage.setItem("qtpd.sections", JSON.stringify(st)); }catch(e){}
  applySections();
}
function openSectionByName(name){
  const st = loadSectionState();
  if(!st[name]){ st[name] = true; try{ localStorage.setItem("qtpd.sections", JSON.stringify(st)); }catch(e){} applySections(); }
}
// Count of non-default filters per section — shown as a small "N active" badge on the header.
function sectionActiveCounts(){
  const revActive = sameSet(state.revBands, [1,2,3,4]) ? 0 : 1;
  return {
    value: (state.qBasis !== "after" ? 1 : 0) + (state.hltbMetric !== "main" ? 1 : 0) + (state.hltbQuality !== "real" ? 1 : 0)
         + ((state.minPrice != null || state.maxPrice != null) ? 1 : 0) + (state.priceClass.size < 3 ? 1 : 0) + (state.qRangeTouched ? 1 : 0),
    // Quality now also carries the merged Activity controls (updated-within, playtime-sort).
    quality: (state.minScore > 0 ? 1 : 0) + (state.ratingSource !== "recent" ? 1 : 0)
         + ((state.trendSet.size > 0 && state.trendSet.size < 3) ? 1 : 0) + revActive
         + (state.updatedWithin !== "any" ? 1 : 0) + (state.ptMetric !== "up" ? 1 : 0),
    tags: state.tagsInc.size + state.tagsExc.size,
    flags: (() => { const F = state.flags; let n = 0;
      if(F.ea !== "any") n++; if(F.eula !== "any") n++; if(F.fse !== "any") n++; if(F.vrOnly !== "any") n++;
      if(F.ai !== "any") n++; if(F.ctrl !== "any") n++; if(F.deck !== "any") n++; if(F.adultF !== "any") n++;
      return n; })(),
  };
}
function updateSectionCounts(){
  const c = sectionActiveCounts();
  document.querySelectorAll("[data-count]").forEach(el => {
    const n = c[el.dataset.count] || 0;
    el.textContent = n ? `${n} active` : "";
  });
}

// Paint each control gold ONLY when it's been changed from its default — so an open section shows
// at a glance what's been touched. Mirrors the default definitions in sectionActiveCounts(): a
// group at its default reads neutral (blue-ish); a non-default group's pressed button(s) go gold
// via the `.changed` class. Segmented groups are matched by their data-* attribute. Sale/Wishlist
// toggles and tag chips carry their own on-state colours (see CSS), so they're not touched here.
function markChangedControls(){
  const setGroup = (sel, changed) =>
    document.querySelectorAll(sel).forEach(b =>
      b.classList.toggle("changed", changed && b.getAttribute("aria-pressed") === "true"));

  // VALUE — segmented
  setGroup("#qb-after,#qb-before", state.qBasis !== "after");
  setGroup("[data-metric]",       state.hltbMetric !== "main");
  setGroup("[data-hquality]",     state.hltbQuality !== "real");
  // QUALITY & ACTIVITY — segmented
  setGroup("[data-minscore]",     state.minScore > 0);
  setGroup("[data-ratesrc]",      state.ratingSource !== "recent");
  setGroup("[data-trend]",        state.trendSet.size > 0 && state.trendSet.size < 3);
  setGroup("[data-rev]",          !sameSet(state.revBands, [1,2,3,4]));
  setGroup("[data-upd]",          state.updatedWithin !== "any");
  setGroup("[data-ptmetric]",     state.ptMetric !== "up");
  setGroup('[data-pc="full"],[data-pc="sale"],[data-pc="free"]', state.priceClass.size < 3);
  // FLAGS — all segmented, all tri-state
  { const F = state.flags;
    setGroup("[data-ai]",    F.ai !== "any");
    setGroup("[data-ctrl]",  F.ctrl !== "any");
    setGroup("[data-deck]",  F.deck !== "any");
    setGroup("[data-adult]", F.adultF !== "any");
    setGroup('[data-flag="ea"]',     F.ea     !== "any");
    setGroup('[data-flag="vrOnly"]', F.vrOnly !== "any");
    setGroup('[data-flag="fse"]',    F.fse    !== "any");
    setGroup('[data-flag="eula"]',   F.eula   !== "any");
  }

  // Price inputs — gold the box when that bound is set
  const mp = document.getElementById("minprice"); if(mp) mp.closest(".numinput").classList.toggle("changed", state.minPrice != null);
  const xp = document.getElementById("maxprice"); if(xp) xp.closest(".numinput").classList.toggle("changed", state.maxPrice != null);
  // QTPD range — gold the label when dragged off 0–∞
  document.querySelectorAll(".rangelabel").forEach(l => l.classList.toggle("changed", !!state.qRangeTouched));
}

// ── L2 — collapsed-bar filter summary sentence + inline editors ─────────────────────────
const SORT_LABELS = {qtpd:"QTPD", title:"Name", rating_pct:"Review score", review_count:"Review count",
  trend:"Trend", wr:"Weighted", price_final:"Price", discount_pct:"Discount", discount_end:"Sale ends",
  release_ts:"Released", updated:"Updated", playtime:"Playtime", hltb:"HLTB"};
const REV_LBLS = ["0", "10", "100", "1k", "5k+"];

function renderSummary(){
  const host = $("#filterSummary"); if(!host) return;
  const parts = [];
  const chip = (key, text) => `<button class="sumf" data-sumf="${key}">${esc(text)}</button>`;
  if(state.q) parts.push(chip("q", `“${state.q}”`));
  if(state.qBasis === "before") parts.push(chip("basis", "full-price QTPD"));
  if(state.hltbMetric !== "main"){ const m = {extra:"+Extras", complete:"100%", avg:"Avg"}[state.hltbMetric] || state.hltbMetric; parts.push(chip("metric", `${m} length`)); }
  if(state.hltbQuality !== "real") parts.push(chip("hq", "incl. estimated HLTB"));
  if(state.minScore > 0) parts.push(chip("minscore", `rating ≥ ${state.minScore}%`));
  if(state.ratingSource !== "recent") parts.push(chip("ratesrc", "all-time reviews"));
  if(!sameSet(state.revBands, [1,2,3,4])){ const t = [...state.revBands].sort((a,b)=>a-b).map(i => REV_LBLS[i]).join("/"); parts.push(chip("rev", state.revBands.size ? `reviews: ${t}` : "reviews: none")); }
  if(state.minPrice != null || state.maxPrice != null){ const lo = state.minPrice != null ? `$${state.minPrice}` : "$0"; const hi = state.maxPrice != null ? `$${state.maxPrice}` : "∞"; parts.push(chip("price", `${lo}–${hi}`)); }
  if(state.priceClass.size < 3){ const lbl = {full:"full price",sale:"on sale",free:"free"}; const t = ["full","sale","free"].filter(c => state.priceClass.has(c)).map(c => lbl[c]).join(" / "); parts.push(chip("pc", t)); }
  if(state.trendSet.size > 0 && state.trendSet.size < 3){ const map = {up:"▲", flat:"≈", down:"▼"}; const t = ["up","flat","down"].filter(x => state.trendSet.has(x)).map(x => map[x]).join(""); parts.push(chip("trend", `trend ${t}`)); }
  if(state.updatedWithin !== "any"){ const t = state.updatedWithin === "1yr+" ? "not updated 1yr+" : `updated ≤ ${state.updatedWithin}`; parts.push(chip("upd", t)); }
  if(state.qRangeTouched){ const lo = state.qMinVal <= 0.001 ? "0" : fmtQval(state.qMinVal); const hi = state.qMaxUnbounded ? "∞" : fmtQval(state.qMaxVal); parts.push(chip("qrange", `QTPD ${lo}–${hi}`)); }
  if(state.wishOnly) parts.push(chip("wishonly", "wishlist only"));

  // Tags close the line as their OWN inline cycle-chips (not a "+2 −1" count) — the same
  // interacted-tag chips as the collapsed Tags header, so each can be re-cycled in place and
  // cleared ones linger + fade here too. An "all/any" chip trails when >1 tag is required.
  const tagsFrag = interactedTagChipsHTML();
  const modeChip = (state.tagsInc.size > 1)
      ? ` <button class="sumf plain" data-sumf="tagmode" title="How required tags combine">${state.tagMode === "or" ? "any" : "all"}</button>` : "";
  const tagsPart = tagsFrag ? `<span class="sumlbl">tags</span> ${tagsFrag}${modeChip}` : "";

  const sortName = SORT_LABELS[state.sortKey] || state.sortKey;
  const sortChip = `<button class="sumf plain" data-sumf="sort">${esc(sortName)} ${state.sortDir < 0 ? "↓" : "↑"}</button>`;
  const count = state._totalFiltered != null ? state._totalFiltered : "";
  const lead = [parts.join(" "), tagsPart].filter(Boolean).join(" ");
  const active = !!lead;                                   // any non-default filter (incl. lingering tags)
  // Warning-styled Reset in the top-right corner of the line — only when there's something to reset.
  const resetBtn = active ? `<button class="sumreset" data-reset="1" title="Clear all filters">Reset</button>` : "";
  host.innerHTML = resetBtn + (active
    ? `<span class="sumlbl">Showing</span> ${lead} <span class="sumlbl">· ${count} games · sorted by</span> ${sortChip}`
    : `<span class="sumlbl">All ${count} games · sorted by</span> ${sortChip}`);
  applyLingerOpacities();
  // #6 — Random only makes sense once the user has narrowed to a list; hide it otherwise.
  const rb = $("#randomBtn"); if(rb) rb.style.display = active ? "" : "none";
}

// Popover host (shared by summary editors + CSV picker).
function showPopover(anchor){
  const host = $("#popHost"), pop = $("#popover");
  host.classList.add("on");
  const r = anchor.getBoundingClientRect();
  pop.style.visibility = "hidden";
  requestAnimationFrame(() => {
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let left = r.left; if(left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    let top = r.bottom + 6; if(top + ph > window.innerHeight - 8) top = Math.max(8, r.top - ph - 6);
    pop.style.left = Math.max(8, left) + "px"; pop.style.top = Math.max(8, top) + "px";
    pop.style.visibility = "visible";
  });
}
function closePopover(){ $("#popHost").classList.remove("on"); const p = $("#popover"); p.onclick = null; p.innerHTML = ""; }

// Filters that need the full control set (free text, ranges, tags) just deep-link into the
// expanded bar; the rest get an inline option popover that drives the REAL hidden controls
// (so there's zero duplicated state logic — clicking a popover option clicks the actual button).
const SUMMARY_EDITORS = {
  basis:    {title:"QTPD price basis", cur:() => state.qBasis, opts:[["Sale","#qb-after","after"],["Full","#qb-before","before"]]},
  metric:   {title:"HLTB metric", cur:() => state.hltbMetric, opts:[["Main",'[data-metric="main"]',"main"],["+Extras",'[data-metric="extra"]',"extra"],["100%",'[data-metric="complete"]',"complete"],["Avg",'[data-metric="avg"]',"avg"]]},
  hq:       {title:"HLTB data", cur:() => state.hltbQuality, opts:[["All (incl. est.)",'[data-hquality="loose"]',"loose"],["Real only",'[data-hquality="real"]',"real"]]},
  minscore: {title:"Min rating", cur:() => String(state.minScore), opts:[["Any",'[data-minscore="0"]',"0"],["60+",'[data-minscore="60"]',"60"],["70+",'[data-minscore="70"]',"70"],["80+",'[data-minscore="80"]',"80"],["90+",'[data-minscore="90"]',"90"]]},
  ratesrc:  {title:"Reviews sort by", cur:() => state.ratingSource, opts:[["All-time",'[data-ratesrc="all"]',"all"],["30-day",'[data-ratesrc="recent"]',"recent"]]},
  upd:      {title:"Updated within", cur:() => state.updatedWithin, opts:[["Any",'[data-upd="any"]',"any"],["1mo",'[data-upd="1mo"]',"1mo"],["3mo",'[data-upd="3mo"]',"3mo"],["6mo",'[data-upd="6mo"]',"6mo"],["1yr",'[data-upd="1yr"]',"1yr"],["1yr+",'[data-upd="1yr+"]',"1yr+"]]},
  pc:       {title:"Price type (toggle)", multi:true, has:v => state.priceClass.has(v), opts:[["Full",'[data-pc="full"]',"full"],["Sale",'[data-pc="sale"]',"sale"],["Free",'[data-pc="free"]',"free"]]},
  wishonly: {title:"Wishlist", toggleSel:"#wishOnly", isOn:() => state.wishOnly, opts:[["Wishlist only",null,"on"],["All games",null,"off"]]},
  trend:    {title:"Review trend (toggle)", multi:true, has:v => state.trendSet.has(v), opts:[["▲ up",'[data-trend="up"]',"up"],["≈ flat",'[data-trend="flat"]',"flat"],["▼ down",'[data-trend="down"]',"down"]]},
  rev:      {title:"Min reviews (toggle bands)", multi:true, has:v => state.revBands.has(+v), opts:[["0",'[data-rev="0"]',"0"],["10",'[data-rev="1"]',"1"],["100",'[data-rev="2"]',"2"],["1k",'[data-rev="3"]',"3"],["5k+",'[data-rev="4"]',"4"]]},
  tagmode:  {title:"Required tags match", cur:() => state.tagMode, opts:[["ALL",'[data-tagmode="and"]',"and"],["ANY",'[data-tagmode="or"]',"or"]]},
};
function openSummaryEditor(anchor, key){
  const EXPAND = {q:["value","#q"], price:["value","#minprice"], qrange:["value","#qmin"], tags:["tags",null]};
  if(EXPAND[key]){
    setFiltersCompact(false);
    const [sec, focusSel] = EXPAND[key];
    openSectionByName(sec);
    const el = focusSel ? $(focusSel) : document.querySelector('.filter-section[data-section="tags"]');
    if(el){ if(focusSel) el.focus(); el.scrollIntoView({block:"nearest"}); }
    return;
  }
  if(key === "sort") return buildSortPopover(anchor);
  const cfg = SUMMARY_EDITORS[key];
  if(!cfg){ setFiltersCompact(false); return; }
  buildOptionPopover(anchor, cfg);
}
function buildOptionPopover(anchor, cfg){
  const pop = $("#popover");
  const renderContent = () => {
    let html = `<h4>${esc(cfg.title)}</h4><div class="pop-opts">`;
    cfg.opts.forEach(([label, sel, val]) => {
      let on;
      if(cfg.multi) on = cfg.has(val);
      else if(cfg.toggleSel) on = (val === "on") === !!cfg.isOn();
      else on = cfg.cur() === val;
      html += `<button class="pop-opt${on ? " on" : ""}" data-sel="${sel ? esc(sel) : ""}" data-val="${esc(val)}">${esc(label)}</button>`;
    });
    pop.innerHTML = html + `</div>`;
  };
  renderContent();
  pop.onclick = e => {
    const o = e.target.closest(".pop-opt"); if(!o) return;
    const val = o.dataset.val;
    if(cfg.toggleSel){                          // On/Off toggle: click the control only if it must flip
      if((val === "on") !== !!cfg.isOn()) $(cfg.toggleSel).click();
    } else {
      const el = $(o.dataset.sel); if(el) el.click();   // reuse the real control's handler
    }
    if(cfg.multi) renderContent();              // multi stays open so you can toggle several
    else closePopover();
  };
  showPopover(anchor);
}
function buildSortPopover(anchor){
  const pop = $("#popover");
  const renderContent = () => {
    let html = `<h4>Sort by</h4><div class="pop-opts">`;
    Object.entries(SORT_LABELS).forEach(([k, lbl]) => {
      html += `<button class="pop-opt${state.sortKey === k ? " on" : ""}" data-sortk="${k}">${esc(lbl)}</button>`;
    });
    html += `</div><div class="pop-actions"><button class="pop-go" data-sortdir="1">${state.sortDir < 0 ? "↓ High → Low" : "↑ Low → High"} — flip</button></div>`;
    pop.innerHTML = html;
  };
  renderContent();
  pop.onclick = e => {
    const k = e.target.closest("[data-sortk]");
    if(k){ if(state.sortKey !== k.dataset.sortk){ setSort(k.dataset.sortk); renderContent(); } return; }
    if(e.target.closest("[data-sortdir]")){ state.sortDir *= -1; syncSortArrows(); render(); syncURL(); renderContent(); }
  };
  showPopover(anchor);
}

// ── L4 — utility actions: random pick, CSV export, copy link ────────────────────────────
function randomPick(){
  const games = visibleGames();
  if(!games.length){ toast("No games match the current filters.", "err", 5000); return; }
  const idx = Math.floor(Math.random() * games.length);
  const g = games[idx];
  // grow the paged view until the pick is actually rendered, then scroll to + flash it
  while(state.pageSize * state.pagesShown <= idx && state.pageSize * state.pagesShown < games.length) state.pagesShown += 1;
  render();
  toast(`🎲 <b>${esc(g.title)}</b> — QTPD ${fmtQval(activeQ(g))}`, "ok", 6000);
  requestAnimationFrame(() => {
    let el;
    if(state.view === "grid") el = document.querySelector(`.gcard[data-gappid="${g.appid}"]`);
    else { const hb = document.querySelector(`[data-hide="${g.appid}"]`); el = hb ? hb.closest("tr") : null; }
    if(el){
      el.scrollIntoView({behavior:"smooth", block:"center"});
      el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
      if(state.view === "grid") el.classList.add("open");
    }
  });
}
// CSV columns: [key, header, valueFn]. QTPD/price/HLTB honor the current basis/metric toggles.
const CSV_COLS = [
  ["title", "Name", g => g.title],
  ["url", "Steam URL", g => g.url],

function doExportCSV(pop){
  const chosen = [...pop.querySelectorAll("input[data-col]:checked")].map(i => i.dataset.col);
  if(!chosen.length){ toast("Pick at least one column.", "err", 4000); return; }
  const cols = CSV_COLS.filter(c => chosen.includes(c[0]));

  const cell = v => { v = v == null ? "" : String(v); return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  const rows = [cols.map(c => cell(c[1])).join(",")];
  games.forEach(g => rows.push(cols.map(c => cell(c[2](g))).join(",")));
  const blob = new Blob(["﻿" + rows.join("\r\n")], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);

  a.href = url; a.download = `qtpd-export-${games.length}.csv`;

}

// ----- wishlist -----
// SteamID64 = base + accountID.  These three formats are pure math (no network):
//   steamID64  76561198019774128
//   steamID2   STEAM_0:0:29754200   -> accountID = Z*2 + Y
//   steamID3   [U:1:59508400]       -> accountID = the bracketed number
const STEAMID64_BASE = 76561197960265728n; // 0x0110000100000000 (individual account, public universe)
// Resolve an input string to a SteamID64 *without* any network call.
// Returns { id } when solvable locally, { vanity } when it needs a keyed Steam
// lookup (a /id/<name> URL or a bare custom name), or null when unrecognisable.
function parseSteamId(input){
  input = (input||"").trim();
  if(!input) return null;

  // steamID64: 17 digits, bare or inside a /profiles/<id> URL
  let m = input.match(/(?:profiles\/)?(\d{17})(?:[/?#]|$)/);
  if(m) return { id: m[1] };

  // steamID2:  STEAM_X:Y:Z  (X universe ignored, accountID = Z*2 + Y)
  m = input.match(/^STEAM_[0-5]:([01]):(\d+)$/i);
  if(m){
    const acct = BigInt(m[2]) * 2n + BigInt(m[1]);
    return { id: (STEAMID64_BASE + acct).toString() };
  }

  // steamID3:  [U:1:accountID]  or bare  U:1:accountID
  m = input.match(/^\[?U:1:(\d+)\]?$/i);
  if(m) return { id: (STEAMID64_BASE + BigInt(m[1])).toString() };

  // vanity /id/<name> URL  ->  needs the Worker to resolve
  m = input.match(/steamcommunity\.com\/id\/([^/?#]+)/i);
  if(m) return { vanity: decodeURIComponent(m[1]) };

  // bare custom name (letters/digits/_-, not all-numeric) -> treat as vanity
  if(/^[A-Za-z0-9_-]{2,32}$/.test(input) && !/^\d+$/.test(input)){
    return { vanity: input };
  }

  return null;
}
// ===== Wishlist import via the QTPD Cloudflare Worker proxy =====
// The Worker calls Steam server-side (no CORS, key kept secret) and returns just the
// appid list. SET THIS to your deployed Worker URL (e.g. the *.workers.dev address, or
// your custom route). Until it's set, the import button explains it's not configured.
const WISHLIST_PROXY = "https://qhpp-wishlist.mlmariss.workers.dev";

async function importWishlist(){
  const parsed = parseSteamId($("#steamid").value);
  if(!parsed){
    toast(`Couldn't read that. Paste your <b>profile URL</b> (<code>/id/name</code> or <code>/profiles/&lt;id&gt;</code>), a 17-digit <b>SteamID64</b>, a <code>STEAM_0:…</code> or <code>[U:1:…]</code> ID, or your custom name. Not sure? Look it up at <a href="https://steamid.io" target="_blank" rel="noopener">steamid.io</a>.`, "err", 11000);
    return;
  }
  if(WISHLIST_PROXY.includes("REPLACE-WITH-YOUR-WORKER")){
    toast(`Wishlist import isn't configured yet (no proxy URL set).`, "err", 8000);
    return;
  }

  // Vanity name → resolve to SteamID64 via the Worker first.
  let id = parsed.id;
  if(!id && parsed.vanity){
    toast("Resolving profile name…", "", 4000);
    let vres = null, vnet = false;
    try {
      const r = await fetch(`${WISHLIST_PROXY}/?vanity=${encodeURIComponent(parsed.vanity)}`, {cache:"no-store"});
      vres = await r.json().catch(() => null);
    } catch(e){ vnet = true; }
    if(vnet || !vres){
      toast(`Couldn't reach the lookup service. Check your connection and try again in a moment.`, "err", 9000);
      return;
    }
    if(vres.ok === false || !vres.steamid){
      toast(`No Steam profile found for <b>${parsed.vanity}</b>. Check the name, or paste your full <code>/profiles/&lt;id&gt;</code> URL or SteamID64 instead.`, "err", 10000);
      return;
    }
    id = vres.steamid;
  }
  toast("Fetching wishlist…", "", 4000);

  let data = null, netError = false;
  try {
    const r = await fetch(`${WISHLIST_PROXY}/?steamid=${encodeURIComponent(id)}`, {cache:"no-store"});
    data = await r.json().catch(() => null);
  } catch(e){ netError = true; }

  if(netError || !data){
    toast(`Couldn't reach the wishlist service. Check your connection and try again in a moment.`, "err", 9000);
    return;
  }
  if(data.ok === false){
    if(data.reason === "private_or_empty"){
      toast(`No games came back. Either the wishlist is empty, or the profile's <b>game details</b> are private — set them to Public at <a href="https://steamcommunity.com/my/edit/settings" target="_blank" rel="noopener">steamcommunity.com/my/edit/settings</a>, then retry.`, "err", 11000);
    } else if(data.reason === "bad_steamid"){
      toast(`That SteamID didn't look valid (need the 17-digit SteamID64).`, "err", 8000);
    } else {
      toast(`Steam didn't respond (it may be down or rate-limiting). Try again shortly.`, "err", 9000);
    }
    return;
  }

  const appids = Array.isArray(data.appids) ? data.appids : [];
  if(!appids.length){
    toast(`No wishlist games returned.`, "err", 7000);
    return;
  }
  state.wishlist = new Set(appids);
  const inDb = state.data.games.filter(g => state.wishlist.has(g.appid)).length;
  toast(`Imported <b>${state.wishlist.size}</b> wishlist games — <b>${inDb}</b> are in this database.`, "ok", 7000);
  $("#wishOnly").style.display = ""; $("#wishClear").style.display = "";
  update();
}

// ── Desktop grid sort: one-click field buttons with a "More ▾" overflow ──────────────────────
// The fields are the same SORT_LABELS the table headers / mobile <select> use. They're laid out
// side-by-side; layoutGridSort() keeps them on ONE row per screen width by pushing whatever
// doesn't fit into the More menu (so wide monitors show more buttons, narrow ones show fewer).
let GSORT_BTNS = [];   // the field buttons, in canonical order, re-parented between row and menu
function buildGridSortButtons(){
  const wrap = document.getElementById("gsortBtns"); if(!wrap) return;
  wrap.innerHTML = "";
  GSORT_BTNS = Object.entries(SORT_LABELS).map(([k, lbl]) => {
    const b = document.createElement("button");
    b.type = "button"; b.className = "gsort-b"; b.dataset.sortk = k;
    b.textContent = lbl; b.title = `Sort by ${lbl}`;
    wrap.appendChild(b);
    return b;
  });
}
// Fit as many field buttons inline as the row is wide enough for; overflow → the More menu.
// Widths are derived from the bar's own geometry (not sibling visibility) so there's no reflow
// feedback loop between showing/hiding the More button.
function layoutGridSort(){
  const bar = document.getElementById("gridSort");
  if(!bar || !bar.offsetParent) return;               // only when the grid-sort bar is visible
  const wrap = document.getElementById("gsortBtns"), moreWrap = document.getElementById("gsortMore"),
        menu = document.getElementById("gsortMoreMenu"), moreBtn = document.getElementById("gsortMoreBtn"),
        dir = document.getElementById("gsortdir"), label = bar.querySelector(".ms-lbl");
  if(!wrap || !GSORT_BTNS.length) return;
  GSORT_BTNS.forEach(b => wrap.appendChild(b));        // reset: everything inline, in order
  moreWrap.style.display = "";                         // shown so its width is measurable
  const cs = getComputedStyle(bar);
  const barGap = parseFloat(cs.columnGap) || 8, btnGap = 6;
  const inner = bar.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const fixed = label.offsetWidth + dir.offsetWidth;
  const widths = GSORT_BTNS.map(b => b.offsetWidth);
  const totalAll = widths.reduce((a, w) => a + w, 0) + btnGap * (widths.length - 1);
  // Row layout with More hidden = label · buttons · dir → 2 bar-gaps.
  if(totalAll <= inner - fixed - 2 * barGap){ moreWrap.style.display = "none"; syncGridSortButtons(); return; }
  // Overflow needed. Row = label · buttons · more · dir → 3 bar-gaps. Reserve the More button at
  // its widest (it may show the active field's label), so a long label never clips inline buttons.
  const widest = Object.values(SORT_LABELS).reduce((a, b) => a.length >= b.length ? a : b);
  const prevMore = moreBtn.textContent; moreBtn.textContent = `${widest} ▾`;
  const moreW = moreBtn.offsetWidth; moreBtn.textContent = prevMore;
  const avail = inner - fixed - moreW - 3 * barGap;
  let used = 0, cut = GSORT_BTNS.length;
  for(let i = 0; i < GSORT_BTNS.length; i++){
    const w = widths[i] + (i > 0 ? btnGap : 0);
    if(used + w > avail){ cut = i; break; }
    used += w;
  }
  if(cut < 1) cut = 1;                                 // always keep at least the first (QTPD) inline
  menu.innerHTML = "";
  for(let i = cut; i < GSORT_BTNS.length; i++) menu.appendChild(GSORT_BTNS[i]);
  syncGridSortButtons();
}
