name: Summarize playtime -> playtime.json (frontend)

on:
  workflow_dispatch:        # run manually any time
  schedule:
    # Every 4h at :47 (was once-daily at 05:50). Raw scrapes ~8x/day and surges ahead,
    # so a once-daily summarize guaranteed up to a full day of lag. This is a pure local
    # recompute (~5s, reads the shards, writes the small playtime.json the frontend
    # downloads) with NO Steam calls, so bumping cadence costs no storefront budget. The
    # :47 slot sits clear of scrape :00 / prices :07 / raw :23 / tags :29 / recent :41 /
    # hltb :53, and just ahead of playtime-ratings at :51 (which reads the same shards).
    - cron: "47 */4 * * *"

permissions:
  contents: write           # commits playtime.json

concurrency:
  group: steam-playtime-summary
  cancel-in-progress: false

jobs:
  playtime-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # trivial: it only reads one file and computes medians
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Summarize raw playtime into the frontend file
        run: python playtime_summarize.py
