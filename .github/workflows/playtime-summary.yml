name: 3.1 Playtime medians [2.3 / manual] -> playtime.json

on:
  workflow_dispatch:        # run manually any time
  # NO schedule: this recompute is triggered as a CHAINED STEP at the end of workflow
  # 2.3 (Game playtime raw), which runs it right after committing the freshly-updated
  # playtime_raw/ shards. It previously ALSO had its own 4-hourly cron (:47 */4), which
  # meant playtime.json was recomputed twice per cycle — once chained, once standalone —
  # off the same shards. The standalone cron is removed; 2.3 is now the sole scheduled
  # trigger, so there's exactly one writer per cycle. workflow_dispatch stays for manual
  # one-off recomputes. (Pure local recompute, ~5s, no Steam calls / no storefront budget.)

permissions:
  contents: write           # commits playtime.json

concurrency:
  group: steam-playtime-summary
  cancel-in-progress: false

jobs:
  playtime-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # trivial: it only reads one file and computes medians
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Summarize raw playtime into the frontend file
        run: python playtime_summarize.py
