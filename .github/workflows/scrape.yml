name: Scrape Steam -> games.json

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    # off-peak, offset minute (avoid :00 and the 22:00-02:00 UTC congestion window)
    - cron: "17 7,13,18 * * *"

permissions:
  contents: write           # the scraper commits games.json + catalog.json as it runs

concurrency:
  group: steam-scrape       # never overlap runs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330     # under the 6h hard cap; RUN_MINUTES below stays well inside this
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git (scraper commits progress itself)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run scraper
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}   # optional; enables clean full-catalog + smart refresh
          RUN_MINUTES: "180"                            # scrape budget per run
        run: python scraper.py
