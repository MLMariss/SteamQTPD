name: 1. Steam game catalog -> games.json

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    # Every 6h on the clock (00:00 / 06:00 / 12:00 / 18:00 UTC). With RUN_MINUTES=330
    # (5.5h) and cancel-in-progress:false, a new run queues right as the previous one
    # ends, so the scraper covers ~22h/day — near-continuous backlog clearing.
    - cron: "0 0,6,12,18 * * *"

permissions:
  contents: write           # the scraper commits games.json + catalog.json as it runs

concurrency:
  group: steam-scrape       # never overlap runs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330     # under the 6h hard cap; RUN_MINUTES below stays well inside this
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git (scraper commits progress itself)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run scraper
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}   # optional; enables clean full-catalog + smart refresh
          RUN_MINUTES: "330"                            # 5.5h budget per run (near-continuous with 6h cron)
          # --- null-update backlog drain tuning (Jul 2026) ---
          # Aggressive while we close the ~48k null last_update_ts gap. REVERT after:
          # raise STOREFRONT_MIN_INTERVAL back toward ~1.4-1.5 for steady state, and
          # FORCE_RESERVE_FRAC can drop to ~0.2. See ARCHITECTURE.md §16 revert note.
          STOREFRONT_MIN_INTERVAL: "0.9"                # shared storefront pace (was effective ~3s/game)
          FORCE_RESERVE_FRAC: "0.5"                     # min share of each run for the forced drain
        run: python scraper.py
