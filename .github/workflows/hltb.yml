name: 2.5 HLTB completion times -> hltb.json

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    # Pass 1 fills games with no entry yet; leftover budget goes to a re-scrape pass over
    # existing entries on staleness windows (partial 14d / blank attempt-scaled / full
    # 365d). Those windows are now min()'d against a POPULARITY FAST LANE keyed on Steam
    # review_count (>1k -> 5d, >500 -> 10d) that overrides EVERY bucket including `full`:
    # HLTB times are only static for back-catalogue titles, and a big new release keeps
    # accumulating submissions long after our first lookup. It's the slow part (scrapes
    # howlongtobeat.com), so it runs out of band on its own schedule and never blocks the
    # main scrape. It hits
    # howlongtobeat.com (NOT Steam), so it doesn't compete with the storefront rate budget
    # — safe to run near-continuously. Offset to :53 to stagger from the other jobs; own
    # concurrency group (cancel-in-progress:false) queues rather than overlaps.
    - cron: "53 */2 * * *"  # every 2 hours (near-continuous with RUN_MINUTES=110)

permissions:
  contents: write           # commits hltb.json as it runs

concurrency:
  group: steam-hltb         # never overlap HLTB runs (separate from all other jobs)
  cancel-in-progress: false

jobs:
  hltb:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # RUN_MINUTES=110 leaves ~10 min headroom before the next cron
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests howlongtobeatpy

      - name: Configure git (script commits progress itself, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh HowLongToBeat times
        env:
          RUN_MINUTES: "110"
        run: python hltb_refresh.py
