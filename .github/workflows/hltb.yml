name: Refresh HLTB times -> hltb.json

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    # HLTB completion times are static, so this just fills in games that don't have an
    # entry yet and never re-fetches. It's the slow part (scrapes howlongtobeat.com), so
    # it runs out of band on its own schedule and never blocks the main scrape. It hits
    # howlongtobeat.com (NOT Steam), so it doesn't compete with the storefront rate budget
    # — safe to run near-continuously. Offset to :53 to stagger from the other jobs; own
    # concurrency group (cancel-in-progress:false) queues rather than overlaps.
    - cron: "53 */2 * * *"  # every 2 hours (near-continuous with RUN_MINUTES=110)

permissions:
  contents: write           # commits hltb.json as it runs

concurrency:
  group: steam-hltb         # never overlap HLTB runs (separate from all other jobs)
  cancel-in-progress: false

jobs:
  hltb:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # RUN_MINUTES=110 leaves ~10 min headroom before the next cron
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests howlongtobeatpy

      - name: Configure git (script commits progress itself, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh HowLongToBeat times
        env:
          RUN_MINUTES: "110"
        run: python hltb_refresh.py
