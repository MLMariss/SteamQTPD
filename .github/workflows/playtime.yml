name: Refresh review playtime -> playtime.json

on:
  workflow_dispatch:        # run manually from the Actions tab (also used for deep passes)
  schedule:
    # Isolated storefront slot. The storefront ~200/5min budget is shared by scrape.py
    # (:00 of 0,6,12,18 — LONG runs), price_and_sale.py (:07 every 3h) and
    # recent_refresh.py (:41 of 4,10,16,22). This job runs at :23 of 2,8,14,20 —
    # a couple hours after each scrape start (so it's winding down) and clear of the
    # prices/recent offsets — so playtime has the storefront budget largely to itself
    # and a 403 soft-limit here won't stall the other jobs. (hltb :53 and tags :29 hit
    # different hosts, so overlap with those is harmless.)
    - cron: "23 2,8,14,20 * * *"

permissions:
  contents: write           # commits playtime.json as it runs

concurrency:
  group: steam-playtime     # never overlap playtime runs (separate group from every other job)
  cancel-in-progress: false

jobs:
  playtime:
    runs-on: ubuntu-latest
    timeout-minutes: 330     # under the 6h hard cap; RUN_MINUTES stays well inside
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git (script commits progress itself, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh review playtime (sentiment-split medians)
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}   # optional (appreviews is keyless)
          RUN_MINUTES: "180"
          TARGET_REVIEWS: "200"        # reviews walked per game per normal pass
          # For a one-off DEEP pass, run this workflow manually with a higher target by
          # temporarily setting DEEPEN_TARGET here (e.g. "500"); it resumes each game
          # from its saved cursor and only fetches the additional reviews.
          # DEEPEN_TARGET: "500"
        run: python playtime_refresh.py
