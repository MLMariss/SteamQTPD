name: Refresh IGDB times -> hltb_igdb.json

# DISABLED 2026-07: IGDB dropped as a source. Its game_time_to_beats table holds only
# ~8,829 records total, so it matched just 1,471 of 96k resolved games (1,007 net-new) —
# too small a ceiling to justify a standing scheduled job. The schedule trigger is removed
# so this never runs on its own; workflow_dispatch is kept so it CAN be run manually if
# IGDB coverage ever grows and the source is worth reviving. Files left dormant in-repo.
on:
  workflow_dispatch:        # manual-only; no schedule (job is retired, not deleted)

permissions:
  contents: write           # commits hltb_igdb.json as it runs

concurrency:
  group: steam-igdb         # never overlap IGDB runs (separate from HLTB + all others)
  cancel-in-progress: false

jobs:
  igdb:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # RUN_MINUTES=110 leaves ~10 min headroom
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git (script commits progress itself, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh IGDB completion times
        env:
          RUN_MINUTES: "110"
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: python hltb_igdb.py
