name: Summarize playtime ratings -> ratings.json (frontend)

on:
  workflow_dispatch:        # run manually any time
  schedule:
    # Every 4h at :51 (was once-daily at 05:55), right after playtime-summary at :47 —
    # both read the same playtime_raw/ shards. Raw scrapes ~8x/day, so once-daily left
    # ratings.json lagging raw by up to a day. Pure local recompute (~5s, no Steam calls),
    # so the higher cadence costs no storefront budget. Separate concurrency group means
    # it never collides with the summary job even though they run a few minutes apart.
    - cron: "51 */4 * * *"

permissions:
  contents: write           # commits ratings.json

concurrency:
  group: steam-playtime-ratings
  cancel-in-progress: false

jobs:
  playtime-ratings:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # trivial: reads one file, computes weighted ratings
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute playtime-weighted ratings
        run: python ratings_summarize.py
