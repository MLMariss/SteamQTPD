name: 3.2 Playtime-weighted ratings [2.3 / manual] -> ratings.json

on:
  workflow_dispatch:        # run manually any time
  # NO schedule: like 3.1, this recompute is triggered as a CHAINED STEP at the end of
  # workflow 2.3 (Game playtime raw), right after the playtime_raw/ shards it reads are
  # committed. It previously ALSO had its own 4-hourly cron (:51 */4), double-writing
  # ratings.json each cycle (once chained, once standalone) off the same shards. The
  # standalone cron is removed; 2.3 is the sole scheduled trigger, one writer per cycle.
  # workflow_dispatch stays for manual recomputes. (Pure local recompute, ~5s, no Steam
  # calls / no storefront budget.)

permissions:
  contents: write           # commits ratings.json

concurrency:
  group: steam-playtime-ratings
  cancel-in-progress: false

jobs:
  playtime-ratings:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # trivial: reads one file, computes weighted ratings
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute playtime-weighted ratings
        run: python ratings_summarize.py
