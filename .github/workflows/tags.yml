name: 2.6 SteamSpy tags -> tags.json

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    # SteamSpy tags are nearly static, so this just fills games that don't have an entry
    # yet and rarely re-fetches. It's slow per game (SteamSpy is slow to respond), so it
    # runs out of band on its own schedule and never blocks the main scrape. It hits
    # steamspy.com (NOT Steam), so it doesn't compete with the storefront rate budget —
    # safe to run near-continuously. Offset to :29 to stagger from the other jobs; own
    # concurrency group (cancel-in-progress:false) queues rather than overlaps.
    - cron: "29 */2 * * *"  # every 2 hours (near-continuous with RUN_MINUTES=110)

permissions:
  contents: write           # commits tags.json as it runs

concurrency:
  group: steam-tags         # never overlap tags runs (separate from all other jobs)
  cancel-in-progress: false

jobs:
  tags:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # RUN_MINUTES=110 leaves ~10 min headroom before the next cron
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git (script commits progress itself, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh SteamSpy tags
        env:
          RUN_MINUTES: "110"
        run: python tags_refresh.py
