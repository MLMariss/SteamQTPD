name: 2.3 Game playtime raw -> playtime_raw/ shards

on:
  workflow_dispatch:        # run manually (also used for deep passes via DEEPEN_TARGET)
  schedule:
    # AGGRESSIVE 8-slot pass (was 4× at :23 of 2,8,14,20). Now :23 every 3h — hours
    # 1,4,7,10,13,16,19,22 — i.e. near-continuous playtime scraping (~23h/day, up from
    # ~12h/day) to backfill review times faster now that scrape.py finishes in ~7 min.
    # Each run now processes SEVERAL shard buckets (up to MAX_SHARDS_PER_RUN), chosen
    # hottest-first by how many of their games are overdue under the refresh ladder, with
    # the GITHUB_RUN_NUMBER % 64 bucket always included as a starvation guard so every
    # shard is still visited at least every ~64 runs. Previously a run took exactly one
    # bucket, which capped ANY game's refresh at once per ~64 runs (~8 days) and made the
    # new 1-day tier for fresh releases unreachable — hot games are scattered uniformly
    # across all 64 shards, so a hot backlog is always thin-spread. Shards are loaded,
    # worked and committed ONE AT A TIME, so commits stay small and peak memory stays at
    # ~one shard. The :23 offset starts each run AFTER the :07 prices slot
    # (60-min runs) has wound down. NOTE: the ~200/5min storefront budget is nominally
    # shared with prices (:07 every 3h, 60min), recent (:41 of 4,10,16,22, 180min) and
    # scrape. With STEAM_DELAY now 1.5s (200/5min, no headroom) this leans on the budget
    # hard — but recent already sustains 3h@1.5s successfully (separate runner IPs), so
    # this is expected to hold. WATCH 403 rates after deploy: if they spike, revert delay
    # to 2.0 and/or drop to fewer slots. The concurrency group below keeps raw runs from
    # overlapping each other. (hltb :53 / tags :29 hit different hosts.)
    - cron: "23 1,4,7,10,13,16,19,22 * * *"

permissions:
  contents: write           # commits one playtime_raw/NN.json shard per run (auto-migrates the old monolith on first run)

concurrency:
  group: steam-playtime-raw # never overlap raw-scrape runs (own group)
  cancel-in-progress: false

jobs:
  playtime-raw:
    runs-on: ubuntu-latest
    timeout-minutes: 330     # under the 6h cap; RUN_MINUTES stays well inside
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git (script commits once at run-end, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh review playtime (identity-keyed, sentiment-split)
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}   # optional (appreviews is keyless)
          RUN_MINUTES: "180"
          TARGET_REVIEWS: "200"        # reviews aimed for per game on a normal pass
          # Max shard buckets one run may open. Each shard open costs an ~18 MB read plus
          # a commit, so this trades per-run overhead against how fast the hot backlog
          # drains. 12 × 8 runs/day = ~96 shard-visits/day against 64 shards, so every
          # shard is reachable ~1.5×/day instead of once per 8 days. Raise if the hot
          # queue still backlogs; lower if runs spend more time on I/O than on requests.
          MAX_SHARDS_PER_RUN: "12"
          SHARD_MIN_HOT: "1"           # skip shards with fewer due games than this
          # One-off DEEP pass: run this workflow manually and set a higher target
          # (capped at PER_GAME_CAP=1000 in the script). It resumes each game by
          # review identity, catching new reviews AND walking deeper into unseen ones.
          # DEEPEN_TARGET: "1000"
        run: python playtime_refresh.py

      # After the raw shards are refreshed and committed above, recompute the small
      # frontend-facing files from the just-updated shards. Each summarizer reads the
      # shard dir directly, self-commits its ONE file (playtime.json / ratings.json)
      # and rebases onto main — one-writer-per-file holds (raw job never writes those
      # two files itself; only these steps do). This closes the raw-vs-summarized lag:
      # previously the summarizers had no cron and only ran by hand, so playtime.json /
      # ratings.json drifted behind the shards. `if: always()` so a soft-failing raw
      # pass (e.g. 403 budget) still publishes summaries from whatever shards exist.
      - name: Summarize playtime medians -> playtime.json
        if: always()
        run: python playtime_summarize.py

      - name: Summarize playtime-weighted ratings -> ratings.json
        if: always()
        run: python ratings_summarize.py
