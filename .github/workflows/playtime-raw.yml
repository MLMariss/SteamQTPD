name: Refresh review playtime -> playtime_raw.json

on:
  workflow_dispatch:        # run manually (also used for deep passes via DEEPEN_TARGET)
  schedule:
    # AGGRESSIVE 8-slot pass (was 4× at :23 of 2,8,14,20). Now :23 every 3h — hours
    # 1,4,7,10,13,16,19,22 — i.e. near-continuous playtime scraping (~23h/day, up from
    # ~12h/day) to backfill review times faster now that scrape.py finishes in ~7 min.
    # The :23 offset starts each run AFTER the :07 prices slot (60-min runs) has wound
    # down. NOTE: the ~200/5min storefront budget is nominally shared with prices
    # (:07 every 3h, 60min), recent (:41 of 4,10,16,22, 180min) and scrape. With
    # STEAM_DELAY now 1.5s (200/5min, no headroom) this leans on the budget hard —
    # but recent already sustains 3h@1.5s successfully (separate runner IPs), so this is
    # expected to hold. WATCH 403 rates after deploy: if they spike, revert delay to 2.0
    # and/or drop back to fewer slots. The concurrency group below keeps raw runs from
    # overlapping each other. (hltb :53 / tags :29 hit different hosts.)
    - cron: "23 1,4,7,10,13,16,19,22 * * *"

permissions:
  contents: write           # commits playtime_raw.json once at run-end (G2)

concurrency:
  group: steam-playtime-raw # never overlap raw-scrape runs (own group)
  cancel-in-progress: false

jobs:
  playtime-raw:
    runs-on: ubuntu-latest
    timeout-minutes: 330     # under the 6h cap; RUN_MINUTES stays well inside
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git (script commits once at run-end, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh review playtime (identity-keyed, sentiment-split)
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}   # optional (appreviews is keyless)
          RUN_MINUTES: "180"
          TARGET_REVIEWS: "200"        # reviews aimed for per game on a normal pass
          # One-off DEEP pass: run this workflow manually and set a higher target
          # (capped at PER_GAME_CAP=1000 in the script). It resumes each game by
          # review identity, catching new reviews AND walking deeper into unseen ones.
          # DEEPEN_TARGET: "1000"
        run: python playtime_refresh.py
