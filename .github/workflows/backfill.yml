name: Backfill last_update_ts (one-off)

# One-off job: fills the missing last_update_ts field for every game in games.json,
# via Steam's News API. Manual trigger only -- it does not run on a schedule. Safe to
# run more than once (it skips games that already have the field). Once it has run and
# committed, the main scraper keeps last_update_ts fresh, so this workflow (and
# backfill_updates.py) can be deleted.

on:
  workflow_dispatch:          # run manually from the Actions tab

permissions:
  contents: write             # commits the updated games.json

concurrency:
  group: steam-scrape         # share the scraper's group so it can't run alongside a scrape
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # backfill is ~13 min; generous headroom
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Backfill update dates
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}   # optional (News API is keyless)
        run: python backfill_updates.py

      - name: Commit games.json
        run: |
          git add games.json
          if ! git diff --staged --quiet; then
            git commit -m "backfill: last_update_ts for existing games"
            git fetch origin main
            git rebase --autostash origin/main
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
