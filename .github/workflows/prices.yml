name: Refresh prices + sale dates -> prices.json

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    # Prices + sale end-dates are the fast-changing layer, and both endpoints are batched
    # and cheap (~32 price calls + a few GetItems calls for the whole catalog), so we
    # refresh often. Offset to :07 so it doesn't collide with the scraper (:17), recent
    # reviews (:41), or HLTB; its own concurrency group prevents overlapping runs.
    - cron: "7 */3 * * *"   # every 3 hours

permissions:
  contents: write           # commits prices.json as it runs

concurrency:
  group: steam-prices       # never overlap price runs (separate from scraper/recent/hltb)
  cancel-in-progress: false

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 135     # RUN_MINUTES=120 + headroom; still ~45min clear of the 3h cron
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git (script commits progress itself, rebasing onto main)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Refresh prices and sale end-dates
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          QHPP_CC: "US"
          # 120min budget: a full pass over ~105k non-free games (price pass) plus the
          # on-sale subset's end-date pass needs ~75-90min WALL (delay + HTTP latency)
          # during a big sale (Summer Sale = ~61k on sale). At 60 the run wrapped mid-pass
          # at TIME_BUFFER every time, which is what made prices look stale. 120 finishes
          # even the worst-case sale pass with margin; the 3h cron leaves ~60min headroom.
          RUN_MINUTES: "120"
        run: python price_and_sale.py
