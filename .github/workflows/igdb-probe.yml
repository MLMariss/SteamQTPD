name: DEBUG - IGDB probe (manual only)

# One-off diagnostics for the IGDB pipeline. Manual trigger ONLY (no schedule);
# writes nothing, safe to leave in the repo. Pick which probe to run from the
# dropdown when you click "Run workflow":
#   - igdb_probe.py  : step 1 diagnosis (appid -> IGDB id; which Steam filter works)
#   - igdb_probe2.py : step 2 diagnosis (IGDB id -> time-to-beat; why matches drop)
# Read the chosen probe's step log for the raw IGDB responses.

on:
  workflow_dispatch:
    inputs:
      probe:
        description: 'Which probe to run'
        required: true
        default: 'igdb_probe2.py'
        type: choice
        options:
          - igdb_probe.py
          - igdb_probe2.py

permissions:
  contents: read            # probes write nothing; read-only is enough

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run IGDB probe (${{ github.event.inputs.probe }})
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: python "${{ github.event.inputs.probe }}"
